// Foto inladen + comprimeren tot een kleine JPEG-dataURL (localStorage-vriendelijk)
function comprimeerAfbeelding(file, maxZijde, kwaliteit) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxZijde) {
          height = Math.round(height * (maxZijde / width));
          width = maxZijde;
        } else if (height > maxZijde) {
          width = Math.round(width * (maxZijde / height));
          height = maxZijde;
        }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", kwaliteit));
      };
      img.onerror = () => reject(new Error("beeld"));
      img.src = ev.target.result;
    };
    reader.onerror = () => reject(new Error("lezen"));
    reader.readAsDataURL(file);
  });
}

function WinkelbestellingenTab({ data, updateWinkelbestelling, updateKasticket, showToast, t }) {
  const lang = data.taal === "fr" ? "fr" : "nl";
  const winkels = data.winkels || [];
  const winkelById = (id) => winkels.find((w) => w.id === id) || null;
  const [metFotos, setMetFotos] = React.useState(true);
  const [bezig, setBezig] = React.useState(false);

  // Alleen materiaal met oorsprong Winkel_Magasin
  const items = (data.materiaal || []).filter((m) => m.oorsprong === WINKEL_OORSPRONG);

  const sortedVrij = [...data.vrijwilligers].sort((a, b) => {
    const an = (a.naam || "").toLowerCase(), bn = (b.naam || "").toLowerCase();
    if (an !== bn) return an.localeCompare(bn);
    return (a.voornaam || "").toLowerCase().localeCompare((b.voornaam || "").toLowerCase());
  });

  const bestellingVoor = (mId) => (data.winkelbestellingen || {})[mId] || {};

  const aankoperNaam = (best) => {
    if (!best.aankoperId) return "";
    if (best.aankoperId === "__extern__") return best.aankoperVrij || t.winkel_extern_koper;
    const v = data.vrijwilligers.find((x) => x.id === best.aankoperId);
    return v ? `${v.voornaam} ${v.naam}`.trim() : "";
  };

  const matNaam = (m) => capitalize(lang === "fr" ? (m.naamFr || m.naamNl) : (m.naamNl || m.naamFr)) || "?";

  // Kasticket-sleutel = winkel + aankoper + datum (uniek per aankoper, ook zelfde winkel/datum)
  const kasticketKey = (best, winkelId) => {
    const wk = winkelId || "__geen__";
    const ak = best.aankoperId === "__extern__"
      ? `ext:${(best.aankoperVrij || "").trim().toLowerCase()}`
      : (best.aankoperId || "__geen__");
    const dt = best.datum || "__geen__";
    return `${wk}|${ak}|${dt}`;
  };
  const kasticketData = (key) => (data.kastickets || {})[key] || {};

  // Groepeer per winkel → per kasticket
  const perWinkel = {};
  items.forEach((m) => {
    const wKey = m.winkelId || "__geen__";
    if (!perWinkel[wKey]) perWinkel[wKey] = {};
    const best = bestellingVoor(m.id);
    const kKey = kasticketKey(best, m.winkelId);
    if (!perWinkel[wKey][kKey]) {
      perWinkel[wKey][kKey] = { key: kKey, best, items: [] };
    }
    perWinkel[wKey][kKey].items.push(m);
  });
  const winkelKeys = Object.keys(perWinkel).sort((a, b) => {
    const na = a === "__geen__" ? "zzz" : (winkelById(a)?.naam || "zzz").toLowerCase();
    const nb = b === "__geen__" ? "zzz" : (winkelById(b)?.naam || "zzz").toLowerCase();
    return na.localeCompare(nb);
  });

  const parseBedrag = (v) => {
    const n = parseFloat(String(v == null ? "" : v).replace(",", "."));
    return isNaN(n) ? 0 : n;
  };
  const fmtBedrag = (n) => `€ ${n.toFixed(2).replace(".", ",")}`;

  // Subtotaal per winkel (som van de kasticket-bedragen)
  const subtotaalWinkel = (wKey) => {
    let som = 0;
    Object.values(perWinkel[wKey]).forEach((kt) => {
      som += parseBedrag(kasticketData(kt.key).bedrag);
    });
    return som;
  };
  const eindtotaal = winkelKeys.reduce((acc, wKey) => acc + subtotaalWinkel(wKey), 0);

  // Foto inladen voor een kasticket
  const handleFoto = async (kKey, file) => {
    if (!file) return;
    try {
      const dataUrl = await comprimeerAfbeelding(file, 1100, 0.7);
      updateKasticket(kKey, { foto: dataUrl });
      showToast(t.winkel_foto_geladen);
    } catch (e) {
      alert(t.winkel_foto_fout);
    }
  };

  // ----- Tekst-overzicht (WhatsApp) -----
  const buildOverzichtTekst = () => {
    const r = [];
    r.push(`${t.winkel_overzicht_titel} — ${data.event.naam || t.no_event}`);
    r.push("");
    winkelKeys.forEach((wKey) => {
      const w = wKey === "__geen__" ? null : winkelById(wKey);
      const btw = w && w.btw ? ` (BTW: ${w.btw})` : "";
      r.push(`*${w ? w.naam : t.winkel_geen_winkel}*${btw}`);
      Object.values(perWinkel[wKey]).forEach((kt) => {
        const an = aankoperNaam(kt.best) || "—";
        const dt = kt.best.datum ? formatDate(kt.best.datum, lang) : "—";
        const bedrag = parseBedrag(kasticketData(kt.key).bedrag);
        r.push(`  ${an} · ${dt} — ${fmtBedrag(bedrag)}`);
        kt.items.forEach((m) => {
          const aantal = m.aantal ? `${m.aantal}× ` : "";
          r.push(`    • ${aantal}${matNaam(m)}`);
        });
      });
      r.push(`  ${t.winkel_subtotaal}: ${fmtBedrag(subtotaalWinkel(wKey))}`);
      r.push("");
    });
    r.push(`*${t.winkel_eindtotaal}: ${fmtBedrag(eindtotaal)}*`);
    return r.join("\n").trim();
  };
  const overzichtTekst = buildOverzichtTekst();

  // Angela uit de vrijwilligerslijst zoeken
  const angela = data.vrijwilligers.find((v) => {
    const vol = `${v.voornaam} ${v.naam}`.toLowerCase();
    return vol.includes("angela") && (vol.includes("flores") || vol.includes("janett"));
  });
  const angelaTel = angela ? cleanPhone(angela.gsm1) : "";
  const waLink = angelaTel
    ? `https://wa.me/${angelaTel}?text=${encodeURIComponent(overzichtTekst)}`
    : "";

  const copyOverzicht = async () => {
    try {
      await navigator.clipboard.writeText(overzichtTekst);
      showToast(t.winkel_overzicht_gekopieerd);
    } catch (e) {
      const ta = document.createElement("textarea");
      ta.value = overzichtTekst;
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand("copy"); showToast(t.winkel_overzicht_gekopieerd); }
      catch (e2) { alert(t.cant_copy); }
      document.body.removeChild(ta);
    }
  };

  // ----- PDF genereren -----
  const genereerPDF = () => {
    const jsPDFns = window.jspdf;
    if (!jsPDFns || !jsPDFns.jsPDF) { alert(t.winkel_pdf_fout); return null; }
    const doc = new jsPDFns.jsPDF({ unit: "mm", format: "a4" });
    const pageW = 210, pageH = 297, marge = 16;
    let y = marge;

    const nieuwePagina = (nodig) => {
      if (y + nodig > pageH - marge) { doc.addPage(); y = marge; }
    };

    // Kop
    doc.setFillColor(200, 68, 42);
    doc.rect(0, 0, pageW, 26, "F");
    doc.setTextColor(255, 255, 255);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(16);
    doc.text(t.winkel_overzicht_titel, marge, 13);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.text(`${data.event.naam || t.no_event}${data.event.datum ? " · " + formatDate(data.event.datum, lang) : ""}`, marge, 20);
    y = 34;

    doc.setTextColor(26, 22, 18);

    winkelKeys.forEach((wKey) => {
      const w = wKey === "__geen__" ? null : winkelById(wKey);
      nieuwePagina(20);
      // Winkelkop
      doc.setFillColor(232, 213, 205);
      doc.rect(marge, y, pageW - 2 * marge, 8, "F");
      doc.setFont("helvetica", "bold");
      doc.setFontSize(11);
      doc.text(w ? w.naam : t.winkel_geen_winkel, marge + 2, y + 5.5);
      if (w && w.btw) {
        doc.setFont("helvetica", "normal");
        doc.setFontSize(8);
        doc.text(`BTW: ${w.btw}`, pageW - marge - 2, y + 5.5, { align: "right" });
      }
      y += 12;

      Object.values(perWinkel[wKey]).forEach((kt) => {
        const an = aankoperNaam(kt.best) || "—";
        const dt = kt.best.datum ? formatDate(kt.best.datum, lang) : "—";
        const bedrag = parseBedrag(kasticketData(kt.key).bedrag);
        nieuwePagina(14);
        // Kasticket-regel
        doc.setFont("helvetica", "bold");
        doc.setFontSize(9.5);
        doc.text(`${an}  ·  ${dt}`, marge + 2, y);
        doc.text(fmtBedrag(bedrag), pageW - marge - 2, y, { align: "right" });
        y += 5;
        // Artikelen
        doc.setFont("helvetica", "normal");
        doc.setFontSize(8.5);
        kt.items.forEach((m) => {
          nieuwePagina(5);
          const aantal = m.aantal ? `${m.aantal}× ` : "";
          doc.text(`   • ${aantal}${matNaam(m)}`, marge + 4, y);
          y += 4.2;
        });
        // Foto van het kasticket
        const foto = kasticketData(kt.key).foto;
        if (metFotos && foto) {
          try {
            const props = doc.getImageProperties(foto);
            const maxW = 60, maxH = 75;
            let iw = maxW, ih = (props.height / props.width) * maxW;
            if (ih > maxH) { ih = maxH; iw = (props.width / props.height) * maxH; }
            nieuwePagina(ih + 4);
            doc.addImage(foto, "JPEG", marge + 4, y, iw, ih);
            y += ih + 4;
          } catch (e) { /* foto overslaan bij fout */ }
        }
        y += 2;
      });

      // Subtotaal winkel
      nieuwePagina(8);
      doc.setDrawColor(217, 207, 193);
      doc.line(marge + 2, y, pageW - marge - 2, y);
      y += 4.5;
      doc.setFont("helvetica", "bold");
      doc.setFontSize(9);
      doc.text(`${t.winkel_subtotaal}`, marge + 2, y);
      doc.text(fmtBedrag(subtotaalWinkel(wKey)), pageW - marge - 2, y, { align: "right" });
      y += 9;
    });

    // Eindtotaal
    nieuwePagina(14);
    doc.setFillColor(26, 22, 18);
    doc.rect(marge, y, pageW - 2 * marge, 10, "F");
    doc.setTextColor(255, 255, 255);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(11);
    doc.text(t.winkel_eindtotaal, marge + 3, y + 6.5);
    doc.text(fmtBedrag(eindtotaal), pageW - marge - 3, y + 6.5, { align: "right" });

    return doc;
  };

  const downloadPDF = () => {
    setBezig(true);
    try {
      const doc = genereerPDF();
      if (!doc) return;
      const naam = `winkelbestellingen_${(data.event.naam || "evenement").replace(/[^a-z0-9]/gi, "_")}.pdf`;
      doc.save(naam);
      showToast(t.winkel_pdf_klaar);
    } finally {
      setBezig(false);
    }
  };

  const pdfEnWhatsApp = () => {
    setBezig(true);
    try {
      const doc = genereerPDF();
      if (!doc) return;
      const naam = `winkelbestellingen_${(data.event.naam || "evenement").replace(/[^a-z0-9]/gi, "_")}.pdf`;
      doc.save(naam);
      if (waLink) window.open(waLink, "_blank", "noopener");
      showToast(t.winkel_pdf_wa);
    } finally {
      setBezig(false);
    }
  };

  return (
    <div>
      <div className="card" style={{ marginBottom: "1.5rem" }}>
        <h2 className="font-display" style={{ marginTop: 0, fontSize: "1.4rem" }}>{t.tab_winkelbestellingen}</h2>
        <p style={{ color: "var(--ink-soft)", fontSize: "0.9rem", margin: 0 }}>{t.winkel_best_intro}</p>
      </div>

      {items.length === 0 ? (
        <div className="card" style={{ textAlign: "center", color: "var(--ink-soft)" }}>{t.winkel_best_geen}</div>
      ) : (
        <div>
          {/* Bewerkbare lijst per item */}
          <div style={{ display: "grid", gap: "0.7rem", marginBottom: "1.5rem" }}>
            {items.map((m) => {
              const best = bestellingVoor(m.id);
              const w = winkelById(m.winkelId);
              const aankoperIsExtern = best.aankoperId === "__extern__";
              return (
                <div key={m.id} className="card" style={{ borderLeft: "3px solid var(--gold)" }}>
                  <div style={{ display: "grid", gridTemplateColumns: "1.4fr 0.5fr 1.2fr 1fr 1.3fr", gap: "0.5rem", alignItems: "end" }}>
                    <Field label={t.mat_naam}>
                      <input className="input" value={matNaam(m)} readOnly
                        style={{ background: "var(--bg)", color: "var(--ink-soft)" }} />
                    </Field>
                    <Field label={t.mat_aantal}>
                      <input className="input" value={m.aantal || ""} readOnly
                        style={{ background: "var(--bg)", color: "var(--ink-soft)" }} />
                    </Field>
                    <Field label={t.winkel_naam}>
                      <input className="input" value={w ? w.naam : t.winkel_geen_winkel} readOnly
                        style={{ background: "var(--bg)", color: "var(--ink-soft)" }} />
                    </Field>
                    <Field label={t.winkel_datum}>
                      <input type="date" className="input" value={best.datum || ""}
                        onChange={(e) => updateWinkelbestelling(m.id, { datum: e.target.value })} />
                    </Field>
                    <Field label={t.winkel_aankoper}>
                      <select className="select" value={best.aankoperId || ""}
                        onChange={(e) => updateWinkelbestelling(m.id, {
                          aankoperId: e.target.value,
                          aankoperVrij: e.target.value === "__extern__" ? (best.aankoperVrij || "") : "",
                        })}>
                        <option value="">{t.mat_choose}</option>
                        <optgroup label={t.tab_vrijwilligers}>
                          {sortedVrij.map((v) => <option key={v.id} value={v.id}>{v.naam} {v.voornaam}</option>)}
                        </optgroup>
                        <option value="__extern__">{t.winkel_extern_koper}</option>
                      </select>
                    </Field>
                  </div>
                  {w && w.btw && (
                    <p style={{ fontSize: "0.75rem", color: "var(--ink-soft)", margin: "0.4rem 0 0" }}>
                      {t.winkel_btw}: {w.btw}
                    </p>
                  )}
                  {!w && (
                    <p style={{ fontSize: "0.78rem", color: "var(--accent)", margin: "0.4rem 0 0" }}>
                      {t.winkel_geen_gekozen}
                    </p>
                  )}
                  {aankoperIsExtern && (
                    <div style={{ marginTop: "0.5rem" }}>
                      <input className="input" placeholder={t.winkel_extern_naam} value={best.aankoperVrij || ""}
                        onChange={(e) => updateWinkelbestelling(m.id, { aankoperVrij: e.target.value })} />
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Overzicht per winkel + kasticket */}
          <div className="card" style={{ marginBottom: "1.5rem" }}>
            <h3 className="font-display" style={{ marginTop: 0, fontSize: "1.15rem" }}>{t.winkel_overzicht_titel}</h3>
            <p style={{ fontSize: "0.8rem", color: "var(--ink-soft)", marginTop: 0 }}>{t.winkel_kasticket_uitleg}</p>
            {winkelKeys.map((wKey) => {
              const w = wKey === "__geen__" ? null : winkelById(wKey);
              return (
                <div key={wKey} style={{ marginBottom: "1.2rem" }}>
                  <div style={{ display: "flex", alignItems: "baseline", gap: "0.6rem", flexWrap: "wrap",
                    borderBottom: "2px solid var(--accent-soft)", paddingBottom: "0.3rem", marginBottom: "0.5rem" }}>
                    <strong className="font-display" style={{ fontSize: "1.05rem" }}>
                      {w ? w.naam : t.winkel_geen_winkel}
                    </strong>
                    {w && w.btw && (
                      <span style={{ fontSize: "0.78rem", color: "var(--ink-soft)" }}>{t.winkel_btw}: {w.btw}</span>
                    )}
                  </div>
                  {Object.values(perWinkel[wKey]).map((kt) => {
                    const an = aankoperNaam(kt.best) || "—";
                    const dt = kt.best.datum ? formatDate(kt.best.datum, lang) : "—";
                    const kd = kasticketData(kt.key);
                    return (
                      <div key={kt.key} style={{ border: "1px solid var(--line)", borderRadius: 3,
                        padding: "0.7rem 0.8rem", marginBottom: "0.5rem", background: "white" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", gap: "1rem", flexWrap: "wrap", alignItems: "center" }}>
                          <strong style={{ fontSize: "0.9rem" }}>{an} · {dt}</strong>
                        </div>
                        <ul style={{ margin: "0.4rem 0", paddingLeft: "1.2rem", fontSize: "0.85rem", color: "var(--ink-soft)" }}>
                          {kt.items.map((m) => (
                            <li key={m.id}>{m.aantal ? `${m.aantal}× ` : ""}{matNaam(m)}</li>
                          ))}
                        </ul>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0.6rem", alignItems: "end", marginTop: "0.4rem" }}>
                          <Field label={t.winkel_bedrag}>
                            <input className="input" inputMode="decimal" placeholder="0,00"
                              value={kd.bedrag || ""}
                              onChange={(e) => updateKasticket(kt.key, { bedrag: e.target.value })} />
                          </Field>
                          <Field label={t.winkel_foto}>
                            <input type="file" accept="image/*" className="input"
                              style={{ padding: "0.35rem" }}
                              onChange={(e) => { handleFoto(kt.key, e.target.files[0]); e.target.value = ""; }} />
                          </Field>
                        </div>
                        <label style={{ display: "flex", alignItems: "center", gap: "0.4rem",
                          marginTop: "0.5rem", fontSize: "0.83rem", cursor: "pointer" }}>
                          <input type="checkbox" checked={!!kd.uitKas}
                            onChange={(e) => updateKasticket(kt.key, { uitKas: e.target.checked })} />
                          {t.winkel_uit_kas}
                        </label>
                        {kd.foto && (
                          <div style={{ marginTop: "0.5rem", display: "flex", gap: "0.6rem", alignItems: "flex-start", flexWrap: "wrap" }}>
                            <img src={kd.foto} alt="kasticket"
                              style={{ maxWidth: 120, maxHeight: 150, border: "1px solid var(--line)", borderRadius: 3 }} />
                            <button className="btn btn-danger btn-sm" onClick={() => updateKasticket(kt.key, { foto: "" })}>
                              {t.winkel_foto_verwijder}
                            </button>
                          </div>
                        )}
                      </div>
                    );
                  })}
                  <div style={{ textAlign: "right", fontSize: "0.9rem", fontWeight: 600, marginTop: "0.3rem" }}>
                    {t.winkel_subtotaal}: {fmtBedrag(subtotaalWinkel(wKey))}
                  </div>
                </div>
              );
            })}
            <div style={{ borderTop: "2px solid var(--ink)", marginTop: "0.5rem", paddingTop: "0.5rem",
              textAlign: "right", fontSize: "1.05rem", fontWeight: 700 }} className="font-display">
              {t.winkel_eindtotaal}: {fmtBedrag(eindtotaal)}
            </div>
          </div>

          {/* Verzenden */}
          <div className="card">
            <h3 className="font-display" style={{ marginTop: 0, fontSize: "1.15rem" }}>{t.winkel_verzend_titel}</h3>
            {!angela ? (
              <p style={{ color: "var(--accent)", fontSize: "0.85rem" }}>{t.winkel_geen_angela}</p>
            ) : !angelaTel ? (
              <p style={{ color: "var(--accent)", fontSize: "0.85rem" }}>{t.winkel_angela_geen_gsm}</p>
            ) : (
              <p style={{ color: "var(--ink-soft)", fontSize: "0.85rem" }}>
                {t.winkel_verzend_naar} <strong>{angela.voornaam} {angela.naam}</strong> · {angela.gsm1}
              </p>
            )}

            <div className={`switch ${metFotos ? "on" : ""}`} style={{ margin: "0.5rem 0 0.8rem" }}
              onClick={() => setMetFotos(!metFotos)}>
              <span className="switch-track"></span>
              <span style={{ fontSize: "0.85rem", fontWeight: 500 }}>{t.winkel_pdf_metfotos}</span>
            </div>

            <details style={{ margin: "0.3rem 0 0.7rem" }}>
              <summary style={{ fontSize: "0.85rem", color: "var(--ink-soft)" }}>
                <span className="chevron">▶</span> {t.winkel_toon_tekst}
              </summary>
              <pre style={{ marginTop: "0.5rem", padding: "0.8rem", background: "var(--bg)",
                border: "1px solid var(--line)", borderRadius: 3, whiteSpace: "pre-wrap",
                fontFamily: "inherit", fontSize: "0.85rem" }}>{overzichtTekst}</pre>
            </details>

            <div style={{ display: "flex", gap: "0.4rem", flexWrap: "wrap" }}>
              <button className="btn btn-primary btn-sm" onClick={downloadPDF} disabled={bezig}>
                {t.winkel_pdf_knop}
              </button>
              <button className="btn btn-whatsapp btn-sm" onClick={pdfEnWhatsApp} disabled={bezig || !waLink}>
                {t.winkel_pdf_wa_knop}
              </button>
              <button className="btn btn-ghost btn-sm" onClick={copyOverzicht}>{t.copy_msg}</button>
              {waLink && (
                <a className="btn btn-ghost btn-sm" href={waLink} target="_blank" rel="noopener"
                  style={{ textDecoration: "none" }}>{t.winkel_tekst_wa_knop}</a>
              )}
            </div>
            <p style={{ fontSize: "0.75rem", color: "var(--ink-soft)", margin: "0.7rem 0 0" }}>
              {t.winkel_pdf_hint}
            </p>
          </div>
        </div>
      )}
    </div>
  );
}


// ============================================================
// KOSTENBEHEER — budget, zaalhuur, winkelkosten, manuele kosten, grafiek, PDF
// ============================================================
function KostenbeheerTab({ data, updateKostenbeheer, addManueleKost, updateManueleKost, removeManueleKost,
  addKasBeweging, updateKasBeweging, removeKasBeweging, updateKasticket, showToast, t }) {
  const lang = data.taal === "fr" ? "fr" : "nl";
  const kb = data.kostenbeheer || { budget: "", zaalhuur: "", manueleKosten: [] };
  const k = berekenKosten(data);
  const [bezig, setBezig] = React.useState(false);

  // Grafiekdata: kostenposten
  const posten = [];
  if (k.zaalhuur > 0) posten.push({ label: t.kb_zaal, bedrag: k.zaalhuur, kleur: "#c4442a" });
  Object.keys(k.winkelPerNaam).sort().forEach((naam, i) => {
    const tinten = ["#3a7d44", "#4a9d54", "#5cb867", "#73c97e", "#8ad994"];
    posten.push({ label: naam, bedrag: k.winkelPerNaam[naam], kleur: tinten[i % tinten.length] });
  });
  (kb.manueleKosten || []).forEach((mk) => {
    const bedrag = parseBedragNum(mk.bedrag);
    if (bedrag > 0) posten.push({ label: mk.naam || t.kb_manueel, bedrag, kleur: "#d99b2a" });
  });

  const maxWaarde = Math.max(k.budget, k.totaalUitgegeven, 1);
  const overBudget = k.budget > 0 && k.saldo < 0;

  // ----- PDF genereren -----
  const genereerPDF = () => {
    const jsPDFns = window.jspdf;
    if (!jsPDFns || !jsPDFns.jsPDF) { alert(t.kb_pdf_fout); return null; }
    const doc = new jsPDFns.jsPDF({ unit: "mm", format: "a4" });
    const pageW = 210, pageH = 297, marge = 16;
    let y = marge;
    const nieuwePagina = (nodig) => { if (y + nodig > pageH - marge) { doc.addPage(); y = marge; } };

    // Kop
    doc.setFillColor(200, 68, 42);
    doc.rect(0, 0, pageW, 26, "F");
    doc.setTextColor(255, 255, 255);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(16);
    doc.text(t.tab_kostenbeheer, marge, 13);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.text(`${data.event.naam || t.no_event}${data.event.datum ? " · " + formatDate(data.event.datum, lang) : ""}`, marge, 20);
    y = 36;
    doc.setTextColor(26, 22, 18);

    // Budget-blok
    doc.setFont("helvetica", "bold");
    doc.setFontSize(11);
    doc.text(t.kb_overzicht, marge, y); y += 7;
    doc.setFontSize(9.5);
    const regel = (label, waarde, vet) => {
      nieuwePagina(7);
      doc.setFont("helvetica", vet ? "bold" : "normal");
      doc.text(label, marge + 2, y);
      doc.text(fmtEuro(waarde), pageW - marge - 2, y, { align: "right" });
      y += 6;
    };
    regel(t.kb_budget, k.budget, true);
    y += 2;
    regel(t.kb_zaal, k.zaalhuur);
    Object.keys(k.winkelPerNaam).sort().forEach((naam) => regel(`${t.kb_winkel}: ${naam}`, k.winkelPerNaam[naam]));
    (kb.manueleKosten || []).forEach((mk) => {
      const b = parseBedragNum(mk.bedrag);
      if (b > 0) regel(mk.naam || t.kb_manueel, b);
    });
    y += 1;
    doc.setDrawColor(217, 207, 193);
    doc.line(marge + 2, y, pageW - marge - 2, y); y += 5;
    regel(t.kb_totaal_uit, k.totaalUitgegeven, true);
    y += 3;

    // Saldo-balk
    nieuwePagina(14);
    if (overBudget) doc.setFillColor(200, 68, 42); else doc.setFillColor(58, 125, 68);
    doc.rect(marge, y, pageW - 2 * marge, 11, "F");
    doc.setTextColor(255, 255, 255);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(11);
    doc.text(overBudget ? t.kb_over : t.kb_saldo, marge + 3, y + 7);
    doc.text(fmtEuro(Math.abs(k.saldo)), pageW - marge - 3, y + 7, { align: "right" });
    y += 18;
    doc.setTextColor(26, 22, 18);

    // Staafdiagram: budget vs uitgegeven
    nieuwePagina(40);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(11);
    doc.text(t.kb_grafiek, marge, y); y += 8;
    const balkMaxW = pageW - 2 * marge - 40;
    const tekenBalk = (label, waarde, kleurRGB) => {
      nieuwePagina(12);
      doc.setFont("helvetica", "normal");
      doc.setFontSize(8.5);
      doc.text(label, marge, y + 4);
      const w = maxWaarde > 0 ? (waarde / maxWaarde) * balkMaxW : 0;
      doc.setFillColor(kleurRGB[0], kleurRGB[1], kleurRGB[2]);
      doc.rect(marge + 32, y, Math.max(w, 0.5), 6, "F");
      doc.text(fmtEuro(waarde), marge + 32 + Math.max(w, 0.5) + 2, y + 4.5);
      y += 10;
    };
    tekenBalk(t.kb_budget, k.budget, [120, 120, 120]);
    tekenBalk(t.kb_totaal_uit, k.totaalUitgegeven, overBudget ? [200, 68, 42] : [58, 125, 68]);
    y += 4;

    // Kostenverdeling
    if (posten.length > 0) {
      nieuwePagina(14 + posten.length * 10);
      doc.setFont("helvetica", "bold");
      doc.setFontSize(10);
      doc.text(t.kb_verdeling, marge, y); y += 7;
      const maxPost = Math.max(...posten.map((p) => p.bedrag), 1);
      posten.forEach((p) => {
        nieuwePagina(12);
        doc.setFont("helvetica", "normal");
        doc.setFontSize(8.5);
        doc.text(p.label.length > 22 ? p.label.slice(0, 21) + "…" : p.label, marge, y + 4);
        const w = (p.bedrag / maxPost) * balkMaxW;
        const rgb = hexNaarRgb(p.kleur);
        doc.setFillColor(rgb[0], rgb[1], rgb[2]);
        doc.rect(marge + 32, y, Math.max(w, 0.5), 6, "F");
        doc.text(fmtEuro(p.bedrag), marge + 32 + Math.max(w, 0.5) + 2, y + 4.5);
        y += 10;
      });
    }

    // Kasoverzicht (cash tijdens evenement)
    const heeftKas = k.kasStart || k.kasIn || k.kasUitTotaal ||
      (kb.kasBewegingen || []).length > 0 || k.winkelUitKas.length > 0;
    if (heeftKas) {
      nieuwePagina(14);
      y += 4;
      doc.setFillColor(232, 213, 205);
      doc.rect(marge, y, pageW - 2 * marge, 8, "F");
      doc.setFont("helvetica", "bold");
      doc.setFontSize(11);
      doc.text(t.kas_titel, marge + 2, y + 5.5);
      y += 13;

      const kasRegel = (label, waarde, teken, vet) => {
        nieuwePagina(7);
        doc.setFont("helvetica", vet ? "bold" : "normal");
        doc.setFontSize(9.5);
        doc.text(label, marge + 2, y);
        doc.text(`${teken || ""}${fmtEuro(waarde)}`, pageW - marge - 2, y, { align: "right" });
        y += 6;
      };
      kasRegel(t.kas_start, k.kasStart, "", true);
      (kb.kasBewegingen || []).forEach((b) => {
        const bed = parseBedragNum(b.bedrag);
        if (bed === 0) return;
        kasRegel(`  ${b.naam || (b.type === "uit" ? t.kas_uit : t.kas_in)}`, bed, b.type === "uit" ? "− " : "+ ");
      });
      k.winkelUitKas.forEach((w) => {
        kasRegel(`  ${t.kas_winkel}: ${w.winkel}`, w.bedrag, "− ");
      });
      y += 1;
      doc.setDrawColor(217, 207, 193);
      doc.line(marge + 2, y, pageW - marge - 2, y); y += 5;
      nieuwePagina(12);
      if (k.kasEind < 0) doc.setFillColor(200, 68, 42); else doc.setFillColor(58, 125, 68);
      doc.rect(marge, y, pageW - 2 * marge, 10, "F");
      doc.setTextColor(255, 255, 255);
      doc.setFont("helvetica", "bold");
      doc.setFontSize(10.5);
      doc.text(t.kas_eindsaldo, marge + 3, y + 6.5);
      doc.text(fmtEuro(k.kasEind), pageW - marge - 3, y + 6.5, { align: "right" });
      doc.setTextColor(26, 22, 18);
      y += 14;
    }

    return doc;
  };

  const downloadPDF = () => {
    setBezig(true);
    try {
      const doc = genereerPDF();
      if (!doc) return;
      const naam = `kostenbeheer_${(data.event.naam || "evenement").replace(/[^a-z0-9]/gi, "_")}.pdf`;
      doc.save(naam);
      showToast(t.kb_pdf_klaar);
    } finally { setBezig(false); }
  };

  // Leeg, afdrukbaar kasblad om tijdens het evenement op papier in te vullen
  const downloadKasblad = () => {
    const jsPDFns = window.jspdf;
    if (!jsPDFns || !jsPDFns.jsPDF) { alert(t.kb_pdf_fout); return; }
    const doc = new jsPDFns.jsPDF({ unit: "mm", format: "a4" });
    const pageW = 210, pageH = 297, marge = 16;

    doc.setFillColor(200, 68, 42);
    doc.rect(0, 0, pageW, 26, "F");
    doc.setTextColor(255, 255, 255);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(16);
    doc.text(t.kas_blad_titel, marge, 13);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.text(`${data.event.naam || ""}${data.event.datum ? " · " + formatDate(data.event.datum, lang) : ""}`, marge, 20);

    doc.setTextColor(26, 22, 18);
    let y = 38;
    doc.setFont("helvetica", "normal");
    doc.setFontSize(9.5);
    doc.text(`${t.kas_start}: __________________`, marge, y);
    y += 10;

    // Tabelkop
    const kol = [marge, marge + 28, marge + 116, marge + 150];
    doc.setFont("helvetica", "bold");
    doc.setFontSize(9);
    doc.text(t.kas_blad_tijd, kol[0], y);
    doc.text(t.kas_omschrijving, kol[1], y);
    doc.text(t.kas_blad_in, kol[2], y);
    doc.text(t.kas_blad_uit, kol[3], y);
    y += 2;
    doc.setDrawColor(180, 180, 180);
    doc.line(marge, y, pageW - marge, y);
    y += 6;

    // Lege rijen om met de hand in te vullen
    doc.setFont("helvetica", "normal");
    while (y < pageH - 30) {
      doc.line(marge, y + 2, pageW - marge, y + 2);
      y += 9;
    }
    doc.setFont("helvetica", "bold");
    doc.setFontSize(9.5);
    doc.text(`${t.kas_eindsaldo}: __________________`, marge, pageH - 18);

    doc.save(`kasblad_${(data.event.naam || "evenement").replace(/[^a-z0-9]/gi, "_")}.pdf`);
  };

  return (

          <Field label={t.kb_zaal}>

// Hex-kleur naar [r,g,b]
function hexNaarRgb(hex) {
  const h = hex.replace("#", "");
  return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)];
}

// ============================================================
// WOORDENBOEK
// ============================================================
function WoordenboekTab({ dict, update, showToast, t }) {
  const [zoek, setZoek] = useState("");
  const [nieuwNl, setNieuwNl] = useState("");
  const [nieuwFr, setNieuwFr] = useState("");

  const entries = Object.entries(dict).sort((a, b) => a[0].localeCompare(b[0]));
  const filtered = entries.filter(([nl, fr]) => {
    const s = zoek.toLowerCase();
    return nl.toLowerCase().includes(s) || fr.toLowerCase().includes(s);
  });

  const addEntry = () => {
    if (!nieuwNl.trim() || !nieuwFr.trim()) { alert(t.fill_both); return; }
    update({ ...dict, [nieuwNl.trim().toLowerCase()]: nieuwFr.trim().toLowerCase() });
    setNieuwNl(""); setNieuwFr("");
    showToast("✓");
  };

  const removeEntry = (nl) => {
    if (!confirm(t.confirm_remove_term(nl))) return;
    const newDict = { ...dict };
    delete newDict[nl];
    update(newDict);
  };

  const updateEntry = (nl, newFr) => update({ ...dict, [nl]: (newFr || "").toLowerCase() });

  const resetDict = () => {
    if (!confirm(t.confirm_restore_dict)) return;
    update(defaultDictionary);
    showToast("✓");
  };

  return (
    <div>
      <div className="card" style={{ marginBottom: "1.5rem" }}>
        <h2 className="font-display" style={{ marginTop: 0, fontSize: "1.4rem" }}>{t.woord_title}</h2>
        <p style={{ color: "var(--ink-soft)", fontSize: "0.9rem" }}>{t.woord_intro}</p>
      </div>

      <div className="card" style={{ marginBottom: "1.5rem" }}>
        <h3 className="font-display" style={{ marginTop: 0, fontSize: "1.1rem" }}>{t.new_term}</h3>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr auto", gap: "0.5rem", alignItems: "end" }}>
          <Field label={t.dutch}>
            <input className="input" value={nieuwNl} onChange={(e) => setNieuwNl(e.target.value)} />
          </Field>
          <Field label={t.french}>
            <input className="input" value={nieuwFr} onChange={(e) => setNieuwFr(e.target.value)} />
          </Field>
          <button className="btn btn-primary" onClick={addEntry}>{t.add}</button>
        </div>
      </div>

      <div style={{ display: "flex", gap: "1rem", marginBottom: "1rem", flexWrap: "wrap" }}>
        <input className="input" placeholder={t.search_dict} value={zoek}
          onChange={(e) => setZoek(e.target.value)} style={{ maxWidth: 300 }} />
        <button className="btn btn-ghost btn-sm" onClick={resetDict}>{t.restore_default}</button>
        <span style={{ color: "var(--ink-soft)", fontSize: "0.85rem", alignSelf: "center" }}>
          {entries.length} {t.terms}
        </span>
      </div>

      <div className="card">
        {filtered.length === 0 ? (
          <p style={{ color: "var(--ink-soft)", textAlign: "center", margin: 0 }}>{t.no_terms}</p>
        ) : (
          filtered.map(([nl, fr]) => (
            <div key={nl} className="dict-row">
              <div style={{ fontSize: "0.9rem" }}>{nl}</div>
              <input className="input" value={fr} onChange={(e) => updateEntry(nl, e.target.value)} />
              <button className="btn btn-danger btn-sm" onClick={() => removeEntry(nl)}>✕</button>
            </div>
          ))
        )}
      </div>
    </div>
  );
}

// ============================================================
// ERROR BOUNDARY
// ============================================================
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { console.error("App-fout:", error, info); }
  render() {
    if (this.state.error) {
      return (
        <div style={{ padding: "2rem", fontFamily: "system-ui, sans-serif", maxWidth: 800, margin: "0 auto" }}>
          <h1 style={{ color: "#c8442a" }}>Er ging iets mis</h1>
          <p>De app kon niet laden. Klik op onderstaande knop om alle lokale data te wissen en opnieuw te beginnen.</p>
          <pre style={{ background: "#fbf8f2", padding: "1rem", border: "1px solid #d9cfc1", borderRadius: 4, overflow: "auto", fontSize: "0.85rem" }}>
            {String(this.state.error && this.state.error.message)}
          </pre>
          <button onClick={() => {
            ["evenement_beheer_data_v4", "evenement_beheer_data_v3", "evenement_beheer_data_v2", "evenement_beheer_data_v1"].forEach((k) => localStorage.removeItem(k));
            location.reload();
          }} style={{ background: "#c8442a", color: "white", border: "none", padding: "0.7rem 1.2rem", borderRadius: 3, cursor: "pointer", fontSize: "0.9rem" }}>
            Wis lokale data en herstart
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ErrorBoundary><App /></ErrorBoundary>);
