function MateriaalTab({ materiaal, oorsprongLijst, vrijwilligers, externeContacten, dict, taal, add, update, remove, addLocatie, removeLocatie, exportMateriaal, t }) {
  const sortedVrij = [...vrijwilligers].sort((a, b) => {
    const an = (a.naam || "").toLowerCase();
    const bn = (b.naam || "").toLowerCase();
    if (an !== bn) return an.localeCompare(bn);
    return (a.voornaam || "").toLowerCase().localeCompare((b.voornaam || "").toLowerCase());
  });
  const sortedExtern = [...(externeContacten || [])].sort((a, b) =>
    (a.naam || "").toLowerCase().localeCompare((b.naam || "").toLowerCase())
  );

  return (
    <div>
      <div className="card" style={{ marginBottom: "1.5rem" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: "1rem", flexWrap: "wrap" }}>
          <div style={{ flex: 1, minWidth: 250 }}>
            <h2 className="font-display" style={{ marginTop: 0, fontSize: "1.4rem" }}>{t.mat_title}</h2>
            <p style={{ color: "var(--ink-soft)", fontSize: "0.9rem", margin: 0 }}>{t.mat_intro}</p>
          </div>
          <div style={{ display: "flex", gap: "0.5rem", flexWrap: "wrap" }}>
            {materiaal.length > 0 && exportMateriaal && (
              <button className="btn btn-ghost" onClick={exportMateriaal}>{t.mat_export}</button>
            )}
            <button className="btn btn-primary" onClick={add}>{t.mat_add}</button>
          </div>
        </div>

        <details style={{ marginTop: "1rem", paddingTop: "1rem", borderTop: "1px dashed var(--line)" }}>
          <summary style={{ fontSize: "0.85rem", color: "var(--ink-soft)", cursor: "pointer" }}>
            <span className="chevron">▶</span> {t.mat_manage_loc} ({(oorsprongLijst || []).length})
          </summary>
          <div style={{ marginTop: "0.8rem", display: "flex", flexWrap: "wrap", gap: "0.4rem" }}>
            {(oorsprongLijst || []).length === 0 ? (
              <em style={{ color: "var(--ink-soft)", fontSize: "0.85rem" }}>—</em>
            ) : (
              oorsprongLijst.map((loc) => (
                <span key={loc} style={{
                  display: "inline-flex", alignItems: "center", gap: "0.4rem",
                  padding: "0.3rem 0.7rem", background: "var(--bg)", border: "1px solid var(--line)",
                  borderRadius: 999, fontSize: "0.85rem",
                }}>
                  {loc}
                  <button onClick={() => removeLocatie(loc)} title={t.remove}
                    style={{ background: "none", border: "none", color: "var(--accent)",
                      cursor: "pointer", padding: 0, fontSize: "0.85rem", lineHeight: 1 }}>✕</button>
                </span>
              ))
            )}
          </div>
        </details>
      </div>

      {materiaal.length === 0 ? (
        <div className="card" style={{ textAlign: "center", color: "var(--ink-soft)" }}>{t.mat_no_items}</div>
      ) : (
        <div style={{ display: "grid", gap: "0.7rem" }}>
          {materiaal.map((m) => (
            <MateriaalRij key={m.id} m={m} sortedVrij={sortedVrij} sortedExtern={sortedExtern} oorsprongLijst={oorsprongLijst}
              dict={dict} update={update} remove={remove} addLocatie={addLocatie} removeLocatie={removeLocatie} t={t} />
          ))}
        </div>
      )}
    </div>
  );
}

function MateriaalRij({ m, sortedVrij, sortedExtern, oorsprongLijst, dict, update, remove, addLocatie, removeLocatie, t }) {
  const handleNlBlur = () => {
    // Normaliseer naar lowercase bij verlaten van veld
    if (m.naamNl) update(m.id, { naamNl: normalizeName(m.naamNl) });
    if (m.naamNl && !m.naamFr) {
      const tr = translateText(m.naamNl, "nl", "fr", dict);
      if (tr) update(m.id, { naamFr: normalizeName(tr) });
    }
  };
  const handleFrBlur = () => {
    if (m.naamFr) update(m.id, { naamFr: normalizeName(m.naamFr) });
    if (m.naamFr && !m.naamNl) {
      const tr = translateText(m.naamFr, "fr", "nl", dict);
      if (tr) update(m.id, { naamNl: normalizeName(tr) });
    }
  };

  const verantwIsAnder = m.verantwoordelijkeId === "__ander__";

  return (
    <div className="card" style={{ borderLeft: "3px solid var(--accent)" }}>
      <div style={{ display: "grid", gridTemplateColumns: "1.4fr 1.4fr 0.6fr 1fr 1.2fr auto", gap: "0.5rem", alignItems: "end" }}>
        <Field label={`${t.mat_naam} (NL)`}>
          <input className="input" value={capitalize(m.naamNl)}
            onChange={(e) => update(m.id, { naamNl: e.target.value })} onBlur={handleNlBlur} />
        </Field>
        <Field label={`${t.mat_naam} (FR)`}>
          <input className="input" value={capitalize(m.naamFr)}
            onChange={(e) => update(m.id, { naamFr: e.target.value })} onBlur={handleFrBlur} />
        </Field>
        <Field label={t.mat_aantal}>
          <input type="number" className="input" value={m.aantal}
            onChange={(e) => update(m.id, { aantal: e.target.value })} min="0" />
        </Field>
        <Field label={t.mat_oorsprong}>
          <select className="select" value={m.oorsprong}
            onChange={(e) => {
              if (e.target.value === "__add__") { addLocatie(); return; }
              update(m.id, { oorsprong: e.target.value });
            }}>
            <option value="">{t.mat_choose}</option>
            {oorsprongLijst.map((loc) => <option key={loc} value={loc}>{loc}</option>)}
            <option value="__add__">{t.mat_new_loc}</option>
          </select>
        </Field>
        <Field label={t.mat_verant}>
          <select className="select" value={m.verantwoordelijkeId}
            onChange={(e) => update(m.id, { verantwoordelijkeId: e.target.value, verantwoordelijkeVrij: e.target.value === "__ander__" ? m.verantwoordelijkeVrij : "" })}>
            <option value="">{t.mat_choose}</option>
            {sortedVrij.length > 0 && (
              <optgroup label={t.tab_vrijwilligers}>
                {sortedVrij.map((v) => <option key={v.id} value={v.id}>{v.naam} {v.voornaam}</option>)}
              </optgroup>
            )}
            {sortedExtern && sortedExtern.length > 0 && (
              <optgroup label={t.external_contacts}>
                {sortedExtern.map((c) => <option key={c.id} value={c.id}>{c.naam}</option>)}
              </optgroup>
            )}
            <option value="__ander__">{t.mat_other}</option>
          </select>
        </Field>
        <button className="btn btn-danger btn-sm" onClick={() => remove(m.id)} title={t.remove}>🗑</button>
      </div>
      {verantwIsAnder && (
        <div style={{ marginTop: "0.5rem" }}>
          <input className="input" placeholder={t.mat_other_ph} value={m.verantwoordelijkeVrij || ""}
            onChange={(e) => update(m.id, { verantwoordelijkeVrij: e.target.value })} />
        </div>
      )}
    </div>
  );
}

// WOORDENBOEK
// ============================================================
function WoordenboekTab({ dict, update, showToast, t }) {
  const [zoek, setZoek] = useState("");
  const [nieuwNl, setNieuwNl] = useState("");
  const [nieuwFr, setNieuwFr] = useState("");

  const entries = Object.entries(dict).sort((a, b) => a[0].localeCompare(b[0]));
  const filtered = entries.filter(([nl, fr]) => {
    const s = zoek.toLowerCase();
    return nl.toLowerCase().includes(s) || fr.toLowerCase().includes(s);
  });

  const addEntry = () => {
    if (!nieuwNl.trim() || !nieuwFr.trim()) { alert(t.fill_both); return; }
    update({ ...dict, [nieuwNl.trim().toLowerCase()]: nieuwFr.trim().toLowerCase() });
    setNieuwNl(""); setNieuwFr("");
    showToast("✓");
  };

  const removeEntry = (nl) => {
    if (!confirm(t.confirm_remove_term(nl))) return;
    const newDict = { ...dict };
    delete newDict[nl];
    update(newDict);
  };

  const updateEntry = (nl, newFr) => update({ ...dict, [nl]: (newFr || "").toLowerCase() });

  const resetDict = () => {
    if (!confirm(t.confirm_restore_dict)) return;
    update(defaultDictionary);
    showToast("✓");
  };

  return (
    <div>
      <div className="card" style={{ marginBottom: "1.5rem" }}>
        <h2 className="font-display" style={{ marginTop: 0, fontSize: "1.4rem" }}>{t.woord_title}</h2>
        <p style={{ color: "var(--ink-soft)", fontSize: "0.9rem" }}>{t.woord_intro}</p>
      </div>

      <div className="card" style={{ marginBottom: "1.5rem" }}>
        <h3 className="font-display" style={{ marginTop: 0, fontSize: "1.1rem" }}>{t.new_term}</h3>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr auto", gap: "0.5rem", alignItems: "end" }}>
          <Field label={t.dutch}>
            <input className="input" value={nieuwNl} onChange={(e) => setNieuwNl(e.target.value)} />
          </Field>
          <Field label={t.french}>
            <input className="input" value={nieuwFr} onChange={(e) => setNieuwFr(e.target.value)} />
          </Field>
          <button className="btn btn-primary" onClick={addEntry}>{t.add}</button>
        </div>
      </div>

      <div style={{ display: "flex", gap: "1rem", marginBottom: "1rem", flexWrap: "wrap" }}>
        <input className="input" placeholder={t.search_dict} value={zoek}
          onChange={(e) => setZoek(e.target.value)} style={{ maxWidth: 300 }} />
        <button className="btn btn-ghost btn-sm" onClick={resetDict}>{t.restore_default}</button>
        <span style={{ color: "var(--ink-soft)", fontSize: "0.85rem", alignSelf: "center" }}>
          {entries.length} {t.terms}
        </span>
      </div>

      <div className="card">
        {filtered.length === 0 ? (
          <p style={{ color: "var(--ink-soft)", textAlign: "center", margin: 0 }}>{t.no_terms}</p>
        ) : (
          filtered.map(([nl, fr]) => (
            <div key={nl} className="dict-row">
              <div style={{ fontSize: "0.9rem" }}>{nl}</div>
              <input className="input" value={fr} onChange={(e) => updateEntry(nl, e.target.value)} />
              <button className="btn btn-danger btn-sm" onClick={() => removeEntry(nl)}>✕</button>
            </div>
          ))
        )}
      </div>
    </div>
  );
}

// ============================================================
// ERROR BOUNDARY
// ============================================================
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { console.error("App-fout:", error, info); }
  render() {
    if (this.state.error) {
      return (
        <div style={{ padding: "2rem", fontFamily: "system-ui, sans-serif", maxWidth: 800, margin: "0 auto" }}>
          <h1 style={{ color: "#c8442a" }}>Er ging iets mis</h1>
          <p>De app kon niet laden. Klik op onderstaande knop om alle lokale data te wissen en opnieuw te beginnen.</p>
          <pre style={{ background: "#fbf8f2", padding: "1rem", border: "1px solid #d9cfc1", borderRadius: 4, overflow: "auto", fontSize: "0.85rem" }}>
            {String(this.state.error && this.state.error.message)}
          </pre>
          <button onClick={() => {
            ["evenement_beheer_data_v4", "evenement_beheer_data_v3", "evenement_beheer_data_v2", "evenement_beheer_data_v1"].forEach((k) => localStorage.removeItem(k));
            location.reload();
          }} style={{ background: "#c8442a", color: "white", border: "none", padding: "0.7rem 1.2rem", borderRadius: 3, cursor: "pointer", fontSize: "0.9rem" }}>
            Wis lokale data en herstart
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ErrorBoundary><App /></ErrorBoundary>);
