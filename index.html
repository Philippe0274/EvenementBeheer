<style>
  :root {

  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: 'Inter Tight', 'Helvetica Neue', system-ui, sans-serif; }
  .font-display { font-family: 'Fraunces', 'Playfair Display', Georgia, serif; font-weight: 600; letter-spacing: -0.02em; }

  .tab-btn { padding: 0.6rem 1.1rem; border: none; background: transparent; color: var(--ink-soft); font-size: 0.85rem; font-weight: 500; letter-spacing: 0.02em; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; text-transform: uppercase; }
  .tab-btn:hover { color: var(--ink); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .card { background: var(--bg-card); border: 1px solid var(--line); border-radius: 4px; padding: 1.5rem; }
  .input, .select, .textarea { width: 100%; padding: 0.55rem 0.75rem; border: 1px solid var(--line); background: white; border-radius: 3px; font-family: 'Inter Tight', sans-serif; font-size: 0.9rem; color: var(--ink); }
  .input:focus, .select:focus, .textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
  .label { display: block; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-soft); margin-bottom: 0.35rem; }
  .btn { padding: 0.55rem 1rem; border-radius: 3px; border: none; font-family: 'Inter Tight', sans-serif; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.15s; letter-spacing: 0.01em; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #a8341f; }
  .btn-ghost { background: transparent; color: var(--ink); border: 1px solid var(--line); }
  .btn-ghost:hover { background: var(--bg); border-color: var(--ink-soft); }
  .btn-danger { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  .btn-danger:hover { background: var(--accent); color: white; }
  .btn-whatsapp { background: var(--whatsapp); color: white; }
  .btn-whatsapp:hover { background: #1ebe57; }
  .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.78rem; }
  .badge { display: inline-block; padding: 0.2rem 0.6rem; font-size: 0.7rem; font-weight: 600; border-radius: 2px; letter-spacing: 0.04em; text-transform: uppercase; }
  .badge-open { background: #ede4d3; color: var(--ink-soft); }
  .badge-bezig { background: #f4e4c5; color: var(--amber); }
  .badge-ok { background: #dde7d3; color: var(--green); }
  .badge-pasok { background: var(--accent-soft); color: var(--accent); }
  .stat-num { font-family: 'Fraunces', serif; font-size: 2.5rem; font-weight: 600; color: var(--ink); line-height: 1; letter-spacing: -0.03em; }
  .stat-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-soft); margin-top: 0.4rem; font-weight: 500; }
  .alert-bar { padding: 1rem 1.5rem; border-radius: 4px; margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; }
  .alert-amber { background: #f4e4c5; border-left: 4px solid var(--amber); }
  .alert-red { background: var(--accent-soft); border-left: 4px solid var(--accent); }
  .alert-green { background: #dde7d3; border-left: 4px solid var(--green); }
  .pill { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.25rem 0.6rem; background: var(--bg); border: 1px solid var(--line); border-radius: 999px; font-size: 0.78rem; color: var(--ink); margin: 0.15rem; cursor: pointer; }
  .pill.active { background: var(--accent); color: white; border-color: var(--accent); }
  .pill.warn { border-color: var(--amber); background: #fdf6e3; }
  a.link { color: var(--accent); text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 2px; }
  a.link:hover { color: #a8341f; }
  details > summary { cursor: pointer; list-style: none; }
  details > summary::-webkit-details-marker { display: none; }
  .chevron { display: inline-block; transition: transform 0.2s; }
  details[open] .chevron { transform: rotate(90deg); }
  .grid-2 { display: grid; gap: 1.5rem; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); }
  @media (max-width: 800px) { .grid-2 { grid-template-columns: 1fr; } }
  .switch { display: inline-flex; align-items: center; gap: 0.5rem; cursor: pointer; user-select: none; }
  .switch-track { width: 36px; height: 20px; background: var(--line); border-radius: 999px; position: relative; transition: background 0.2s; }
  .switch-track::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: white; border-radius: 50%; transition: transform 0.2s; }
  .switch.on .switch-track { background: var(--accent); }
  .switch.on .switch-track::after { transform: translateX(16px); }
  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--ink); color: white; padding: 0.7rem 1.2rem; border-radius: 4px; font-size: 0.85rem; z-index: 1000; }
  .dict-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 0.5rem; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid var(--line); }
  .dict-row:last-child { border-bottom: none; }
  .lang-toggle { display: inline-flex; border: 1px solid var(--line); border-radius: 3px; overflow: hidden; }
  .lang-toggle button { background: transparent; border: none; padding: 0.4rem 0.7rem; font-size: 0.78rem; font-weight: 600; cursor: pointer; color: var(--ink-soft); }
  .lang-toggle button.active { background: var(--accent); color: white; }
  .send-row { display: grid; grid-template-columns: auto 1fr auto auto; gap: 0.7rem; align-items: center; padding: 0.6rem 0.8rem; border: 1px solid var(--line); background: white; border-radius: 3px; margin-bottom: 0.4rem; }
  .send-row.sent-today { background: #dde7d3; border-color: var(--green); }
  .send-row.sent-week { background: #f4e4c5; border-color: var(--amber); }
  .info-box { background: #fdf6e3; border-left: 3px solid var(--gold); padding: 0.8rem 1rem; border-radius: 3px; font-size: 0.85rem; margin: 1rem 0; color: var(--ink); }

const buildReverseDict = (dict) => {
  const rev = {};
  Object.entries(dict).forEach(([nl, fr]) => { rev[fr.toLowerCase()] = nl; });
  return rev;
};

const matchCase = (original, translated) => {
  if (!original) return translated;
  if (original[0] === original[0].toUpperCase()) {
    return translated.charAt(0).toUpperCase() + translated.slice(1);
  }
  return translated;
};

// Forceer lowercase voor opslag (gebruikt voor materiaal-, taak-, woordenboek-namen)
const normalizeName = (s) => (s || "").toString().trim().toLowerCase();

// Eerste letter hoofdletter voor weergave
const capitalize = (s) => {
  if (!s) return "";
  const str = s.toString();
  return str.charAt(0).toUpperCase() + str.slice(1);
};

const translateText = (text, from, to, dict) => {
  if (!text) return "";
  const lower = text.trim().toLowerCase();
  const lookup = from === "nl" ? dict : buildReverseDict(dict);
  if (lookup[lower]) return matchCase(text, lookup[lower]);
  const tokens = text.split(/(\s+|[,;.])/);
  let foundAny = false;
  const translated = tokens.map((tok) => {
    if (!tok.trim() || /^[\s,;.]+$/.test(tok)) return tok;
    const lt = tok.toLowerCase();
    if (lookup[lt]) { foundAny = true; return matchCase(tok, lookup[lt]); }
    return tok;
  }).join("");
  return foundAny ? translated : "";
};

const uid = () => Math.random().toString(36).slice(2, 10);

const formatDate = (iso, lang = "nl") => {
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleDateString(lang === "fr" ? "fr-BE" : "nl-BE", {
    weekday: "long", day: "numeric", month: "long", year: "numeric",
  });
};

const buildAddressString = (e) =>
  [e.locatieNaam, `${e.straat || ""} ${e.nummer || ""}`.trim(), `${e.postcode || ""} ${e.gemeente || ""}`.trim()]
    .filter(Boolean).join(", ");

const buildVrijwilligerAdres = (v) => {
  return [v.straat || "", `${v.postcode || ""} ${v.gemeente || ""}`.trim()].filter((x) => x.trim()).join(", ");
};

const buildMapsLink = (e, mode = "driving") => {
  const addr = buildAddressString(e);
  if (!addr) return "";
  return `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(addr)}&travelmode=${mode}`;
};

const buildMapsSearchLink = (addr) => {
  if (!addr) return "";
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(addr)}`;
};

const buildNmbsLink = (e) => {
  const addr = `${e.gemeente || ""}`.trim();
  if (!addr) return "";
  return `https://www.belgiantrain.be/nl/travel-info/routeplanner?to=${encodeURIComponent(addr)}`;
};

const daysUntil = (iso) => {
  if (!iso) return null;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const target = new Date(iso);
  target.setHours(0, 0, 0, 0);
  return Math.round((target - today) / (1000 * 60 * 60 * 24));
};

const isAvailable = (v, item) => {
  if (!v || !item) return true;
  const av = v.beschikbaarheid;
  if (!av || av === "hele_dag") return true;
  if (!item.start || !item.eind) return true;
  const startH = parseInt(item.start.split(":")[0], 10);
  const eindH = parseInt(item.eind.split(":")[0], 10);
  if (av === "voormiddag") return eindH <= 12;
  if (av === "namiddag") return startH >= 12 && eindH <= 18;
  if (av === "avond") return startH >= 17;
  if (av === "aangepast") {
    if (!v.beschikbaarVan || !v.beschikbaarTot) return true;
    return item.start >= v.beschikbaarVan && item.eind <= v.beschikbaarTot;
  }
  return true;
};

const cleanPhone = (raw) => {
  if (!raw) return "";
  let tel = String(raw).replace(/[\s\-().]/g, "");
  if (tel.startsWith("+")) tel = tel.slice(1);
  if (tel.startsWith("00")) tel = tel.slice(2);
  if (tel.startsWith("0")) tel = "32" + tel.slice(1);
  return tel.replace(/[^\d]/g, "");
};

const isToday = (iso) => {
  if (!iso) return false;
  const d = new Date(iso);
  const t = new Date();
  return d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth() && d.getDate() === t.getDate();
};

const isThisWeek = (iso) => {
  if (!iso) return false;
  const d = new Date(iso);
  const t = new Date();
  const diff = (t - d) / (1000 * 60 * 60 * 24);
  return diff >= 0 && diff < 7;
};

const formatTimeShort = (iso) => {
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleTimeString("nl-BE", { hour: "2-digit", minute: "2-digit" });
};

const formatDateShort = (iso, lang = "nl") => {
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleDateString(lang === "fr" ? "fr-BE" : "nl-BE", { day: "numeric", month: "short" });
};

// Veilige normalisatie van geladen data
const normalizeData = (raw) => {
  if (!raw || typeof raw !== "object") return defaultData;
  const safe = { ...defaultData };
  safe.taal = (raw.taal === "fr" ? "fr" : "nl");

  if (raw.event && typeof raw.event === "object") safe.event = { ...defaultData.event, ...raw.event };

  if (Array.isArray(raw.vrijwilligers)) {
    safe.vrijwilligers = raw.vrijwilligers.map((v) => ({
      id: v.id || uid(),
      voornaam: v.voornaam || "", naam: v.naam || "",
      geslacht: v.geslacht || "", taal: (v.taal || "nl").toString().toLowerCase(),
      // Migratie: oud 'telefoon' wordt gsm1
      gsm1: v.gsm1 || v.telefoon || "",
      gsm2: v.gsm2 || "",
      email: v.email || "",
      straat: v.straat || "", postcode: String(v.postcode || ""), gemeente: v.gemeente || "",
      beschikbaarheid: v.beschikbaarheid || "hele_dag",
      beschikbaarVan: v.beschikbaarVan || "", beschikbaarTot: v.beschikbaarTot || "",
      opmerking: v.opmerking || "",
    }));
  }

  if (Array.isArray(raw.taken)) {
    safe.taken = raw.taken.map((t) => ({
      id: t.id || uid(),
      naamNl: normalizeName(t.naamNl), naamFr: normalizeName(t.naamFr), categorie: t.categorie || "",
      heeftSubtaken: !!t.heeftSubtaken,
      start: t.start || "", eind: t.eind || "", dagdeel: t.dagdeel || "voormiddag",
      toegewezen: Array.isArray(t.toegewezen) ? t.toegewezen : [],
      status: t.status || "open", opmerking: t.opmerking || "",
      verantwoordelijkeId: t.verantwoordelijkeId || "",
      verantwoordelijkeVrij: t.verantwoordelijkeVrij || "",
      subtaken: Array.isArray(t.subtaken) ? t.subtaken.map((s) => ({
        id: s.id || uid(),
        naamNl: normalizeName(s.naamNl), naamFr: normalizeName(s.naamFr),
        start: s.start || "", eind: s.eind || "", dagdeel: s.dagdeel || "voormiddag",
        toegewezen: Array.isArray(s.toegewezen) ? s.toegewezen : [],
        status: s.status || "open", opmerking: s.opmerking || "",
      })) : [],
    }));
  }

  if (raw.woordenboek && typeof raw.woordenboek === "object" && !Array.isArray(raw.woordenboek)) {
    const normalized = {};
    Object.entries(raw.woordenboek).forEach(([k, v]) => {
      if (typeof k === "string" && typeof v === "string") {
        normalized[normalizeName(k)] = normalizeName(v);
      }
    });
    safe.woordenboek = { ...defaultDictionary, ...normalized };
  }

  if (Array.isArray(raw.sjablonen)) {
    const cleaned = raw.sjablonen
      .filter((s) => s && typeof s === "object")
      .map((s) => ({
        id: s.id || uid(),
        titel: s.titel || "Sjabloon",
        nl: typeof s.nl === "string" ? s.nl : "",
        fr: typeof s.fr === "string" ? s.fr : "",
      }));
    safe.sjablonen = cleaned.length > 0 ? cleaned : defaultSjablonen;
  } else if (raw.sjablonen && typeof raw.sjablonen === "object") {
    const titels = { welkomst: "Welkomstbericht", week: "Herinnering 1 week vooraf", dag: "Herinnering 1 dag vooraf" };
    const ids = new Set();
    Object.keys(raw.sjablonen).forEach((k) => {
      const m = k.match(/^(.+)_(nl|fr)$/);
      if (m) ids.add(m[1]);
    });
    if (ids.size > 0) {
      safe.sjablonen = Array.from(ids).map((id) => ({
        id, titel: titels[id] || id,
        nl: raw.sjablonen[`${id}_nl`] || "",
        fr: raw.sjablonen[`${id}_fr`] || "",
      }));
    }
  }

  if (Array.isArray(raw.externeContacten)) {
    safe.externeContacten = raw.externeContacten.map((c) => ({
      id: c.id || uid(),
      naam: c.naam || "",
      gsm1: c.gsm1 || c.telefoon || "",
      taal: (c.taal || "nl").toString().toLowerCase(),
    }));
  }

  if (raw.bulkGeschiedenis && typeof raw.bulkGeschiedenis === "object") {
    safe.bulkGeschiedenis = raw.bulkGeschiedenis;
  }

  if (Array.isArray(raw.materiaal)) {
    safe.materiaal = raw.materiaal.map((m) => ({
      id: m.id || uid(),
      naamNl: normalizeName(m.naamNl),
      naamFr: normalizeName(m.naamFr),
      aantal: m.aantal || "",
      oorsprong: m.oorsprong || "",
      verantwoordelijkeId: m.verantwoordelijkeId || "",
      verantwoordelijkeVrij: m.verantwoordelijkeVrij || "",
    }));
  }

  if (Array.isArray(raw.oorsprongLijst) && raw.oorsprongLijst.length > 0) {
    safe.oorsprongLijst = raw.oorsprongLijst.filter((x) => typeof x === "string" && x.trim());
  }

  return safe;
};

// Slimme merge: bestaande data + nieuwe data (matchen op id)
const mergeData = (oldData, newData) => {
  const result = { ...oldData };

  // Event: alleen overschrijven als de nieuwe een naam heeft
  if (newData.event && newData.event.naam) {
    result.event = newData.event;
  }

  // Vrijwilligers: matchen op id, anders toevoegen
  if (Array.isArray(newData.vrijwilligers) && newData.vrijwilligers.length > 0) {
    const existingById = new Map(oldData.vrijwilligers.map((v) => [v.id, v]));
    newData.vrijwilligers.forEach((v) => {
      if (v.id && existingById.has(v.id)) {
        existingById.set(v.id, { ...existingById.get(v.id), ...v });
      } else {
        existingById.set(v.id || uid(), v);
      }
    });
    result.vrijwilligers = Array.from(existingById.values());
  }

  // Taken: matchen op id
  if (Array.isArray(newData.taken) && newData.taken.length > 0) {
    const existingById = new Map(oldData.taken.map((t) => [t.id, t]));
    newData.taken.forEach((t) => {
      if (t.id && existingById.has(t.id)) {
        const old = existingById.get(t.id);
        // Behoud subtaken merge
        const oldSubsById = new Map(old.subtaken.map((s) => [s.id, s]));
        (t.subtaken || []).forEach((s) => {
          if (s.id && oldSubsById.has(s.id)) {
            oldSubsById.set(s.id, { ...oldSubsById.get(s.id), ...s });
          } else {
            oldSubsById.set(s.id || uid(), s);
          }
        });
        existingById.set(t.id, { ...old, ...t, subtaken: Array.from(oldSubsById.values()) });
      } else {
        existingById.set(t.id || uid(), t);
      }
    });
    result.taken = Array.from(existingById.values());
  }

  // Woordenboek: samenvoegen, nieuwe waarden winnen
  if (newData.woordenboek && Object.keys(newData.woordenboek).length > 0) {
    result.woordenboek = { ...oldData.woordenboek, ...newData.woordenboek };
  }

  // Sjablonen: matchen op id
  if (Array.isArray(newData.sjablonen) && newData.sjablonen.length > 0) {
    const existingById = new Map(oldData.sjablonen.map((s) => [s.id, s]));
    newData.sjablonen.forEach((s) => {
      if (s.id && existingById.has(s.id)) {
        existingById.set(s.id, { ...existingById.get(s.id), ...s });
      } else {
        existingById.set(s.id || uid(), s);
      }
    });
    result.sjablonen = Array.from(existingById.values());
  }

  // Materiaal: matchen op id, anders toevoegen
  if (Array.isArray(newData.materiaal) && newData.materiaal.length > 0) {
    const existingById = new Map((oldData.materiaal || []).map((m) => [m.id, m]));
    newData.materiaal.forEach((m) => {
      if (m.id && existingById.has(m.id)) {
        existingById.set(m.id, { ...existingById.get(m.id), ...m });
      } else {
        existingById.set(m.id || uid(), m);
      }
    });
    result.materiaal = Array.from(existingById.values());
  }

  // OorsprongLijst: samenvoegen (uniek)
  if (Array.isArray(newData.oorsprongLijst) && newData.oorsprongLijst.length > 0) {
    const merged = [...(oldData.oorsprongLijst || [])];
    newData.oorsprongLijst.forEach((loc) => {
      if (!merged.includes(loc)) merged.push(loc);
    });
    result.oorsprongLijst = merged;
  }

  return result;
};

function App() {
  const [data, setData] = useState(defaultData);
  const [tab, setTab] = useState("dashboard");
  const [loaded, setLoaded] = useState(false);
  const [toast, setToast] = useState("");
  const [helpOpen, setHelpOpen] = useState(false);

  const t = T[data.taal] || T.nl;

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(""), 2200);
  };

  // Initial load: probeer v4, daarna oudere keys voor migratie
  useEffect(() => {
    try {
      let raw = localStorage.getItem(STORAGE_KEY);
      let migrated = false;
      if (!raw) {
        // Probeer migratie van oudere versies
        for (const oldKey of OLD_KEYS) {
          const oldRaw = localStorage.getItem(oldKey);
          if (oldRaw) { raw = oldRaw; migrated = true; break; }
        }
      }
      if (raw) {
        const parsed = JSON.parse(raw);
        const normalized = normalizeData(parsed);
        setData(normalized);
        if (migrated) console.log("Data gemigreerd van oudere versie naar v4");
      }
    } catch (e) {
      console.error("Laden mislukt:", e);
    }
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;

    const vRows = XLSX.utils.sheet_to_json(wb.Sheets["Vrijwilligers"] || {});

      const key = `${voornaam.toLowerCase()}|${naam.toLowerCase()}|${cleanPhone(gsm1)}`;
      if (vSeen.has(key)) { vSkipped++; return; }
      vSeen.add(key);
      newVrijwilligers.push({
        id: r.id || uid(), voornaam, naam,
        geslacht: r.geslacht || "", taal: (r.taal || "nl").toString().toLowerCase(),
        gsm1, gsm2: r.gsm2 || "", email: r.email || "",
        straat: r.straat || "", postcode: String(r.postcode || ""), gemeente: r.gemeente || "",
        beschikbaarheid: r.beschikbaarheid || "hele_dag",
        beschikbaarVan: r.beschikbaarVan || "", beschikbaarTot: r.beschikbaarTot || "",
        opmerking: r.opmerking || "",
      });
    });

    const tSeen = new Set();
    let tSkipped = 0;
    const hoofd = [];
    const sub = [];
    tRows.forEach((r) => {
      const naamNl = (r.naam_nl || "").toString().trim();
      const naamFr = (r.naam_fr || "").toString().trim();
      if (!naamNl && !naamFr) return;
      if (!r.hoofdtaak_id) {
        const key = `H|${naamNl.toLowerCase()}|${(r.categorie || "").toString().toLowerCase()}`;
        if (tSeen.has(key)) { tSkipped++; return; }
        tSeen.add(key); hoofd.push(r);
      } else {
        const key = `S|${r.hoofdtaak_id}|${naamNl.toLowerCase()}|${r.start || ""}|${r.eind || ""}`;
        if (tSeen.has(key)) { tSkipped++; return; }
        tSeen.add(key); sub.push(r);
      }
    });

    const newTaken = hoofd.map((h) => ({
      id: h.id || uid(),
      naamNl: h.naam_nl || "", naamFr: h.naam_fr || "", categorie: h.categorie || "",
      heeftSubtaken: (h.heeft_subtaken || "").toString().toLowerCase() === "ja",
      start: h.start || "", eind: h.eind || "", dagdeel: h.dagdeel || "voormiddag",
      toegewezen: (h.toegewezen || "").toString().split(",").map((x) => x.trim()).filter(Boolean),
      status: h.status || "open", opmerking: h.opmerking || "",
      verantwoordelijkeId: h.verantwoordelijke_id || "",
      verantwoordelijkeVrij: h.verantwoordelijke_vrij || "",

        id: s.id || uid(),
        naamNl: s.naam_nl || "", naamFr: s.naam_fr || "",
        start: s.start || "", eind: s.eind || "",
        dagdeel: s.dagdeel || "voormiddag",
        toegewezen: (s.toegewezen || "").toString().split(",").map((x) => x.trim()).filter(Boolean),

      if (r.nl && r.fr) acc[String(r.nl).toLowerCase().trim()] = String(r.fr).trim();
      return acc;
    }, {});

      nl: r.nl || "", fr: r.fr || "",
    }));

    const newExtern = eRows.filter((r) => r.naam || r.gsm1).map((r) => ({
      id: r.id || uid(),
      naam: r.naam || "",
      gsm1: r.gsm1 || "",
      taal: (r.taal || "nl").toString().toLowerCase(),
    }));

    const newMateriaal = mRows.filter((r) => r.naam_nl || r.naam_fr || r.aantal).map((r) => ({
      id: r.id || uid(),
      naamNl: normalizeName(r.naam_nl),
      naamFr: normalizeName(r.naam_fr),
      aantal: r.aantal !== undefined ? String(r.aantal) : "",
      oorsprong: r.oorsprong || "",
      verantwoordelijkeId: r.verantwoordelijke_id || "",
      verantwoordelijkeVrij: r.verantwoordelijke_vrij || "",
    }));

    const newOorsprongLijst = oRows
      .map((r) => (r.locatie || "").toString().trim())
      .filter(Boolean);

    return {
      event: newEvent,
      vrijwilligers: newVrijwilligers,
      taken: newTaken,
      woordenboek: newDict,
      sjablonen: newSjablonen,
      externeContacten: newExtern,
      materiaal: newMateriaal,
      oorsprongLijst: newOorsprongLijst,
      vSkipped, tSkipped,
    };
  };

  const importExcelReplace = async (file) => {
    try {
      const parsed = await parseImportedExcel(file);
      setData((d) => ({
        ...d,
        event: parsed.event,
        vrijwilligers: parsed.vrijwilligers,
        taken: parsed.taken,
        woordenboek: Object.keys(parsed.woordenboek).length > 0 ? parsed.woordenboek : d.woordenboek,
        sjablonen: parsed.sjablonen.length > 0 ? parsed.sjablonen : d.sjablonen,
        externeContacten: parsed.externeContacten,
        materiaal: parsed.materiaal || [],
        oorsprongLijst: (parsed.oorsprongLijst && parsed.oorsprongLijst.length > 0)
          ? parsed.oorsprongLijst : d.oorsprongLijst,
      }));
      const parts = [`${parsed.vrijwilligers.length} ${t.volunteers.toLowerCase()}, ${parsed.taken.length} ${t.tab_taken.toLowerCase()}`];
      if (parsed.vSkipped + parsed.tSkipped > 0) parts.push(`${parsed.vSkipped + parsed.tSkipped} doublons`);
      showToast(t.import_ok(parts.join(" · ")));
    } catch (e) {
      console.error(e);
      alert(t.import_failed + ": " + e.message);
    }
  };

  const importExcelMerge = async (file) => {
    try {
      const parsed = await parseImportedExcel(file);
      setData((d) => mergeData(d, {
        event: parsed.event,
        vrijwilligers: parsed.vrijwilligers,
        taken: parsed.taken,
        woordenboek: parsed.woordenboek,
        sjablonen: parsed.sjablonen,
        materiaal: parsed.materiaal,
        oorsprongLijst: parsed.oorsprongLijst,
      }));
      showToast(t.import_ok(`${parsed.vrijwilligers.length} ${t.volunteers.toLowerCase()} · ${parsed.taken.length} ${t.tab_taken.toLowerCase()}`));
    } catch (e) {
      console.error(e);
      alert(t.import_failed + ": " + e.message);
    }
  };

  const resetAll = () => {
    if (confirm(t.confirm_reset)) setData(defaultData);
  };

  const nieuwEvenement = () => {
    if (!confirm(t.confirm_nieuw_evenement)) return;
    setData((d) => ({
      ...d,
      // Wissen
      event: { naam: "", datum: "", locatieNaam: "", straat: "", nummer: "", postcode: "", gemeente: "", beschrijving: "" },
      bulkGeschiedenis: {},
      // Taken: behouden, maar toewijzingen + status + verantwoordelijke wissen
      taken: d.taken.map((tt) => ({
        ...tt,
        toegewezen: [],
        status: "open",
        verantwoordelijkeId: "",
        verantwoordelijkeVrij: "",
        subtaken: tt.subtaken.map((s) => ({
          ...s,
          toegewezen: [],
          status: "open",
        })),
      })),
      // Behouden zoals ze zijn: vrijwilligers, materiaal, sjablonen, woordenboek, externeContacten, oorsprongLijst
    }));
    showToast(t.nieuw_evenement_klaar);
  };

  const dagen = daysUntil(data.event.datum);

  return (
    <div style={{ minHeight: "100vh" }}>
      {toast && <div className="toast">{toast}</div>}
      {helpOpen && <HelpModal onClose={() => setHelpOpen(false)} t={t} />}

      <header style={{ borderBottom: "1px solid var(--line)", background: "var(--bg-card)" }}>
        <div style={{ maxWidth: 1200, margin: "0 auto", padding: "1.5rem 2rem" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: "1rem", flexWrap: "wrap" }}>
            <div>
              <div className="font-body" style={{ fontSize: "0.7rem", textTransform: "uppercase", letterSpacing: "0.15em", color: "var(--accent)", fontWeight: 600 }}>
                {t.app_subtitle}
              </div>
              <h1 className="font-display" style={{ margin: "0.2rem 0 0 0", fontSize: "2rem" }}>
                {data.event.naam || t.no_event}
              </h1>
              {data.event.datum && (
                <div className="font-body" style={{ fontSize: "0.9rem", color: "var(--ink-soft)", marginTop: "0.3rem" }}>
                  {formatDate(data.event.datum, data.taal)} · {data.event.gemeente || "—"}
                </div>
              )}
            </div>
            <div style={{ display: "flex", gap: "0.5rem", flexWrap: "wrap", alignItems: "center" }}>
              <div className="lang-toggle">
                <button className={data.taal === "nl" ? "active" : ""} onClick={() => setTaal("nl")}>🇳🇱 NL</button>
                <button className={data.taal === "fr" ? "active" : ""} onClick={() => setTaal("fr")}>🇫🇷 FR</button>
              </div>
              <button className="btn btn-ghost btn-sm" onClick={() => setHelpOpen(true)}>❓ {t.help_button}</button>
              <button className="btn btn-ghost btn-sm" onClick={downloadTemplate}>{t.template}</button>
              <label className="btn btn-ghost btn-sm" style={{ cursor: "pointer" }}>
                {t.import_merge}
                <input type="file" accept=".xlsx,.xls" style={{ display: "none" }}
                  onChange={(e) => e.target.files[0] && importExcelMerge(e.target.files[0])} />
              </label>
              <label className="btn btn-ghost btn-sm" style={{ cursor: "pointer" }}>
                {t.import_replace}
                <input type="file" accept=".xlsx,.xls" style={{ display: "none" }}
                  onChange={(e) => e.target.files[0] && importExcelReplace(e.target.files[0])} />
              </label>
              <button className="btn btn-primary btn-sm" onClick={exportExcel}>{t.export}</button>
              <button className="btn btn-ghost btn-sm" onClick={nieuwEvenement} title={t.nieuw_evenement}>
                🆕 {t.nieuw_evenement}
              </button>
              <button className="btn btn-danger btn-sm" onClick={resetAll} title={t.reset}>
                <span style={{ color: "#c8442a", marginRight: "0.3rem" }}>⚠️</span>{t.reset}
              </button>
            </div>
          </div>

          <nav style={{ marginTop: "1.5rem", display: "flex", gap: "0.2rem", flexWrap: "wrap" }}>
            {[
              ["dashboard", t.tab_dashboard], ["event", t.tab_event],
              ["vrijwilligers", t.tab_vrijwilligers], ["taken", t.tab_taken],
              ["materiaal", t.tab_materiaal],
              ["berichten", t.tab_berichten], ["bulk", t.tab_bulk],
              ["sjablonen", t.tab_sjablonen], ["woordenboek", t.tab_woordenboek],
            ].map(([k, label]) => (
              <button key={k} className={`tab-btn ${tab === k ? "active" : ""}`} onClick={() => setTab(k)}>{label}</button>
            ))}
          </nav>
        </div>
      </header>

      <main style={{ maxWidth: 1200, margin: "0 auto", padding: "2rem" }} className="font-body">
        {tab === "dashboard" && <Dashboard data={data} dagen={dagen} setTab={setTab} t={t} />}
        {tab === "event" && <EventTab event={data.event} update={updateEvent} t={t} />}
        {tab === "vrijwilligers" && <VrijwilligersTab vrijwilligers={data.vrijwilligers}
          add={addVrijwilliger} update={updateVrijwilliger} remove={removeVrijwilliger} dedup={dedupVrijwilligers} t={t} />}
        {tab === "taken" && <TakenTab taken={data.taken} vrijwilligers={data.vrijwilligers}
          externeContacten={data.externeContacten || []} dict={data.woordenboek} t={t}
          addTaak={addTaak} updateTaak={updateTaak} removeTaak={removeTaak}
          addSubtaak={addSubtaak} updateSubtaak={updateSubtaak} removeSubtaak={removeSubtaak}
          toggleAssignmentTaak={toggleAssignmentTaak} toggleAssignmentSub={toggleAssignmentSub}
          updateAllTaken={updateAllTaken} showToast={showToast} />}
        {tab === "berichten" && <BerichtenTab data={data} showToast={showToast} t={t} />}
        {tab === "bulk" && <BulkSendTab data={data} showToast={showToast} t={t}
          addExternContact={addExternContact} updateExternContact={updateExternContact} removeExternContact={removeExternContact}
          markBulkSent={markBulkSent} markBulkUnsent={markBulkUnsent} resetBulkHistory={resetBulkHistory} />}
        {tab === "sjablonen" && <SjablonenTab sjablonen={data.sjablonen}
          updateVeld={updateSjabloonVeld} add={addSjabloon} remove={removeSjabloon} t={t} />}
        {tab === "woordenboek" && <WoordenboekTab dict={data.woordenboek} update={updateWoordenboek} showToast={showToast} t={t} />}
        {tab === "materiaal" && <MateriaalTab
          materiaal={data.materiaal || []}
          oorsprongLijst={data.oorsprongLijst || []}
          vrijwilligers={data.vrijwilligers}
          externeContacten={data.externeContacten || []}
          dict={data.woordenboek}
          taal={data.taal}
          add={addMateriaal} update={updateMateriaal} remove={removeMateriaal}
          addLocatie={addOorsprongLocatie} removeLocatie={removeOorsprongLocatie}
          exportMateriaal={exportMateriaalAlleen}
          t={t} />}
      </main>

      <footer style={{ borderTop: "1px solid var(--line)", padding: "1.5rem 2rem", textAlign: "center",
        fontSize: "0.78rem", color: "var(--ink-soft)", marginTop: "3rem" }}>
        {t.storage_note} · {data.vrijwilligers.length} {t.volunteers.toLowerCase()} · {data.taken.length} {t.tab_taken.toLowerCase()}
      </footer>
    </div>
  );
}

// ============================================================
// DASHBOARD
// ============================================================
function Dashboard({ data, dagen, setTab, t }) {
  const allUnits = [];
  data.taken.forEach((tt) => {
    if (tt.heeftSubtaken && tt.subtaken.length > 0) {
      tt.subtaken.forEach((s) => allUnits.push(s));
    } else {
      allUnits.push(tt);
    }
  });

  const stats = {
    open: allUnits.filter((s) => s.status === "open").length,
    bezig: allUnits.filter((s) => s.status === "bezig").length,
    ok: allUnits.filter((s) => s.status === "ok").length,
    pasok: allUnits.filter((s) => s.status === "pas_ok").length,
  };
  const niettoegewezen = allUnits.filter((s) => !(s.toegewezen || []).length).length;

  let alert = null;
  if (dagen !== null && data.event.datum) {
    if (dagen < 0) alert = { type: "green", text: t.event_past(Math.abs(dagen)) };
    else if (dagen === 0) alert = { type: "red", text: t.event_today };
    else if (dagen <= 1) alert = { type: "red", text: `${t.event_in_days(dagen)} ${t.day_reminder_time}`, cta: t.to_messages };
    else if (dagen <= 7) alert = { type: "amber", text: `${t.event_in_days(dagen)} ${t.week_reminder_time}`, cta: t.to_messages };
  }

  return (
    <div>
      {alert && (
        <div className={`alert-bar alert-${alert.type}`}>
          <span style={{ fontWeight: 500 }}>{alert.text}</span>
          {alert.cta && <button className="btn btn-primary btn-sm" onClick={() => setTab("berichten")}>{alert.cta}</button>}
        </div>
      )}

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: "1rem", marginBottom: "2rem" }}>
        <div className="card">
          <div className="stat-num">{dagen === null ? "—" : dagen < 0 ? "✓" : dagen}</div>
          <div className="stat-label">{dagen === null ? t.no_date : dagen < 0 ? t.past : dagen === 1 ? t.day_left : t.days_left}</div>
        </div>
        <div className="card"><div className="stat-num">{data.vrijwilligers.length}</div><div className="stat-label">{t.volunteers}</div></div>
        <div className="card"><div className="stat-num">{allUnits.length}</div><div className="stat-label">{t.workunits}</div></div>
        <div className="card">
          <div className="stat-num" style={{ color: niettoegewezen > 0 ? "var(--accent)" : "var(--green)" }}>{niettoegewezen}</div>
          <div className="stat-label">{t.unassigned}</div>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: "1rem", marginBottom: "2rem" }}>
        <StatusCard label={t.status_open} count={stats.open} cls="badge-open" />
        <StatusCard label={t.status_bezig} count={stats.bezig} cls="badge-bezig" />
        <StatusCard label={t.status_ok} count={stats.ok} cls="badge-ok" />
        <StatusCard label={t.status_pasok} count={stats.pasok} cls="badge-pasok" />
      </div>

      <div className="card">
        <h2 className="font-display" style={{ marginTop: 0, fontSize: "1.4rem" }}>{t.quick_nav}</h2>
        <div style={{ display: "flex", gap: "0.5rem", flexWrap: "wrap" }}>
          <button className="btn btn-ghost" onClick={() => setTab("event")}>{t.edit_event}</button>
          <button className="btn btn-ghost" onClick={() => setTab("vrijwilligers")}>{t.manage_volunteers}</button>
          <button className="btn btn-ghost" onClick={() => setTab("taken")}>{t.manage_tasks}</button>
          <button className="btn btn-primary" onClick={() => setTab("berichten")}>{t.wa_messages}</button>
        </div>
      </div>
    </div>
  );
}

function StatusCard({ label, count, cls }) {
  return (
    <div className="card" style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
      <div>
        <div className="stat-num" style={{ fontSize: "1.8rem" }}>{count}</div>
        <div className="stat-label">{label}</div>
      </div>
      <span className={`badge ${cls}`}>{label}</span>
    </div>
  );
}

// VRIJWILLIGERS

function VrijwilligersTab({ vrijwilligers, add, update, remove, dedup, t }) {
  const [zoek, setZoek] = useState("");
  const filtered = vrijwilligers
    .filter((v) => {
      const s = zoek.toLowerCase();
      return v.voornaam.toLowerCase().includes(s) || v.naam.toLowerCase().includes(s)
          || (v.email || "").toLowerCase().includes(s) || (v.gemeente || "").toLowerCase().includes(s);
    })
    .sort((a, b) => {
      const an = (a.naam || "").toLowerCase();
      const bn = (b.naam || "").toLowerCase();
      if (an !== bn) return an.localeCompare(bn);
      return (a.voornaam || "").toLowerCase().localeCompare((b.voornaam || "").toLowerCase());
    });

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "1rem", gap: "1rem", flexWrap: "wrap" }}>
        <input className="input" placeholder={t.search_volunteer} value={zoek}
          onChange={(e) => setZoek(e.target.value)} style={{ maxWidth: 300 }} />
        <div style={{ display: "flex", gap: "0.5rem" }}>
          <button className="btn btn-ghost" onClick={dedup}>{t.remove_dups}</button>
          <button className="btn btn-primary" onClick={add}>{t.add_volunteer}</button>
        </div>
      </div>

      {filtered.length === 0 ? (
        <div className="card" style={{ textAlign: "center", color: "var(--ink-soft)" }}>
          {vrijwilligers.length === 0 ? t.no_volunteers : t.no_results}
        </div>
      ) : (
        <div style={{ display: "grid", gap: "0.8rem" }}>
          {filtered.map((v) => <VrijwilligerKaart key={v.id} v={v} update={update} remove={remove} t={t} />)}
        </div>
      )}
    </div>
  );
}

  return (

            {v.taal === "fr" ? "🇫🇷" : "🇳🇱"} {v.gsm1 || t.no_phone} ·{" "}
            {v.beschikbaarheid === "hele_dag" ? t.whole_day

              : v.beschikbaarheid === "namiddag" ? t.daypart_afternoon.toLowerCase()

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "1rem", marginTop: "1rem" }}>

        <Field label={t.lastname}><input className="input" value={v.naam} onChange={(e) => update(v.id, { naam: e.target.value })} /></Field>
        <Field label={t.gender}>

          </select>

        <Field label={t.lang}>

        <Field label={t.gsm2}><input className="input" value={v.gsm2} onChange={(e) => update(v.id, { gsm2: e.target.value })} placeholder="+3221234567" /></Field>
        <Field label={t.email}><input className="input" value={v.email} onChange={(e) => update(v.id, { email: e.target.value })} /></Field>
        <Field label={t.street_nr}><input className="input" value={v.straat} onChange={(e) => update(v.id, { straat: e.target.value })} /></Field>
        <Field label={t.postcode}><input className="input" value={v.postcode} onChange={(e) => update(v.id, { postcode: e.target.value })} /></Field>
        <Field label={t.city}><input className="input" value={v.gemeente} onChange={(e) => update(v.id, { gemeente: e.target.value })} /></Field>
        <Field label={t.availability}>
          <select className="select" value={v.beschikbaarheid} onChange={(e) => update(v.id, { beschikbaarheid: e.target.value })}>

// HELPERS: OVERLAP & SLIMME PLANNER
// ============================================================

// Converteert tijdstring "HH:MM" naar minuten
const toMinutes = (s) => {
  if (!s) return null;
  const [h, m] = s.split(":").map(Number);
  return h * 60 + m;
};

// Geeft het tijdslot van een taak/subtaak als [start, eind] in minuten
const getSlot = (unit) => {
  const s = toMinutes(unit.start);
  const e = toMinutes(unit.eind);
  if (s === null || e === null || s >= e) return null;
  return [s, e];
};

// Controleert of twee slots overlappen
const slotsOverlap = (a, b) => a[0] < b[1] && b[0] < a[1];

// Geeft alle (unit, taaknaam) paren terug voor een vrijwilliger
const getAllUnitsForVolunteer = (vrijwilligerId, taken, taal) => {
  const units = [];
  taken.forEach((tt) => {
    const naam = taal === "fr" ? (tt.naamFr || tt.naamNl) : (tt.naamNl || tt.naamFr);
    if (tt.heeftSubtaken && tt.subtaken.length > 0) {
      tt.subtaken.forEach((s) => {
        if ((s.toegewezen || []).includes(vrijwilligerId)) {
          const subNaam = taal === "fr" ? (s.naamFr || s.naamNl) : (s.naamNl || s.naamFr);
          units.push({ unit: s, label: `${capitalize(naam)} — ${capitalize(subNaam)}` });
        }
      });
    } else {
      if ((tt.toegewezen || []).includes(vrijwilligerId)) {
        units.push({ unit: tt, label: capitalize(naam) });
      }
    }
  });
  return units;
};

// Berekent alle shiftoverlaps: geeft array van { vrijwilliger, taak1, taak2 }
const detectOverlaps = (vrijwilligers, taken, taal) => {
  const conflicts = [];
  vrijwilligers.forEach((v) => {
    const units = getAllUnitsForVolunteer(v.id, taken, taal);
    for (let i = 0; i < units.length; i++) {
      for (let j = i + 1; j < units.length; j++) {
        const slotA = getSlot(units[i].unit);
        const slotB = getSlot(units[j].unit);
        if (slotA && slotB && slotsOverlap(slotA, slotB)) {
          conflicts.push({
            vrijwilligerId: v.id,
            naam: `${v.voornaam} ${v.naam}`.trim(),
            taak1: units[i].label,
            taak2: units[j].label,
          });
        }
      }
    }
  });
  return conflicts;
};

// Slimme planner: wijst vrijwilligers toe op basis van beschikbaarheid, taal en categorie
const buildSlimmePlanning = (taken, vrijwilligers) => {
  // Bijhouden hoeveel taken elke vrijwilliger al heeft (voor spreiding)
  const taakCount = {};
  vrijwilligers.forEach((v) => { taakCount[v.id] = 0; });

  // Hulp: geeft beschikbare vrijwilligers voor een unit
  const getKandidaten = (unit) => {
    return vrijwilligers.filter((v) => isAvailable(v, unit));
  };

  // Sorteer kandidaten: voorkeur voor minder ingedeelden
  const sortKandidaten = (kandidaten) => {
    return [...kandidaten].sort((a, b) => (taakCount[a.id] || 0) - (taakCount[b.id] || 0));
  };

  const newTaken = taken.map((tt) => {
    if (tt.heeftSubtaken && tt.subtaken.length > 0) {
      const newSubs = tt.subtaken.map((s) => {
        const kandidaten = sortKandidaten(getKandidaten(s));
        // Wijs maximaal 2 vrijwilligers toe per subtaak als er niemand was
        const selected = kandidaten.slice(0, Math.max(1, Math.min(2, kandidaten.length)));
        selected.forEach((v) => { taakCount[v.id] = (taakCount[v.id] || 0) + 1; });
        return { ...s, toegewezen: selected.map((v) => v.id) };
      });
      return { ...tt, subtaken: newSubs };
    } else {
      const kandidaten = sortKandidaten(getKandidaten(tt));
      const selected = kandidaten.slice(0, Math.max(1, Math.min(2, kandidaten.length)));
      selected.forEach((v) => { taakCount[v.id] = (taakCount[v.id] || 0) + 1; });
      return { ...tt, toegewezen: selected.map((v) => v.id) };
    }
  });

  return newTaken;
};

function TakenTab({ taken, vrijwilligers, externeContacten, dict, addTaak, updateTaak, removeTaak,

    <div>

          )}
          <button className="btn btn-primary" onClick={addTaak}>{t.add_task}</button>
        </div>

        <div className="alert-bar alert-amber" style={{ marginBottom: "1.5rem", flexDirection: "column", alignItems: "flex-start" }}>

              toggleAssignmentTaak={toggleAssignmentTaak} toggleAssignmentSub={toggleAssignmentSub} />

      )}

}

const useAutoTranslate = (item, updateFn, dict) => {
  const handleNlBlur = () => {
    if (item.naamNl) updateFn({ naamNl: normalizeName(item.naamNl) });
    if (item.naamNl && !item.naamFr) {
      const tr = translateText(item.naamNl, "nl", "fr", dict);
      if (tr) updateFn({ naamFr: normalizeName(tr) });
    }
  };
  const handleFrBlur = () => {
    if (item.naamFr) updateFn({ naamFr: normalizeName(item.naamFr) });
    if (item.naamFr && !item.naamNl) {
      const tr = translateText(item.naamFr, "fr", "nl", dict);
      if (tr) updateFn({ naamNl: normalizeName(tr) });
    }
  };
  return { handleNlBlur, handleFrBlur };
};

function TaakKaart({ taak, vrijwilligers, externeContacten, dict, updateTaak, removeTaak,
  addSubtaak, updateSubtaak, removeSubtaak, toggleAssignmentTaak, toggleAssignmentSub, t }) {

  const { handleNlBlur, handleFrBlur } = useAutoTranslate(taak, (patch) => updateTaak(taak.id, patch), dict);

  const sortedVrij = [...(vrijwilligers || [])].sort((a, b) => {
    const an = (a.naam || "").toLowerCase();
    const bn = (b.naam || "").toLowerCase();
    if (an !== bn) return an.localeCompare(bn);
    return (a.voornaam || "").toLowerCase().localeCompare((b.voornaam || "").toLowerCase());
  });
  const sortedExtern = [...(externeContacten || [])].sort((a, b) =>
    (a.naam || "").toLowerCase().localeCompare((b.naam || "").toLowerCase())
  );
  const verantwIsAnder = taak.verantwoordelijkeId === "__ander__";

  return (
    <div className="card" style={{ borderLeft: "3px solid var(--accent)" }}>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr auto", gap: "0.8rem", alignItems: "end" }}>
        <Field label={t.name_nl}>
          <input className="input" value={capitalize(taak.naamNl)}
            onChange={(e) => updateTaak(taak.id, { naamNl: e.target.value })} onBlur={handleNlBlur} />
        </Field>
        <Field label={t.name_fr}>
          <input className="input" value={capitalize(taak.naamFr)}
            onChange={(e) => updateTaak(taak.id, { naamFr: e.target.value })} onBlur={handleFrBlur} />
        </Field>
        <Field label={t.category}>
          <input className="input" value={taak.categorie}
            onChange={(e) => updateTaak(taak.id, { categorie: e.target.value })} placeholder={t.category_ph} />
        </Field>
        <button className="btn btn-danger btn-sm" onClick={() => removeTaak(taak.id)}>{t.remove}</button>
      </div>

      <div style={{ marginTop: "0.8rem", display: "grid", gridTemplateColumns: "1fr 2fr", gap: "0.5rem", alignItems: "end" }}>
        <Field label={t.taak_verant}>
          <select className="select" value={taak.verantwoordelijkeId || ""}
            onChange={(e) => updateTaak(taak.id, { verantwoordelijkeId: e.target.value, verantwoordelijkeVrij: e.target.value === "__ander__" ? (taak.verantwoordelijkeVrij || "") : "" })}>
            <option value="">{t.taak_verant_none}</option>
            {sortedVrij.length > 0 && (
              <optgroup label={t.tab_vrijwilligers}>
                {sortedVrij.map((v) => <option key={v.id} value={v.id}>{v.naam} {v.voornaam}</option>)}
              </optgroup>
            )}
            {sortedExtern.length > 0 && (
              <optgroup label={t.external_contacts}>
                {sortedExtern.map((c) => <option key={c.id} value={c.id}>{c.naam}</option>)}
              </optgroup>
            )}
            <option value="__ander__">{t.mat_other}</option>
          </select>
        </Field>
        {verantwIsAnder && (
          <Field label={t.mat_other_ph}>
            <input className="input" value={taak.verantwoordelijkeVrij || ""}
              onChange={(e) => updateTaak(taak.id, { verantwoordelijkeVrij: e.target.value })} />
          </Field>
        )}
      </div>

      <div style={{ marginTop: "1rem", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: "0.5rem" }}>
        <div className={`switch ${taak.heeftSubtaken ? "on" : ""}`}
          onClick={() => updateTaak(taak.id, { heeftSubtaken: !taak.heeftSubtaken })}>
          <span className="switch-track"></span>
          <span style={{ fontSize: "0.85rem", fontWeight: 500 }}>
            {t.has_subtasks} {taak.heeftSubtaken ? t.on_off_direct.on : t.on_off_direct.off}
          </span>
        </div>
      </div>

      {!taak.heeftSubtaken ? (
        <DirectToewijzing taak={taak} vrijwilligers={vrijwilligers} updateTaak={updateTaak} toggleAssignmentTaak={toggleAssignmentTaak} t={t} />
      ) : (
        <div style={{ marginTop: "1rem", paddingTop: "1rem", borderTop: "1px dashed var(--line)" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.7rem" }}>
            <span className="label" style={{ margin: 0 }}>{t.subtasks} ({taak.subtaken.length})</span>
            <button className="btn btn-ghost btn-sm" onClick={() => addSubtaak(taak.id)}>{t.add_subtask}</button>
          </div>
          {taak.subtaken.length === 0 ? (
            <p style={{ color: "var(--ink-soft)", fontSize: "0.85rem", margin: 0 }}>{t.no_subtasks}</p>
          ) : (
            <div style={{ display: "grid", gap: "0.7rem" }}>
              {taak.subtaken.map((s) => (
                <SubtaakRij key={s.id} taakId={taak.id} sub={s} vrijwilligers={vrijwilligers} dict={dict} t={t}
                  updateSubtaak={updateSubtaak} removeSubtaak={removeSubtaak} toggleAssignmentSub={toggleAssignmentSub} />
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function DirectToewijzing({ taak, vrijwilligers, updateTaak, toggleAssignmentTaak, t }) {
  const statusOpts = [
    ["open", "badge-open", t.status_open], ["bezig", "badge-bezig", t.status_bezig],
    ["ok", "badge-ok", t.status_ok], ["pas_ok", "badge-pasok", t.status_pasok],
  ];

  return (
    <div style={{ marginTop: "1rem", paddingTop: "1rem", borderTop: "1px dashed var(--line)" }}>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1.5fr", gap: "0.5rem", alignItems: "end" }}>
        <Field label={t.from}>
          <input type="time" className="input" value={taak.start || ""} onChange={(e) => updateTaak(taak.id, { start: e.target.value })} />
        </Field>
        <Field label={t.to}>
          <input type="time" className="input" value={taak.eind || ""} onChange={(e) => updateTaak(taak.id, { eind: e.target.value })} />
        </Field>
        <Field label={t.daypart}>
          <select className="select" value={taak.dagdeel || "voormiddag"} onChange={(e) => {
            const val = e.target.value;
            const patch = { dagdeel: val };
            if (val === "hele_dag") { patch.start = "08:00"; patch.eind = "22:00"; }
            updateTaak(taak.id, patch);
          }}>
            <option value="voormiddag">{t.daypart_morning}</option>
            <option value="namiddag">{t.daypart_afternoon}</option>
            <option value="avond">{t.daypart_evening}</option>
            <option value="hele_dag">{t.daypart_full}</option>
          </select>
        </Field>
      </div>

      <div style={{ marginTop: "0.7rem", display: "flex", gap: "1rem", alignItems: "center", flexWrap: "wrap" }}>
        <span className="label" style={{ margin: 0 }}>{t.status}</span>
        {statusOpts.map(([val, cls, lbl]) => (
          <button key={val} className={`badge ${cls}`}
            style={{ cursor: "pointer", opacity: (taak.status || "open") === val ? 1 : 0.4,
              border: (taak.status || "open") === val ? "1px solid currentColor" : "1px solid transparent" }}
            onClick={() => updateTaak(taak.id, { status: val })}>{lbl}</button>
        ))}
      </div>

      <div style={{ marginTop: "0.7rem" }}>
        <span className="label">{t.assigned_to}</span>
        <div style={{ display: "flex", flexWrap: "wrap" }}>
          {vrijwilligers.length === 0 ? (
            <em style={{ color: "var(--ink-soft)", fontSize: "0.85rem" }}>{t.add_volunteers_first}</em>
          ) : (
            vrijwilligers.map((v) => {
              const active = (taak.toegewezen || []).includes(v.id);
              const beschikbaar = isAvailable(v, taak);
              const cls = `pill ${active ? "active" : ""} ${active && !beschikbaar ? "warn" : ""}`;
              return (
                <span key={v.id} className={cls}
                  onClick={() => toggleAssignmentTaak(taak.id, v.id)}
                  title={!beschikbaar ? t.outside_avail : ""}>
                  {!beschikbaar && active && "⚠ "}{v.voornaam} {v.naam}
                </span>
              );

          )}

      </div>

      <div style={{ marginTop: "0.5rem" }}>
        <input className="input" placeholder={t.note_optional} value={taak.opmerking || ""} onChange={(e) => updateTaak(taak.id, { opmerking: e.target.value })} />
      </div>
    </div>
  );
}

          <input className="input" value={capitalize(sub.naamFr)} onChange={(e) => updateSubtaak(taakId, sub.id, { naamFr: e.target.value })} onBlur={handleFrBlur} />
        </Field>
        <Field label={t.from}><input type="time" className="input" value={sub.start} onChange={(e) => updateSubtaak(taakId, sub.id, { start: e.target.value })} /></Field>
        <Field label={t.to}><input type="time" className="input" value={sub.eind} onChange={(e) => updateSubtaak(taakId, sub.id, { eind: e.target.value })} /></Field>
        <Field label={t.daypart}>
          <select className="select" value={sub.dagdeel} onChange={(e) => {
            const val = e.target.value;
            const patch = { dagdeel: val };
            if (val === "hele_dag") { patch.start = "08:00"; patch.eind = "22:00"; }
            updateSubtaak(taakId, sub.id, patch);
          }}>
            <option value="voormiddag">{t.daypart_morning}</option>
            <option value="namiddag">{t.daypart_afternoon}</option>
            <option value="avond">{t.daypart_evening}</option>
            <option value="hele_dag">{t.daypart_full}</option>
          </select>
        </Field>
        <button className="btn btn-danger btn-sm" onClick={() => removeSubtaak(taakId, sub.id)}>✕</button>
      </div>

      <div style={{ marginTop: "0.7rem", display: "flex", gap: "1rem", alignItems: "center", flexWrap: "wrap" }}>
        <span className="label" style={{ margin: 0 }}>{t.status}</span>
        {statusOpts.map(([val, cls, lbl]) => (
          <button key={val} className={`badge ${cls}`}
            style={{ cursor: "pointer", opacity: sub.status === val ? 1 : 0.4,
              border: sub.status === val ? "1px solid currentColor" : "1px solid transparent" }}
            onClick={() => updateSubtaak(taakId, sub.id, { status: val })}>{lbl}</button>
        ))}
      </div>

      <div style={{ marginTop: "0.7rem" }}>
        <span className="label">{t.assigned_to}</span>
        <div style={{ display: "flex", flexWrap: "wrap" }}>
          {vrijwilligers.length === 0 ? (
            <em style={{ color: "var(--ink-soft)", fontSize: "0.85rem" }}>{t.add_volunteers_first}</em>
          ) : (
            vrijwilligers.map((v) => {
              const active = sub.toegewezen.includes(v.id);
              const beschikbaar = isAvailable(v, sub);
              const cls = `pill ${active ? "active" : ""} ${active && !beschikbaar ? "warn" : ""}`;
              return (
                <span key={v.id} className={cls}
                  onClick={() => toggleAssignmentSub(taakId, sub.id, v.id)}
                  title={!beschikbaar ? t.outside_avail : ""}>
                  {!beschikbaar && active && "⚠ "}{v.voornaam} {v.naam}
                </span>
              );
            })
          )}
        </div>
      </div>

      <div style={{ marginTop: "0.5rem" }}>
        <input className="input" placeholder={t.note_optional} value={sub.opmerking}
          onChange={(e) => updateSubtaak(taakId, sub.id, { opmerking: e.target.value })} />
      </div>
    </div>
  );
}

// BERICHTEN
// ============================================================
function BerichtenTab({ data, showToast, t }) {
  const eersteId = data.sjablonen.length > 0 ? data.sjablonen[0].id : "";
  const [sjabloonId, setSjabloonId] = useState(eersteId);
  const huidigSjabloon = data.sjablonen.find((s) => s.id === sjabloonId) || data.sjablonen[0] || null;

  // ----------------------------------------------------------------
  // MATERIAALBEHEER
  // Het sjabloon "materiaalbeheer" gaat enkel naar de verantwoordelijke
  // van de taak "Materiaal beheer" / "Gestion de matériel".
  // ----------------------------------------------------------------
  const isMateriaalSjabloon = !!huidigSjabloon && huidigSjabloon.id === "materiaalbeheer";

  // Zoek de taak "Materiaal beheer" (NL of FR), case-insensitief
  const materiaalTaak = data.taken.find((tt) => {
    const nl = (tt.naamNl || "").trim().toLowerCase();
    const fr = (tt.naamFr || "").trim().toLowerCase();
    return nl === "materiaal beheer" || fr === "gestion de matériel" || fr === "gestion de materiel";
  });

  // De vrijwilliger-id van de verantwoordelijke van die taak (alleen echte vrijwilligers)
  const materiaalVerantwId =
    materiaalTaak &&
    materiaalTaak.verantwoordelijkeId &&
    materiaalTaak.verantwoordelijkeId !== "__ander__"
      ? materiaalTaak.verantwoordelijkeId
      : "";

  // Bouw de materiaallijst-tekst op voor in het bericht
  const buildMateriaallijst = (lang) => {
    const items = data.materiaal || [];
    if (items.length === 0) {
      return lang === "fr" ? "(aucun matériel)" : "(geen materiaal)";
    }
    return items
      .map((m) => {
        const naam = capitalize(lang === "fr" ? (m.naamFr || m.naamNl) : (m.naamNl || m.naamFr)) || "?";
        const aantal = m.aantal ? `${m.aantal}× ` : "";
        const oorsprong = m.oorsprong ? ` (${m.oorsprong})` : "";
        return `• ${aantal}${naam}${oorsprong}`;
      })
      .join("\n");
  };

  const buildBerichtVoor = (v) => {
    const lang = v.taal === "fr" ? "fr" : "nl";
    const sjabloon = huidigSjabloon ? (lang === "fr" ? (huidigSjabloon.fr || "") : (huidigSjabloon.nl || "")) : "";

    // Hulpfunctie: krijg leesbare naam van verantwoordelijke
    const getVerantwNaam = (tt) => {
      if (!tt.verantwoordelijkeId) return "";
      if (tt.verantwoordelijkeId === "__ander__") return tt.verantwoordelijkeVrij || "";
      const vr = data.vrijwilligers.find((x) => x.id === tt.verantwoordelijkeId);
      if (vr) return `${vr.voornaam} ${vr.naam}`.trim();
      const ec = (data.externeContacten || []).find((c) => c.id === tt.verantwoordelijkeId);
      if (ec) return ec.naam;
      return "";
    };

    const eigenTaken = [];
    data.taken.forEach((tt) => {
      const hoofdNaam = capitalize(lang === "fr" ? (tt.naamFr || tt.naamNl) : (tt.naamNl || tt.naamFr));
      const verantwNaam = getVerantwNaam(tt);
      // Vermelding alleen als er een verantwoordelijke is EN het is iemand anders dan de ontvanger zelf
      const isOntvangerVerantw = tt.verantwoordelijkeId && tt.verantwoordelijkeId === v.id;
      const verantwSuffix = (verantwNaam && !isOntvangerVerantw)
        ? ` [${lang === "fr" ? "Responsable" : "Verantwoordelijke"}: ${verantwNaam}]`
        : "";
      const eigenStar = isOntvangerVerantw
        ? (lang === "fr" ? " ⭐⭐⭐ Responsable" : " ⭐⭐⭐ Verantwoordelijke")
        : "";

      if (tt.heeftSubtaken && tt.subtaken.length > 0) {
        tt.subtaken.forEach((s) => {
          if (s.toegewezen.includes(v.id)) {
            const subNaam = capitalize(lang === "fr" ? (s.naamFr || s.naamNl) : (s.naamNl || s.naamFr));
            const tijd = s.start && s.eind ? ` (${s.start}–${s.eind})` : "";
            eigenTaken.push(`• ${hoofdNaam} — ${subNaam}${tijd}${eigenStar}${verantwSuffix}`);
          }
        });
      } else {
        if ((tt.toegewezen || []).includes(v.id)) {
          const tijd = tt.start && tt.eind ? ` (${tt.start}–${tt.eind})` : "";
          eigenTaken.push(`• ${hoofdNaam}${tijd}${eigenStar}${verantwSuffix}`);
        }
      }
    });

    const takenlijst = eigenTaken.length > 0 ? eigenTaken.join("\n") : (lang === "fr" ? "(aucune tâche assignée)" : "(geen taken toegewezen)");
    const mapslink = buildMapsLink(data.event, "driving");
    const locatie = buildAddressString(data.event);

    return sjabloon
      .replace(/{voornaam}/g, v.voornaam || "")
      .replace(/{eventnaam}/g, data.event.naam || "")
      .replace(/{eventdatum}/g, formatDate(data.event.datum, lang))
      .replace(/{locatie}/g, locatie)
      .replace(/{takenlijst}/g, takenlijst)
      .replace(/{materiaallijst}/g, buildMateriaallijst(lang))
      .replace(/{mapslink}/g, mapslink);
  };

  const buildWaLink = (v, bericht) => {
    const tel = cleanPhone(v.gsm1);
    if (!tel) return "";
    return `https://wa.me/${tel}?text=${encodeURIComponent(bericht)}`;
  };

  const copyToClipboard = async (text, naam) => {
    try {
      await navigator.clipboard.writeText(text);
      showToast(t.msg_copied(naam));
    } catch (e) {
      const ta = document.createElement("textarea");
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand("copy"); showToast(t.msg_copied(naam)); }
      catch (e2) { alert(t.cant_copy); }
      document.body.removeChild(ta);
    }
  };

  const aantalVoor = (vId) => {
    let n = 0;
    data.taken.forEach((tt) => {
      if (tt.heeftSubtaken && tt.subtaken.length > 0) {
        n += tt.subtaken.filter((s) => s.toegewezen.includes(vId)).length;
      } else if ((tt.toegewezen || []).includes(vId)) {
        n += 1;
      }
    });
    return n;
  };

  return (
    <div>
      <div className="card" style={{ marginBottom: "1.5rem" }}>
        <h2 className="font-display" style={{ marginTop: 0, fontSize: "1.4rem" }}>{t.tab_berichten}</h2>
        <p style={{ color: "var(--ink-soft)", fontSize: "0.9rem" }}>
          {t.msg_intro} <strong>"{t.copy_msg}"</strong> {t.msg_intro2}
        </p>
        {data.sjablonen.length === 0 ? (
          <p style={{ color: "var(--accent)", fontSize: "0.85rem", marginTop: "1rem", marginBottom: 0 }}>
            {t.no_templates} <strong>{t.tab_sjablonen}</strong>.
          </p>
        ) : (
          <div style={{ display: "flex", gap: "0.5rem", flexWrap: "wrap", marginTop: "1rem" }}>
            {data.sjablonen.map((s) => (
              <button key={s.id}
                className={(huidigSjabloon && s.id === huidigSjabloon.id) ? "btn btn-primary" : "btn btn-ghost"}
                onClick={() => setSjabloonId(s.id)}>
                {s.titel || "(?)"}
              </button>
            ))}
          </div>
        )}
      </div>

      {data.vrijwilligers.length === 0 ? (
        <div className="card" style={{ textAlign: "center", color: "var(--ink-soft)" }}>{t.no_volunteers}</div>
      ) : (() => {
        const sorteer = (a, b) => {
          const an = (a.naam || "").toLowerCase();
          const bn = (b.naam || "").toLowerCase();
          if (an !== bn) return an.localeCompare(bn);
          return (a.voornaam || "").toLowerCase().localeCompare((b.voornaam || "").toLowerCase());
        };

        // Bij het materiaalbeheer-sjabloon: enkel de verantwoordelijke van de taak "Materiaal beheer"
        let metTaken;
        if (isMateriaalSjabloon) {
          const verantw = materiaalVerantwId
            ? data.vrijwilligers.find((v) => v.id === materiaalVerantwId)
            : null;
          if (!verantw) {
            return (
              <div className="card" style={{ textAlign: "center", color: "var(--ink-soft)" }}>
                {t.geen_materiaalverantw}
              </div>
            );
          }
          metTaken = [verantw];
        } else {
          // Andere sjablonen: vrijwilligers met minstens één toegewezen taak (ongewijzigd gedrag)
          metTaken = data.vrijwilligers
            .filter((v) => aantalVoor(v.id) > 0)
            .sort(sorteer);
        }

        if (metTaken.length === 0) {
          return (
            <div className="card" style={{ textAlign: "center", color: "var(--ink-soft)" }}>
              {t.no_volunteers_w_tasks} <strong>{t.tab_taken}</strong>.
            </div>
          );
        }

        return (
          <div style={{ display: "grid", gap: "1rem" }}>
            {metTaken.map((v) => {
              const bericht = buildBerichtVoor(v);
              const link = buildWaLink(v, bericht);
              const aantal = aantalVoor(v.id);
              const naamVol = `${v.voornaam} ${v.naam}`.trim() || "vrijwilliger";
              return (
                <div key={v.id} className="card">
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: "1rem", flexWrap: "wrap" }}>
                    <div>
                      <strong className="font-display" style={{ fontSize: "1.1rem" }}>{naamVol}</strong>
                      <div style={{ color: "var(--ink-soft)", fontSize: "0.85rem", marginTop: "0.2rem" }}>
                        {v.taal === "fr" ? "🇫🇷" : "🇳🇱"} · {v.gsm1 || t.no_phone} · {isMateriaalSjabloon ? t.materiaalverantw_label : t.taken_assigned(aantal)}
                      </div>
                    </div>
                    <div style={{ display: "flex", gap: "0.4rem", flexWrap: "wrap" }}>
                      <button className="btn btn-ghost btn-sm" onClick={() => copyToClipboard(bericht, v.voornaam || naamVol)}>
                        {t.copy_msg}
                      </button>
                      {link && (
                        <a className="btn btn-whatsapp btn-sm" href={link} target="_blank" rel="noopener" style={{ textDecoration: "none" }}>
                          {t.open_wa}
                        </a>
                      )}
                    </div>
                  </div>
                  <details style={{ marginTop: "0.7rem" }}>
                    <summary style={{ fontSize: "0.85rem", color: "var(--ink-soft)" }}>
                      <span className="chevron">▶</span> {t.show_msg}
                    </summary>
                    <pre style={{ marginTop: "0.5rem", padding: "0.8rem", background: "var(--bg)",
                      border: "1px solid var(--line)", borderRadius: 3, whiteSpace: "pre-wrap",
                      fontFamily: "inherit", fontSize: "0.85rem" }}>{bericht}</pre>
                  </details>
                </div>
              );
            })}
          </div>
        );
      })()}
    </div>
  );
}

// ============================================================
// BULK SEND
// ============================================================
function BulkSendTab({ data, showToast, t, addExternContact, updateExternContact, removeExternContact,
                      markBulkSent, markBulkUnsent, resetBulkHistory }) {
  const [selectedIds, setSelectedIds] = useState(new Set());
  const [taalFilter, setTaalFilter] = useState("all");
  const [berichtNl, setBerichtNl] = useState("");
  const [berichtFr, setBerichtFr] = useState("");
  const [imageMode, setImageMode] = useState("none"); // none | attach | url
  const [imageDataUrl, setImageDataUrl] = useState("");
  const [imageUrl, setImageUrl] = useState("");
  const [showHelp, setShowHelp] = useState(false);
  const [previewId, setPreviewId] = useState("");
  const [useTemplateId, setUseTemplateId] = useState("");

  // Combineer vrijwilligers (met gsm1) en externe contacten
  const alleOntvangers = [
    ...data.vrijwilligers.filter((v) => v.gsm1).map((v) => ({
      id: v.id, type: "vrijwilliger",
      voornaam: v.voornaam, naam: v.naam, gsm1: v.gsm1, taal: v.taal || "nl",
    })),
    ...data.externeContacten.filter((c) => c.gsm1).map((c) => ({
      id: c.id, type: "extern",
      voornaam: c.naam, naam: "(extern)", gsm1: c.gsm1, taal: c.taal || "nl",
    })),
  ].filter((p) => taalFilter === "all" || p.taal === taalFilter)
   .sort((a, b) => {
     const an = (a.naam || "").toLowerCase();
     const bn = (b.naam || "").toLowerCase();
     if (an !== bn) return an.localeCompare(bn);
     return (a.voornaam || "").toLowerCase().localeCompare((b.voornaam || "").toLowerCase());
   });

  const selectAll = () => setSelectedIds(new Set(alleOntvangers.map((p) => p.id)));
  const deselectAll = () => setSelectedIds(new Set());
  const toggleSelect = (id) => setSelectedIds((s) => {
    const next = new Set(s);
    if (next.has(id)) next.delete(id); else next.add(id);
    return next;
  });

  const applyTemplate = (templateId) => {
    setUseTemplateId(templateId);
    if (!templateId) { setBerichtNl(""); setBerichtFr(""); return; }
    const sj = data.sjablonen.find((s) => s.id === templateId);
    if (sj) { setBerichtNl(sj.nl || ""); setBerichtFr(sj.fr || ""); }
  };

  const buildBericht = (persoon) => {
    const lang = persoon.taal === "fr" ? "fr" : "nl";
    let txt = (lang === "fr" ? berichtFr : berichtNl) || "";
    txt = txt
      .replace(/{voornaam}/g, persoon.voornaam || "")
      .replace(/{eventnaam}/g, data.event.naam || "")
      .replace(/{eventdatum}/g, formatDate(data.event.datum, lang))
      .replace(/{locatie}/g, buildAddressString(data.event))
      .replace(/{mapslink}/g, buildMapsLink(data.event, "driving"))
      .replace(/{takenlijst}/g, "");
    if (imageMode === "url" && imageUrl) {
      txt = txt + (txt.endsWith("\n") ? "" : "\n\n") + imageUrl;
    }
    return txt;
  };

  const buildWaLink = (persoon) => {
    const tel = cleanPhone(persoon.gsm1);
    if (!tel) return "";
    return `https://wa.me/${tel}?text=${encodeURIComponent(buildBericht(persoon))}`;
  };

  const handleSend = (persoon, link) => {
    const lastSent = (data.bulkGeschiedenis[persoon.id] || []).slice(-1)[0];
    if (lastSent && isToday(lastSent.datum)) {
      const naam = `${persoon.voornaam} ${persoon.naam}`.trim();
      if (!confirm(t.confirm_resend(naam, formatTimeShort(lastSent.datum)))) return;
    }
    markBulkSent(persoon.id, buildBericht(persoon));
    window.open(link, "_blank");
  };

  const handleImageUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setImageDataUrl(ev.target.result);
    reader.readAsDataURL(file);
  };

  const copyImage = async () => {
    if (!imageDataUrl) return;
    try {
      const blob = await (await fetch(imageDataUrl)).blob();
      await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
      showToast(t.img_copied);
    } catch (e) {
      showToast(t.img_copy_failed);
    }
  };

  const dupsToday = Array.from(selectedIds).filter((id) => {
    const last = (data.bulkGeschiedenis[id] || []).slice(-1)[0];
    return last && isToday(last.datum);
  });

  const deselectDups = () => {
    setSelectedIds((s) => {
      const next = new Set(s);
      dupsToday.forEach((id) => next.delete(id));
      return next;
    });
  };

  const totaalSelected = selectedIds.size;
  const sentCount = Array.from(selectedIds).filter((id) => {
    const last = (data.bulkGeschiedenis[id] || []).slice(-1)[0];
    return last && isToday(last.datum);
  }).length;

  const previewPerson = previewId ? alleOntvangers.find((p) => p.id === previewId) : null;

  return (
    <div>
      <div className="card" style={{ marginBottom: "1.5rem" }}>
        <h2 className="font-display" style={{ marginTop: 0, fontSize: "1.4rem" }}>{t.bulk_title}</h2>
        <p style={{ color: "var(--ink-soft)", fontSize: "0.9rem", margin: 0 }}>{t.bulk_intro}</p>
      </div>

      {/* Compose */}
      <div className="card" style={{ marginBottom: "1.5rem" }}>
        <h3 className="font-display" style={{ marginTop: 0, fontSize: "1.1rem" }}>{t.compose}</h3>
        <div style={{ marginBottom: "1rem" }}>
          <Field label={t.use_template}>
            <select className="select" value={useTemplateId} onChange={(e) => applyTemplate(e.target.value)}>
              <option value="">{t.none}</option>
              {data.sjablonen.map((s) => <option key={s.id} value={s.id}>{s.titel}</option>)}
            </select>
          </Field>
        </div>
        <div className="grid-2">
          <Field label={t.msg_nl}>
            <textarea className="textarea" rows={6} value={berichtNl} onChange={(e) => setBerichtNl(e.target.value)} />
          </Field>
          <Field label={t.msg_fr}>
            <textarea className="textarea" rows={6} value={berichtFr} onChange={(e) => setBerichtFr(e.target.value)} />
          </Field>
        </div>
        <p style={{ fontSize: "0.78rem", color: "var(--ink-soft)", marginTop: "0.5rem" }}>
          <strong>{t.placeholders_avail}</strong> <code>{t.placeholder_help_bulk}</code>
        </p>

        {/* Afbeelding */}
        <div style={{ marginTop: "1rem", paddingTop: "1rem", borderTop: "1px dashed var(--line)" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: "0.5rem" }}>
            <Field label={t.image}>
              <div style={{ display: "flex", gap: "0.4rem", flexWrap: "wrap" }}>
                <button className={imageMode === "none" ? "btn btn-primary btn-sm" : "btn btn-ghost btn-sm"} onClick={() => setImageMode("none")}>{t.image_none}</button>
                <button className={imageMode === "attach" ? "btn btn-primary btn-sm" : "btn btn-ghost btn-sm"} onClick={() => setImageMode("attach")}>{t.image_attach}</button>
                <button className={imageMode === "url" ? "btn btn-primary btn-sm" : "btn btn-ghost btn-sm"} onClick={() => setImageMode("url")}>{t.image_url}</button>
              </div>
            </Field>
            {imageMode !== "none" && (
              <button className="btn btn-ghost btn-sm" onClick={() => setShowHelp(!showHelp)}>{t.image_help}</button>
            )}
          </div>

          {showHelp && imageMode === "url" && (
            <div className="info-box">
              <strong>{t.image_help_title}</strong>
              <pre style={{ whiteSpace: "pre-wrap", fontFamily: "inherit", margin: "0.5rem 0 0 0", fontSize: "0.85rem" }}>{t.image_help_body}</pre>
            </div>
          )}
          {showHelp && imageMode === "attach" && (
            <div className="info-box">{t.image_attach_help}</div>
          )}

          {imageMode === "attach" && (
            <div style={{ marginTop: "0.7rem", display: "flex", alignItems: "center", gap: "0.7rem", flexWrap: "wrap" }}>
              <label className="btn btn-ghost btn-sm" style={{ cursor: "pointer" }}>
                {t.upload_image}
                <input type="file" accept="image/*" style={{ display: "none" }} onChange={handleImageUpload} />
              </label>
              {imageDataUrl && (
                <>
                  <img src={imageDataUrl} alt="" style={{ maxHeight: 60, borderRadius: 3, border: "1px solid var(--line)" }} />
                  <span style={{ fontSize: "0.85rem", color: "var(--green)" }}>✓ {t.image_loaded}</span>
                </>
              )}
            </div>
          )}

          {imageMode === "url" && (
            <div style={{ marginTop: "0.7rem" }}>
              <Field label={t.image_url_label}>
                <input className="input" value={imageUrl} onChange={(e) => setImageUrl(e.target.value)} placeholder={t.image_url_ph} />
              </Field>
            </div>
          )}
        </div>

        )}

          <p style={{ color: "var(--ink-soft)", textAlign: "center", margin: "1rem 0" }}>{t.no_recipients}</p>
        ) : (
          <div>
            {alleOntvangers.map((p) => {
              const lastSent = (data.bulkGeschiedenis[p.id] || []).slice(-1)[0];
              const sentToday = lastSent && isToday(lastSent.datum);
              const sentRecent = lastSent && !sentToday && isThisWeek(lastSent.datum);
              const cls = `send-row ${sentToday ? "sent-today" : sentRecent ? "sent-week" : ""}`;
              const naamVol = `${p.voornaam} ${p.naam}`.trim();

              return (
                <div key={p.id} className={cls}>
                  <input type="checkbox" checked={selectedIds.has(p.id)} onChange={() => toggleSelect(p.id)} />
                  <div>
                    <strong>{naamVol}</strong>
                    <div style={{ fontSize: "0.78rem", color: "var(--ink-soft)" }}>
                      {p.taal === "fr" ? "🇫🇷" : "🇳🇱"} · {p.gsm1}
                      {sentToday && ` · ${t.sent_today} ${formatTimeShort(lastSent.datum)}`}
                      {sentRecent && ` · ${t.sent_week_ago} ${formatDateShort(lastSent.datum, data.taal || "nl")}`}
                      {!lastSent && ` · ${t.not_sent}`}
                    </div>
                  </div>
                  <button className="btn btn-ghost btn-sm" onClick={() => setPreviewId(p.id === previewId ? "" : p.id)}>
                    👁
                  </button>
                  <div style={{ display: "flex", gap: "0.3rem", flexWrap: "wrap" }}>
                    {imageMode === "attach" && imageDataUrl && (
                      <button className="btn btn-ghost btn-sm" onClick={copyImage}>{t.copy_image}</button>
                    )}
                    {(() => {
                      const link = buildWaLink(p);
                      return link ? (
                        <button className="btn btn-whatsapp btn-sm" onClick={() => handleSend(p, link)}>
                          {t.open_wa}
                        </button>
                      ) : <span style={{ fontSize: "0.78rem", color: "var(--accent)" }}>{t.no_wa_number}</span>;
                    })()}
                    {sentToday && (
                      <button className="btn btn-ghost btn-sm" onClick={() => markBulkUnsent(p.id)}>{t.mark_unsent}</button>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {previewPerson && (
          <div style={{ marginTop: "1rem", padding: "1rem", background: "var(--bg)", border: "1px solid var(--line)", borderRadius: 3 }}>
            <strong style={{ fontSize: "0.85rem" }}>{t.preview} {previewPerson.voornaam} {previewPerson.naam}:</strong>
            <pre style={{ whiteSpace: "pre-wrap", fontFamily: "inherit", margin: "0.5rem 0 0 0", fontSize: "0.85rem" }}>
              {buildBericht(previewPerson)}
            </pre>
          </div>
        )}

    </div>
  );
}
