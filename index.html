<style>
  :root {

  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: 'Inter Tight', 'Helvetica Neue', system-ui, sans-serif; }
  .font-display { font-family: 'Fraunces', 'Playfair Display', Georgia, serif; font-weight: 600; letter-spacing: -0.02em; }
  .font-body { font-family: 'Inter Tight', 'Helvetica Neue', system-ui, sans-serif; }
  .tab-btn { padding: 0.6rem 1.1rem; border: none; background: transparent; color: var(--ink-soft); font-size: 0.85rem; font-weight: 500; letter-spacing: 0.02em; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; text-transform: uppercase; }
  .tab-btn:hover { color: var(--ink); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .card { background: var(--bg-card); border: 1px solid var(--line); border-radius: 4px; padding: 1.5rem; }
  .input, .select, .textarea { width: 100%; padding: 0.55rem 0.75rem; border: 1px solid var(--line); background: white; border-radius: 3px; font-family: 'Inter Tight', sans-serif; font-size: 0.9rem; color: var(--ink); }
  .input:focus, .select:focus, .textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
  .label { display: block; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-soft); margin-bottom: 0.35rem; }
  .btn { padding: 0.55rem 1rem; border-radius: 3px; border: none; font-family: 'Inter Tight', sans-serif; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.15s; letter-spacing: 0.01em; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #a8341f; }
  .btn-ghost { background: transparent; color: var(--ink); border: 1px solid var(--line); }
  .btn-ghost:hover { background: var(--bg); border-color: var(--ink-soft); }
  .btn-danger { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  .btn-danger:hover { background: var(--accent); color: white; }
  .btn-whatsapp { background: var(--whatsapp); color: white; }

  .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.78rem; }

  .badge-bezig { background: #f4e4c5; color: var(--amber); }

  .alert-bar { padding: 1rem 1.5rem; border-radius: 4px; margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; }
  .alert-amber { background: #f4e4c5; border-left: 4px solid var(--amber); }
  .alert-red { background: var(--accent-soft); border-left: 4px solid var(--accent); }
  .alert-green { background: #dde7d3; border-left: 4px solid var(--green); }
  .pill { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.25rem 0.6rem; background: var(--bg); border: 1px solid var(--line); border-radius: 999px; font-size: 0.78rem; color: var(--ink); margin: 0.15rem; cursor: pointer; }
  .pill.active { background: var(--accent); color: white; border-color: var(--accent); }
  .pill.warn { border-color: var(--amber); background: #fdf6e3; }
  a.link { color: var(--accent); text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 2px; }
  a.link:hover { color: #a8341f; }
  details > summary { cursor: pointer; list-style: none; }
  details > summary::-webkit-details-marker { display: none; }
  .chevron { display: inline-block; transition: transform 0.2s; }
  details[open] .chevron { transform: rotate(90deg); }
  .grid-2 { display: grid; gap: 1.5rem; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); }

  .switch { display: inline-flex; align-items: center; gap: 0.5rem; cursor: pointer; user-select: none; }
  .switch-track { width: 36px; height: 20px; background: var(--line); border-radius: 999px; position: relative; transition: background 0.2s; }
  .switch-track::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: white; border-radius: 50%; transition: transform 0.2s; }
  .switch.on .switch-track { background: var(--accent); }
  .switch.on .switch-track::after { transform: translateX(16px); }
  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--ink); color: white; padding: 0.7rem 1.2rem; border-radius: 4px; font-size: 0.85rem; z-index: 1000; }
  .dict-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 0.5rem; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid var(--line); }
  .dict-row:last-child { border-bottom: none; }
  .lang-toggle { display: inline-flex; border: 1px solid var(--line); border-radius: 3px; overflow: hidden; }
  .lang-toggle button { background: transparent; border: none; padding: 0.4rem 0.7rem; font-size: 0.78rem; font-weight: 600; cursor: pointer; color: var(--ink-soft); }
  .lang-toggle button.active { background: var(--accent); color: white; }

  .info-box { background: #fdf6e3; border-left: 3px solid var(--gold); padding: 0.8rem 1rem; border-radius: 3px; font-size: 0.85rem; margin: 1rem 0; color: var(--ink); }

const buildReverseDict = dict => {
  const rev = {};
  Object.entries(dict).forEach(([nl, fr]) => {
    rev[fr.toLowerCase()] = nl;
  });
  return rev;
};
const matchCase = (original, translated) => {
  if (!original) return translated;
  if (original[0] === original[0].toUpperCase()) {
    return translated.charAt(0).toUpperCase() + translated.slice(1);
  }
  return translated;
};

// Forceer lowercase voor opslag (gebruikt voor materiaal-, taak-, woordenboek-namen)
const normalizeName = s => (s || "").toString().trim().toLowerCase();

// Aanspreeknaam voor sjablonen: roepnaam indien ingevuld, anders voornaam
const aanspreeknaam = v => v && v.roepnaam && v.roepnaam.trim() ? v.roepnaam.trim() : v && v.voornaam || "";

// Eerste letter hoofdletter voor weergave
const capitalize = s => {
  if (!s) return "";
  const str = s.toString();
  return str.charAt(0).toUpperCase() + str.slice(1);
};
const translateText = (text, from, to, dict) => {
  if (!text) return "";
  const lower = text.trim().toLowerCase();
  const lookup = from === "nl" ? dict : buildReverseDict(dict);
  if (lookup[lower]) return matchCase(text, lookup[lower]);
  const tokens = text.split(/(\s+|[,;.])/);
  let foundAny = false;
  const translated = tokens.map(tok => {
    if (!tok.trim() || /^[\s,;.]+$/.test(tok)) return tok;
    const lt = tok.toLowerCase();
    if (lookup[lt]) {
      foundAny = true;
      return matchCase(tok, lookup[lt]);
    }
    return tok;
  }).join("");
  return foundAny ? translated : "";
};

// Vaste oorsprong-waarde die de winkel-flow activeert
const WINKEL_OORSPRONG = "Winkel_Magasin";

// Parse een bedrag-string (komma of punt) naar getal
const parseBedragNum = v => {
  const n = parseFloat(String(v == null ? "" : v).replace(",", "."));
  return isNaN(n) ? 0 : n;
};
// Bedrag formatteren als "€ 12,34"
const fmtEuro = n => `€ ${(Number(n) || 0).toFixed(2).replace(".", ",")}`;

// Bereken de kostensamenvatting van het huidige evenement
function berekenKosten(data) {
  const kb = data.kostenbeheer || {
    budget: "",
    zaalhuur: "",
    manueleKosten: [],
    kasStart: "",
    kasBewegingen: []
  };
  const budget = parseBedragNum(kb.budget);
  const zaalhuur = parseBedragNum(kb.zaalhuur);

  // 🔧 KRITIEKE FIX: bepaal exact welke kasticket-sleutels actief zijn in Winkelbestellingen.
  // Niet alleen filteren op winkelId, want oude/wees-kastickets van dezelfde winkel
  // (bv. w_colruyt|__geen__|__geen__) mogen niet meetellen in Kostenbeheer.
  const kasticketKeyKosten = (best, winkelId) => {
    const wk = winkelId || "__geen__";
    const ak = best && best.aankoperId === "__extern__"
      ? `ext:${(best.aankoperVrij || "").trim().toLowerCase()}`
      : (best && best.aankoperId) || "__geen__";
    const dt = best && best.datum ? best.datum : "__geen__";
    return `${wk}|${ak}|${dt}`;
  };
  const actieveKasticketKeys = new Set();
  (data.materiaal || []).forEach(mat => {
    if (
      mat &&
      mat.oorsprong === WINKEL_OORSPRONG &&
      mat.winkelId &&
      mat.winkelId.trim() !== ""
    ) {
      const best = (data.winkelbestellingen || {})[mat.id] || {};
      actieveKasticketKeys.add(kasticketKeyKosten(best, mat.winkelId));
    }
  });

  // Winkeltotalen: som van de actieve kasticketbedragen per winkel.
  const winkelPerNaam = {};
  const kastickets = data.kastickets || {};
  let winkelUitKasTotaal = 0;
  const winkelUitKas = [];
  Object.keys(kastickets).forEach(key => {
    // 🔧 FILTER: alleen kastickets die exact overeenkomen met actuele Winkelbestellingen.
    if (!actieveKasticketKeys.has(key)) return;

    const kt = kastickets[key];
    const bedrag = parseBedragNum(kt.bedrag);
    if (bedrag === 0) return;
    const winkelId = key.split("|")[0];

    const w = (data.winkels || []).find(x => x.id === winkelId);
    const naam = w ? w.naam : "—";
    if (kt.uitKas) {
      winkelUitKasTotaal += bedrag;
      winkelUitKas.push({winkel: naam, bedrag});
    } else {
      winkelPerNaam[naam] = (winkelPerNaam[naam] || 0) + bedrag;
    }
  });
  const winkelTotaal = Object.values(winkelPerNaam).reduce((a, b) => a + b, 0);

  // Manuele kosten
  const manueelTotaal = (kb.manueleKosten || []).reduce((a, k) => a + parseBedragNum(k.bedrag), 0);

  // Voorverkoop-inkomsten
  const voorverkoopTotaal = (data.voorverkopen || []).reduce((a, v) => a + parseBedragNum(v.bedrag), 0);

  // Zelfinbreng-inkomsten
  const zelfinbrengTotaal = (data.zelfinbreng || []).reduce((a, z) => a + parseBedragNum(z.bedrag), 0);

  // Streefdoel voorverkoop + restant
  const voorverkoopStreefdoel = parseBedragNum(data.voorverkoopStreefdoel);
  const voorverkoopRestant = voorverkoopStreefdoel - voorverkoopTotaal;

  // Budget: zaalhuur + winkelkosten (niet uit kas) + manuele kosten
  const totaalUitgegeven = zaalhuur + winkelTotaal + manueelTotaal;
  // Saldo: budget + voorverkoop + zelfinbreng - uitgaven
  const totaleInkomsten = budget + voorverkoopTotaal + zelfinbrengTotaal;
  const saldo = totaleInkomsten - totaalUitgegeven;

  // --- Kasberekening (apart van het budget) ---
  const kasStart = parseBedragNum(kb.kasStart);
  let kasIn = 0,
    kasUit = 0;
  (kb.kasBewegingen || []).forEach(b => {
    const bed = parseBedragNum(b.bedrag);
    if (b.type === "uit") kasUit += bed;else kasIn += bed;
  });
  // Uit-kas-betaalde winkelaankopen tellen ook als kasuitgave
  const kasUitTotaal = kasUit + winkelUitKasTotaal;
  const kasEind = kasStart + kasIn - kasUitTotaal;
  return {
    budget,
    zaalhuur,
    winkelPerNaam,
    winkelTotaal,
    manueelTotaal,
    totaalUitgegeven,
    saldo,
    voorverkoopTotaal,
    zelfinbrengTotaal,
    totaleInkomsten,
    voorverkoopStreefdoel,
    voorverkoopRestant,
    kasStart,
    kasIn,
    kasUitBewegingen: kasUit,
    winkelUitKas,
    winkelUitKasTotaal,
    kasUitTotaal,
    kasEind
  };
}

const daysUntil = iso => {
  if (!iso) return null;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const target = new Date(iso);
  target.setHours(0, 0, 0, 0);
  return Math.round((target - today) / (1000 * 60 * 60 * 24));
};
const isAvailable = (v, item) => {
  if (!v || !item) return true;
  const av = v.beschikbaarheid;
  if (!av || av === "hele_dag") return true;
  if (!item.start || !item.eind) return true;
  const startH = parseInt(item.start.split(":")[0], 10);
  const eindH = parseInt(item.eind.split(":")[0], 10);
  if (av === "voormiddag") return eindH <= 12;
  if (av === "namiddag") return startH >= 12 && eindH <= 18;
  if (av === "avond") return startH >= 17;
  if (av === "aangepast") {
    if (!v.beschikbaarVan || !v.beschikbaarTot) return true;
    return item.start >= v.beschikbaarVan && item.eind <= v.beschikbaarTot;
  }
  return true;
};
const cleanPhone = raw => {
  if (!raw) return "";
  let tel = String(raw).replace(/[\s\-().]/g, "");
  if (tel.startsWith("+")) tel = tel.slice(1);
  if (tel.startsWith("00")) tel = tel.slice(2);
  if (tel.startsWith("0")) tel = "32" + tel.slice(1);
  return tel.replace(/[^\d]/g, "");
};
const isToday = iso => {
  if (!iso) return false;
  const d = new Date(iso);
  const t = new Date();
  return d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth() && d.getDate() === t.getDate();
};
const isThisWeek = iso => {
  if (!iso) return false;
  const d = new Date(iso);
  const t = new Date();
  const diff = (t - d) / (1000 * 60 * 60 * 24);
  return diff >= 0 && diff < 7;
};
const formatTimeShort = iso => {

  });
};

// Slimme merge: bestaande data + nieuwe data (matchen op id)
const mergeData = (oldData, newData) => {
  const result = {
    ...oldData
  };

  // Event: alleen overschrijven als de nieuwe een naam heeft
  if (newData.event && newData.event.naam) {
    result.event = newData.event;
  }

  // Vrijwilligers: matchen op id, anders toevoegen
  if (Array.isArray(newData.vrijwilligers) && newData.vrijwilligers.length > 0) {
    const existingById = new Map(oldData.vrijwilligers.map(v => [v.id, v]));
    newData.vrijwilligers.forEach(v => {
      if (v.id && existingById.has(v.id)) {
        existingById.set(v.id, {
          ...existingById.get(v.id),
          ...v
        });
      } else {
        existingById.set(v.id || uid(), v);
      }
    });
    result.vrijwilligers = Array.from(existingById.values());
  }

  // Taken: matchen op id
  if (Array.isArray(newData.taken) && newData.taken.length > 0) {
    const existingById = new Map(oldData.taken.map(t => [t.id, t]));
    newData.taken.forEach(t => {
      if (t.id && existingById.has(t.id)) {

              ...oldSubsById.get(s.id),
              ...s
            });
          } else {
            oldSubsById.set(s.id || uid(), s);
          }
        });
        existingById.set(t.id, {
          ...old,
          ...t,
          subtaken: Array.from(oldSubsById.values())
        });
      } else {
        existingById.set(t.id || uid(), t);
      }
    });
    result.taken = Array.from(existingById.values());
  }

  // Woordenboek: samenvoegen, nieuwe waarden winnen
  if (newData.woordenboek && Object.keys(newData.woordenboek).length > 0) {
    result.woordenboek = {
      ...oldData.woordenboek,
      ...newData.woordenboek
    };
  }

  // Sjablonen: matchen op id
  if (Array.isArray(newData.sjablonen) && newData.sjablonen.length > 0) {
    const existingById = new Map(oldData.sjablonen.map(s => [s.id, s]));
    newData.sjablonen.forEach(s => {
      if (s.id && existingById.has(s.id)) {
        existingById.set(s.id, {
          ...existingById.get(s.id),
          ...s
        });
      } else {
        existingById.set(s.id || uid(), s);
      }
    });
    result.sjablonen = Array.from(existingById.values());
  }

  // Materiaal: matchen op id, anders toevoegen
  if (Array.isArray(newData.materiaal) && newData.materiaal.length > 0) {
    const existingById = new Map((oldData.materiaal || []).map(m => [m.id, m]));
    newData.materiaal.forEach(m => {
      if (m.id && existingById.has(m.id)) {
        existingById.set(m.id, {
          ...existingById.get(m.id),
          ...m
        });
      } else {
        existingById.set(m.id || uid(), m);
      }
    });
    result.materiaal = Array.from(existingById.values());
  }

  // OorsprongLijst: samenvoegen (uniek)
  if (Array.isArray(newData.oorsprongLijst) && newData.oorsprongLijst.length > 0) {
    const merged = [...(oldData.oorsprongLijst || [])];
    newData.oorsprongLijst.forEach(loc => {
      if (!merged.includes(loc)) merged.push(loc);
    });
    result.oorsprongLijst = merged;
  }
  return result;
};

// Download Excel-template voor DatabaseContacten
const downloadGvTemplate = () => {
  const template = [{
    voornaam: "Johan",
    naam: "Janssens",
    gsm1: "+32475123456",
    taal: "nl",
    geslacht: "m"
  }, {
    voornaam: "Marie",
    naam: "Dupont",
    gsm1: "+32476234567",
    taal: "fr",
    geslacht: "f"
  }];
  const ws = XLSX.utils.json_to_sheet(template);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "DatabaseContacten");
  XLSX.writeFile(wb, "database_contacten_template.xlsx");
};

// Importeer DatabaseContacten uit Excel
const importGvContacten = (file, setData, t, showToast) => {
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const wb = XLSX.read(ev.target.result, {
        type: "array"
      });
      const sheet = wb.Sheets["DatabaseContacten"] || wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet);
      if (!rows.length) {
        showToast(t.import_failed);
        return;
      }
      const contacten = rows.map(r => ({
        id: uid(),
        voornaam: (r.voornaam || r.Voornaam || r.prenom || r.Prénom || "").toString().trim(),
        naam: (r.naam || r.Naam || r.nom || r.Nom || "").toString().trim(),
        gsm1: (r.gsm1 || r.GSM || r.gsm || r.telefoon || r.tel || "").toString().trim(),
        taal: (r.taal || r.langue || r.lang || "nl").toString().toLowerCase().startsWith("fr") ? "fr" : "nl",
        geslacht: (r.geslacht || r.sexe || r.gender || "").toString().toLowerCase().startsWith("f") ? "f" : (r.geslacht || r.sexe || r.gender || "").toString().toLowerCase().startsWith("m") || (r.geslacht || r.sexe || r.gender || "").toString().toLowerCase().startsWith("h") ? "m" : ""
      })).filter(c => c.gsm1);
      setData(d => ({
        ...d,
        databaseContacten: contacten
      }));
      showToast(t.gv_contact_count(contacten.length, contacten.filter(c => c.taal === "nl").length, contacten.filter(c => c.taal === "fr").length));
    } catch (err) {
      console.error(err);
      showToast(t.import_failed);
    }
  };
  reader.readAsArrayBuffer(file);
};

// ============================================================
// HELPERS: OVERLAP & SLIMME PLANNER
// ============================================================

// Converteert tijdstring "HH:MM" naar minuten
const toMinutes = s => {
  if (!s) return null;
  const [h, m] = s.split(":").map(Number);
  return h * 60 + m;
};

// Geeft het tijdslot van een taak/subtaak als [start, eind] in minuten
const getSlot = unit => {
  const s = toMinutes(unit.start);
  const e = toMinutes(unit.eind);
  if (s === null || e === null || s >= e) return null;
  return [s, e];
};

// Controleert of twee slots overlappen
const slotsOverlap = (a, b) => a[0] < b[1] && b[0] < a[1];

// Geeft alle (unit, taaknaam) paren terug voor een vrijwilliger
const getAllUnitsForVolunteer = (vrijwilligerId, taken, taal) => {
  const units = [];
  taken.forEach(tt => {
    const naam = taal === "fr" ? tt.naamFr || tt.naamNl : tt.naamNl || tt.naamFr;
    if (tt.heeftSubtaken && tt.subtaken.length > 0) {
      tt.subtaken.forEach(s => {
        if ((s.toegewezen || []).includes(vrijwilligerId)) {
          const subNaam = taal === "fr" ? s.naamFr || s.naamNl : s.naamNl || s.naamFr;
          units.push({
            unit: s,
            label: `${capitalize(naam)} — ${capitalize(subNaam)}`
          });
        }
      });
    } else {
      if ((tt.toegewezen || []).includes(vrijwilligerId)) {
        units.push({
          unit: tt,
          label: capitalize(naam)
        });
      }
    }
  });
  return units;
};

// Berekent alle shiftoverlaps: geeft array van { vrijwilliger, taak1, taak2 }
const detectOverlaps = (vrijwilligers, taken, taal) => {
  const conflicts = [];
  vrijwilligers.forEach(v => {
    const units = getAllUnitsForVolunteer(v.id, taken, taal);
    for (let i = 0; i < units.length; i++) {
      for (let j = i + 1; j < units.length; j++) {
        const slotA = getSlot(units[i].unit);

// Foto inladen + comprimeren tot een kleine JPEG-dataURL (localStorage-vriendelijk)
function comprimeerAfbeelding(file, maxZijde, kwaliteit) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        let {
          width,
          height
        } = img;
        if (width > height && width > maxZijde) {
          height = Math.round(height * (maxZijde / width));
          width = maxZijde;
        } else if (height > maxZijde) {
          width = Math.round(width * (maxZijde / height));
          height = maxZijde;
        }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", kwaliteit));
      };
      img.onerror = () => reject(new Error("beeld"));
      img.src = ev.target.result;
    };
    reader.onerror = () => reject(new Error("lezen"));
    reader.readAsDataURL(file);
  });
}

  const kb = data.kostenbeheer || {
    budget: "",
    zaalhuur: "",
    manueleKosten: []
  };
  const k = berekenKosten(data);
  const [bezig, setBezig] = React.useState(false);

  // Grafiekdata: kostenposten
  const posten = [];
  if (k.zaalhuur > 0) posten.push({
    label: t.kb_zaal,
    bedrag: k.zaalhuur,
    kleur: "#c4442a"
  });
  Object.keys(k.winkelPerNaam).sort().forEach((naam, i) => {
    const tinten = ["#3a7d44", "#4a9d54", "#5cb867", "#73c97e", "#8ad994"];
    posten.push({
      label: naam,
      bedrag: k.winkelPerNaam[naam],
      kleur: tinten[i % tinten.length]
    });
  });
  (kb.manueleKosten || []).forEach(mk => {
    const bedrag = parseBedragNum(mk.bedrag);
    if (bedrag > 0) posten.push({
      label: mk.naam || t.kb_manueel,
      bedrag,
      kleur: "#d99b2a"
    });
  });
  const maxWaarde = Math.max(k.budget, k.totaalUitgegeven, 1);
  const overBudget = k.totaleInkomsten > 0 && k.totaalUitgegeven > k.totaleInkomsten;

  // ----- PDF genereren -----
  const genereerPDF = () => {
    const jsPDFns = window.jspdf;
    if (!jsPDFns || !jsPDFns.jsPDF) {
      alert(t.kb_pdf_fout);
      return null;
    }
    const doc = new jsPDFns.jsPDF({
      unit: "mm",
      format: "a4"
    });
    const pageW = 210,
      pageH = 297,
      marge = 12;
    let y = marge;
    // Betrouwbare paginabreuk: roep aan vóór je 'nodig' mm tekent
    const nieuwePagina = nodig => {
      if (y + nodig > pageH - marge) {
        doc.addPage();
        y = marge;
      }
    };

    // Kleuren
    const ROOD = [192, 57, 43],
      GROEN = [39, 122, 67],
      ORANJE = [216, 155, 42];
    const DONKER = [26, 22, 18],
      GRIJS = [120, 120, 120],
      LIJN = [225, 215, 200];
    const DONKERBLAUW = [22, 42, 64],
      LICHTGROEN = [232, 245, 235],
      BLAUW = [41, 98, 168];
    const GROENLICHT = [120, 230, 150],
      ROODLICHT = [240, 130, 120];

    // Helpers
    const kaart = (x, yy, w, h, fill) => {
      if (fill) doc.setFillColor(fill[0], fill[1], fill[2]);else doc.setFillColor(255, 255, 255);
      doc.setDrawColor(LIJN[0], LIJN[1], LIJN[2]);
      doc.setLineWidth(0.3);
      doc.roundedRect(x, yy, w, h, 2.5, 2.5, fill ? "F" : "FD");
    };
    const cirkel = (cx, cy, r, kleur) => {
      doc.setFillColor(kleur[0], kleur[1], kleur[2]);
      doc.circle(cx, cy, r, "F");
    };
    // Tekst afkorten op breedte
    const kort = (tekst, breedte, fontSize) => {
      doc.setFontSize(fontSize);
      const regels = doc.splitTextToSize(String(tekst || ""), breedte);
      if (regels.length <= 1) return regels[0] || "";
      // neem eerste regel + ellips
      let r = regels[0];
      while (r.length > 1 && doc.getTextWidth(r + "…") > breedte) r = r.slice(0, -1);
      return r + "…";
    };

    // Namen-helpers
    const persoonNaam = (id, vrij) => {
      if (id === "__ander__") return vrij || "—";
      if (id) {
        const v = (data.vrijwilligers || []).find(x => x.id === id);
        if (v) return `${v.naam} ${v.voornaam}`.trim();
        const c = (data.externeContacten || []).find(x => x.id === id);
        if (c) return c.naam || "—";
      }
      return "—";
    };
    const betaalDetail = vv => {
      const map = {
        payconiq: t.betaalwijze_payconiq,
        cash: t.betaalwijze_cash,
        overschrijving: t.betaalwijze_overschrijving,
        bancontact: t.betaalwijze_bancontact
      };
      let s = map[vv.betaalwijze] || "";
      if (vv.betaalwijze === "payconiq" && vv.rekeningId) {
        const r = (data.betaalrekeningen || []).find(x => x.id === vv.rekeningId);
        if (r) s += ` (${lang === "fr" ? "compte" : "rekening"} ${r.naam})`;
      }
      if (vv.betaalwijze === "cash") {
        let aanWie = "";
        if (vv.cashAanWieId === "__kassabeheerder__") aanWie = vv.cashAanWieVrij || t.vv_cash_kassabeheerder;else if (vv.cashAanWieId) aanWie = persoonNaam(vv.cashAanWieId, "");
        if (aanWie && aanWie !== "—") s += ` (${lang === "fr" ? "de" : "van"}: ${aanWie})`;
      }
      return s;
    };
    const datumKort = d => d ? new Date(d).toLocaleDateString(lang === "fr" ? "fr-BE" : "nl-BE") : "—";

    // ===================== KOP =====================
    doc.setFillColor(ROOD[0], ROOD[1], ROOD[2]);
    doc.roundedRect(marge, y, pageW - 2 * marge, 34, 3, 3, "F");
    const tx = marge + 10,
      ty = y + 17;
    doc.setDrawColor(255, 255, 255);
    doc.setLineWidth(1.1);
    doc.line(tx - 8, ty - 3, tx, ty - 10);
    doc.line(tx, ty - 10, tx + 8, ty - 3);
    doc.line(tx - 8, ty - 3, tx + 8, ty - 3);
    doc.setFillColor(255, 255, 255);
    doc.triangle(tx, ty - 13, tx, ty - 10, tx + 4, ty - 11.5, "F");
    doc.line(tx, ty - 13, tx, ty - 10);
    doc.setLineWidth(0.9);
    doc.line(tx - 7, ty - 3, tx - 7, ty + 7);
    doc.line(tx + 7, ty - 3, tx + 7, ty + 7);
    doc.line(tx - 7, ty + 7, tx + 7, ty + 7);
    doc.line(tx - 2.5, ty + 7, tx - 2.5, ty + 1);
    doc.line(tx + 2.5, ty + 7, tx + 2.5, ty + 1);
    doc.line(tx - 2.5, ty + 1, tx + 2.5, ty + 1);
    doc.setTextColor(255, 255, 255);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(20);
    doc.text(kort(data.event.naam || t.no_event, pageW - 2 * marge - 90, 20), marge + 28, y + 14);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    const datumTekst = data.event.datum ? formatDate(data.event.datum, lang).toUpperCase() : "";
    if (datumTekst) {
      doc.setDrawColor(255, 255, 255);
      doc.setLineWidth(0.4);
      doc.roundedRect(marge + 28, y + 19, 4, 4, 0.6, 0.6, "S");
      doc.text(datumTekst, marge + 34, y + 22.3);
    }
    // Badge
    const badgeW = 52,
      badgeH = 16,
      badgeX = pageW - marge - badgeW - 4,
      badgeY = y + 9;
    doc.setFillColor(255, 255, 255);
    doc.roundedRect(badgeX, badgeY, badgeW, badgeH, 3, 3, "F");
    const badgeKleur = overBudget ? ROOD : GROEN;
    cirkel(badgeX + 8, badgeY + badgeH / 2, 4, badgeKleur);
    doc.setDrawColor(255, 255, 255);
    doc.setLineWidth(0.9);
    if (overBudget) {
      doc.line(badgeX + 6.3, badgeY + badgeH / 2 - 1.5, badgeX + 9.7, badgeY + badgeH / 2 + 1.5);
      doc.line(badgeX + 9.7, badgeY + badgeH / 2 - 1.5, badgeX + 6.3, badgeY + badgeH / 2 + 1.5);
    } else {
      doc.line(badgeX + 6.2, badgeY + badgeH / 2, badgeX + 7.6, badgeY + badgeH / 2 + 1.6);
      doc.line(badgeX + 7.6, badgeY + badgeH / 2 + 1.6, badgeX + 10, badgeY + badgeH / 2 - 1.8);
    }
    doc.setTextColor(badgeKleur[0], badgeKleur[1], badgeKleur[2]);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(7.5);
    const badgeRegels = doc.splitTextToSize(overBudget ? t.pdf_badge_over : t.pdf_badge_ok, badgeW - 18);
    doc.text(badgeRegels, badgeX + 15, badgeY + badgeH / 2 - (badgeRegels.length - 1) * 1.6 + 1);
    y += 34 + 6;
    doc.setTextColor(DONKER[0], DONKER[1], DONKER[2]);

    // ===================== 4 KERNCIJFER-KAARTJES =====================
    const kaartW = (pageW - 2 * marge - 3 * 4) / 4;
    const kaartH = 26;
    const kaartData = [{
      label: t.kb_totale_inkomsten,
      waarde: k.totaleInkomsten,
      kleur: GROEN
    }, {
      label: t.kb_totaal_uit,
      waarde: k.totaalUitgegeven,
      kleur: ROOD
    }, {
      label: overBudget ? t.kb_over : t.kb_saldo,
      waarde: Math.abs(k.saldo),
      kleur: overBudget ? ROOD : GROEN
    }, {
      label: t.tab_voorverkoop,
      waarde: k.voorverkoopTotaal,
      kleur: ORANJE
    }];
    kaartData.forEach((kd, i) => {
      const kx = marge + i * (kaartW + 4);
      kaart(kx, y, kaartW, kaartH);
      cirkel(kx + 8, y + 9, 5, kd.kleur);
      doc.setFillColor(255, 255, 255);
      doc.circle(kx + 8, y + 9, 1.6, "F");
      doc.setTextColor(kd.kleur[0], kd.kleur[1], kd.kleur[2]);
      doc.setFont("helvetica", "bold");
      doc.setFontSize(6.5);
      doc.text(doc.splitTextToSize(kd.label.toUpperCase(), kaartW - 18), kx + 15, y + 7);
      doc.setFontSize(13);
      doc.text(fmtEuro(kd.waarde), kx + 4, y + 22);
    });
    y += kaartH + 6;
    doc.setTextColor(DONKER[0], DONKER[1], DONKER[2]);

    // ===================== KOSTENVERDELING + BUDGET (twee kolommen, elk eigen hoogte) =====================
    const kolW = (pageW - 2 * marge - 5) / 2;

    // --- Bereken hoogte LINKS (donut + legende) ---
    const aantalPosten = posten.length;
    const legendeH = Math.max(aantalPosten * 7, 40);
    const linksH = 18 + Math.max(legendeH, 52);

    // --- Bereken hoogte RECHTS (budget-delen + balk + uitgegeven + melding) ---
    let budgetDelen = 1; // basisbudget
    if (k.voorverkoopTotaal > 0) budgetDelen++;
    if (k.zelfinbrengTotaal > 0) budgetDelen++;
    const rechtsH = 18 + budgetDelen * 5.5 + 8 + 14 + 10 + 22;
    const blokH = Math.max(linksH, rechtsH, 70);
    nieuwePagina(blokH + 4);
    const blokTop = y;

    // --- LINKS: Kostenverdeling met donut ---
    kaart(marge, blokTop, kolW, blokH);
    let ly = blokTop + 8;
    cirkel(marge + 7, ly, 3, DONKERBLAUW);
    doc.setTextColor(DONKER[0], DONKER[1], DONKER[2]);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(11);
    doc.text(t.kb_verdeling.toUpperCase(), marge + 13, ly + 1.5);
    ly += 10;
    const totaalPosten = posten.reduce((a, p) => a + p.bedrag, 0);
    if (totaalPosten > 0) {
      const donutCx = marge + 24,
        donutCy = ly + 22,
        donutR = 18,
        donutBinnenR = 10;
      let hoek = -90;
      posten.forEach(p => {
        const deel = p.bedrag / totaalPosten;
        const hoekEind = hoek + deel * 360;
        const rgb = hexNaarRgb(p.kleur);
        doc.setFillColor(rgb[0], rgb[1], rgb[2]);
        const stappen = Math.max(2, Math.ceil(deel * 60));
        for (let s = 0; s < stappen; s++) {
          const a1 = (hoek + (hoekEind - hoek) * (s / stappen)) * Math.PI / 180;
          const a2 = (hoek + (hoekEind - hoek) * ((s + 1) / stappen)) * Math.PI / 180;
          doc.triangle(donutCx, donutCy, donutCx + donutR * Math.cos(a1), donutCy + donutR * Math.sin(a1), donutCx + donutR * Math.cos(a2), donutCy + donutR * Math.sin(a2), "F");
        }
        hoek = hoekEind;
      });
      doc.setFillColor(255, 255, 255);
      doc.circle(donutCx, donutCy, donutBinnenR, "F");
      doc.setTextColor(GRIJS[0], GRIJS[1], GRIJS[2]);
      doc.setFont("helvetica", "normal");
      doc.setFontSize(6.5);
      doc.text(t.kb_totaal_label || "TOTAAL", donutCx, donutCy - 1, {
        align: "center"
      });
      doc.setTextColor(DONKER[0], DONKER[1], DONKER[2]);
      doc.setFont("helvetica", "bold");
      doc.setFontSize(8);
      doc.text(fmtEuro(totaalPosten), donutCx, donutCy + 3, {
        align: "center"
      });

      // Legende: ALLE posten
      let legY = ly + 2;
      const legX = marge + 46;
      posten.forEach(p => {
        const rgb = hexNaarRgb(p.kleur);
        cirkel(legX, legY, 1.8, rgb);
        doc.setTextColor(DONKER[0], DONKER[1], DONKER[2]);
        doc.setFont("helvetica", "normal");
        doc.setFontSize(7.5);
        doc.text(kort(p.label, kolW - 62, 7.5), legX + 4, legY + 0.5);
        doc.setTextColor(rgb[0], rgb[1], rgb[2]);
        doc.setFont("helvetica", "bold");
        doc.setFontSize(8);
        const pct = Math.round(p.bedrag / totaalPosten * 1000) / 10;
        doc.text(`${fmtEuro(p.bedrag)}  ·  ${`${pct}`.replace(".", ",")}%`, legX + 4, legY + 4.5);
        legY += 7;
      });
    } else {
      doc.setTextColor(GRIJS[0], GRIJS[1], GRIJS[2]);
      doc.setFont("helvetica", "normal");
      doc.setFontSize(8.5);
      doc.text(t.kb_winkel_geen, marge + 6, ly + 16);
    }

    // --- RECHTS: Budget vs uitgaven ---
    const rx = marge + kolW + 5;
    kaart(rx, blokTop, kolW, blokH);
    let ry = blokTop + 8;
    cirkel(rx + 7, ry, 3, DONKERBLAUW);
    doc.setTextColor(DONKER[0], DONKER[1], DONKER[2]);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(11);
    doc.text(t.kb_grafiek.toUpperCase(), rx + 13, ry + 1.5);
    ry += 12;
    const regelRechts = (label, waarde, vet) => {
      doc.setFont("helvetica", vet ? "bold" : "normal");
      doc.setFontSize(9);
      doc.setTextColor(DONKER[0], DONKER[1], DONKER[2]);
      doc.text(label, rx + 6, ry);
      doc.text(fmtEuro(waarde), rx + kolW - 6, ry, {
        align: "right"
      });
      ry += 5.5;
    };
    regelRechts(t.kb_basisbudget, k.budget);
    if (k.voorverkoopTotaal > 0) regelRechts(t.tab_voorverkoop, k.voorverkoopTotaal);
    if (k.zelfinbrengTotaal > 0) regelRechts(t.zi_titel_kort, k.zelfinbrengTotaal);
    ry += 0.5;
    doc.setDrawColor(LIJN[0], LIJN[1], LIJN[2]);
    doc.setLineWidth(0.3);
    doc.line(rx + 6, ry - 2, rx + kolW - 6, ry - 2);
    ry += 1.5;
    regelRechts(t.kb_totaal_beschikbaar, k.totaleInkomsten, true);
    ry += 3;
    const beschikbaar = k.totaleInkomsten;
    const balkX = rx + 6,
      balkW = kolW - 12,
      balkH = 9;
    const pctRuw = beschikbaar > 0 ? k.totaalUitgegeven / beschikbaar * 100 : 0;
    const pctVisueel = Math.min(100, pctRuw);
    const isOver = beschikbaar > 0 && k.totaalUitgegeven > beschikbaar;
    const balkKleur = isOver ? ROOD : GROEN;
    doc.setFillColor(228, 228, 228);
    doc.roundedRect(balkX, ry, balkW, balkH, 2, 2, "F");
    const vulW = Math.max(balkW * pctVisueel / 100, pctVisueel > 0 ? 2 : 0);
    if (vulW > 0) {
      doc.setFillColor(balkKleur[0], balkKleur[1], balkKleur[2]);
      doc.roundedRect(balkX, ry, vulW, balkH, 2, 2, "F");
    }
    const pctTekst = `${Math.round(pctRuw)}%`;
    doc.setFont("helvetica", "bold");
    doc.setFontSize(11);
    const tekstY = ry + balkH / 2 + 1.6;
    if (pctVisueel >= 55) {
      doc.setTextColor(255, 255, 255);
      doc.text(pctTekst, balkX + vulW / 2, tekstY, {
        align: "center"
      });
    } else {
      doc.setTextColor(balkKleur[0], balkKleur[1], balkKleur[2]);
      doc.text(pctTekst, balkX + vulW + 3, tekstY, {
        align: "left"
      });
    }
    ry += balkH + 5;
    doc.setFont("helvetica", "normal");
    doc.setFontSize(9.5);
    doc.setTextColor(DONKER[0], DONKER[1], DONKER[2]);
    doc.text(t.kb_totaal_uit, rx + 6, ry + 1);
    doc.setFont("helvetica", "bold");
    doc.text(fmtEuro(k.totaalUitgegeven), rx + kolW - 6, ry + 1, {
      align: "right"
    });
    // Melding onderaan binnen kaart
    const meldH = 16;
    const meldY = blokTop + blokH - meldH - 5;
    doc.setFillColor(overBudget ? 250 : LICHTGROEN[0], overBudget ? 240 : LICHTGROEN[1], overBudget ? 238 : LICHTGROEN[2]);
    doc.setDrawColor(overBudget ? ROOD[0] : GROEN[0], overBudget ? ROOD[1] : GROEN[1], overBudget ? ROOD[2] : GROEN[2]);
    doc.setLineWidth(0.3);
    doc.roundedRect(rx + 6, meldY, kolW - 12, meldH, 2, 2, "FD");
    cirkel(rx + 14, meldY + meldH / 2, 4, overBudget ? ROOD : GROEN);
    doc.setDrawColor(255, 255, 255);
    doc.setLineWidth(0.9);
    if (overBudget) {
      doc.line(rx + 12, meldY + meldH / 2 - 1.6, rx + 16, meldY + meldH / 2 + 1.6);
      doc.line(rx + 16, meldY + meldH / 2 - 1.6, rx + 12, meldY + meldH / 2 + 1.6);
    } else {
      doc.line(rx + 12.2, meldY + meldH / 2, rx + 13.6, meldY + meldH / 2 + 1.6);
      doc.line(rx + 13.6, meldY + meldH / 2 + 1.6, rx + 16, meldY + meldH / 2 - 1.8);
    }
    doc.setTextColor(overBudget ? ROOD[0] : GROEN[0], overBudget ? ROOD[1] : GROEN[1], overBudget ? ROOD[2] : GROEN[2]);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(8.5);
    doc.text(doc.splitTextToSize(overBudget ? t.pdf_meld_over : t.pdf_meld_ok, kolW - 26), rx + 20, meldY + meldH / 2 - 1);
    y = blokTop + blokH + 6;
    doc.setTextColor(DONKER[0], DONKER[1], DONKER[2]);

    // ===================== Sectiekop-helper (volle breedte) =====================
    const sectieKop = (titel, totaalBedrag, kleur, pilFill, pilTekstKleur) => {
      nieuwePagina(14);
      cirkel(marge + 6, y + 2, 4, kleur);
      doc.setFillColor(255, 255, 255);
      doc.circle(marge + 6, y + 2, 1.4, "F");
      doc.setTextColor(DONKER[0], DONKER[1], DONKER[2]);
      doc.setFont("helvetica", "bold");
      doc.setFontSize(11);
      doc.text(titel.toUpperCase(), marge + 13, y + 3.5);
      if (totaalBedrag != null) {
        doc.setFillColor(pilFill[0], pilFill[1], pilFill[2]);
        doc.roundedRect(pageW - marge - 34, y - 1.5, 30, 9, 2, 2, "F");
        doc.setTextColor(pilTekstKleur[0], pilTekstKleur[1], pilTekstKleur[2]);
        doc.setFontSize(9.5);
        doc.text(fmtEuro(totaalBedrag), pageW - marge - 6, y + 3.5, {
          align: "right"
        });
      }
      y += 11;
    };

    // ===================== VOORVERKOPEN (volle breedte, doorlopend) =====================
    const vvLijst = data.voorverkopen || [];
    sectieKop(t.vv_titel, k.voorverkoopTotaal, ROOD, [252, 232, 232], ROOD);
    if (vvLijst.length === 0) {
      nieuwePagina(8);
      doc.setTextColor(GRIJS[0], GRIJS[1], GRIJS[2]);
      doc.setFont("helvetica", "normal");
      doc.setFontSize(8.5);
      doc.text(t.vv_geen, marge + 6, y + 2);
      y += 8;
    } else {
      // groepeer per bron
      const perBron = {};
      vvLijst.forEach(vv => {
        const b = vv.bron || "—";
        (perBron[b] = perBron[b] || []).push(vv);
      });
      Object.keys(perBron).sort().forEach(bron => {
        const items = perBron[bron].slice().sort((a, b) => (a.datum || "").localeCompare(b.datum || ""));
        const bronTotaal = items.reduce((s, vv) => s + parseBedragNum(vv.bedrag), 0);
        nieuwePagina(8);
        doc.setFont("helvetica", "bold");
        doc.setFontSize(9.5);
        doc.setTextColor(DONKER[0], DONKER[1], DONKER[2]);
        doc.text(kort(bron, kolW, 9.5), marge + 6, y);
        doc.text(fmtEuro(bronTotaal), pageW - marge - 6, y, {
          align: "right"
        });
        y += 5.5;
        items.forEach(vv => {
          const detail = betaalDetail(vv);
          const regelH = detail ? 9 : 5.5;
          nieuwePagina(regelH + 1);
          doc.setTextColor(GRIJS[0], GRIJS[1], GRIJS[2]);
          doc.setFont("helvetica", "normal");
          doc.setFontSize(8);
          doc.text(datumKort(vv.datum), marge + 10, y);
          doc.setTextColor(DONKER[0], DONKER[1], DONKER[2]);
          doc.setFont("helvetica", "bold");
          doc.setFontSize(8.5);
          doc.text(kort(persoonNaam(vv.verkoperId, vv.verkoperVrij), 80, 8.5), marge + 34, y);
          doc.setTextColor(ROOD[0], ROOD[1], ROOD[2]);
          doc.text(fmtEuro(parseBedragNum(vv.bedrag)), pageW - marge - 6, y, {
            align: "right"
          });
          if (detail) {
            doc.setTextColor(GRIJS[0], GRIJS[1], GRIJS[2]);

function exportToJson() {
  const data = localStorage.getItem('evenement_beheer_data_v4');
  if (!data) {
    alert('Geen data gevonden!');
    return;
  }
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'evenement_beheer_export_' + new Date().toISOString().split('T')[0] + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
