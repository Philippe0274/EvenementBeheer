<style>
  :root {

    --gold: #b8923a; --green: #4a6b3a; --amber: #c08a2e; --whatsapp: #25d366;

  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: 'Inter Tight', 'Helvetica Neue', system-ui, sans-serif; }
  .font-display { font-family: 'Fraunces', 'Playfair Display', Georgia, serif; font-weight: 600; letter-spacing: -0.02em; }
  .font-body { font-family: 'Inter Tight', 'Helvetica Neue', system-ui, sans-serif; }
  .tab-btn { padding: 0.6rem 1.1rem; border: none; background: transparent; color: var(--ink-soft); font-size: 0.85rem; font-weight: 500; letter-spacing: 0.02em; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; text-transform: uppercase; }
  .tab-btn:hover { color: var(--ink); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .card { background: var(--bg-card); border: 1px solid var(--line); border-radius: 4px; padding: 1.5rem; }
  .input, .select, .textarea { width: 100%; padding: 0.55rem 0.75rem; border: 1px solid var(--line); background: white; border-radius: 3px; font-family: 'Inter Tight', sans-serif; font-size: 0.9rem; color: var(--ink); }
  .input:focus, .select:focus, .textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
  .label { display: block; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-soft); margin-bottom: 0.35rem; }
  .btn { padding: 0.55rem 1rem; border-radius: 3px; border: none; font-family: 'Inter Tight', sans-serif; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.15s; letter-spacing: 0.01em; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #a8341f; }
  .btn-ghost { background: transparent; color: var(--ink); border: 1px solid var(--line); }
  .btn-ghost:hover { background: var(--bg); border-color: var(--ink-soft); }
  .btn-danger { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  .btn-danger:hover { background: var(--accent); color: white; }
  .btn-whatsapp { background: var(--whatsapp); color: white; }
  .btn-whatsapp:hover { background: #1ebe57; }
  .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.78rem; }
  .badge { display: inline-block; padding: 0.2rem 0.6rem; font-size: 0.7rem; font-weight: 600; border-radius: 2px; letter-spacing: 0.04em; text-transform: uppercase; }
  .badge-open { background: #ede4d3; color: var(--ink-soft); }
  .badge-bezig { background: #f4e4c5; color: var(--amber); }
  .badge-ok { background: #dde7d3; color: var(--green); }
  .badge-pasok { background: var(--accent-soft); color: var(--accent); }
  .stat-num { font-family: 'Fraunces', serif; font-size: 2.5rem; font-weight: 600; color: var(--ink); line-height: 1; letter-spacing: -0.03em; }
  .stat-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-soft); margin-top: 0.4rem; font-weight: 500; }
  .alert-bar { padding: 1rem 1.5rem; border-radius: 4px; margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; }
  .alert-amber { background: #f4e4c5; border-left: 4px solid var(--amber); }
  .alert-red { background: var(--accent-soft); border-left: 4px solid var(--accent); }
  .alert-green { background: #dde7d3; border-left: 4px solid var(--green); }
  .pill { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.25rem 0.6rem; background: var(--bg); border: 1px solid var(--line); border-radius: 999px; font-size: 0.78rem; color: var(--ink); margin: 0.15rem; cursor: pointer; }
  .pill.active { background: var(--accent); color: white; border-color: var(--accent); }
  .pill.warn { border-color: var(--amber); background: #fdf6e3; }
  a.link { color: var(--accent); text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 2px; }
  a.link:hover { color: #a8341f; }
  details > summary { cursor: pointer; list-style: none; }
  details > summary::-webkit-details-marker { display: none; }
  .chevron { display: inline-block; transition: transform 0.2s; }
  details[open] .chevron { transform: rotate(90deg); }
  .grid-2 { display: grid; gap: 1.5rem; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); }
  @media (max-width: 800px) { .grid-2 { grid-template-columns: 1fr; } }
  .switch { display: inline-flex; align-items: center; gap: 0.5rem; cursor: pointer; user-select: none; }
  .switch-track { width: 36px; height: 20px; background: var(--line); border-radius: 999px; position: relative; transition: background 0.2s; }
  .switch-track::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: white; border-radius: 50%; transition: transform 0.2s; }
  .switch.on .switch-track { background: var(--accent); }
  .switch.on .switch-track::after { transform: translateX(16px); }
  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--ink); color: white; padding: 0.7rem 1.2rem; border-radius: 4px; font-size: 0.85rem; z-index: 1000; }
  .dict-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 0.5rem; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid var(--line); }
  .dict-row:last-child { border-bottom: none; }
  .lang-toggle { display: inline-flex; border: 1px solid var(--line); border-radius: 3px; overflow: hidden; }
  .lang-toggle button { background: transparent; border: none; padding: 0.4rem 0.7rem; font-size: 0.78rem; font-weight: 600; cursor: pointer; color: var(--ink-soft); }
  .lang-toggle button.active { background: var(--accent); color: white; }
  .send-row { display: grid; grid-template-columns: auto 1fr auto auto; gap: 0.7rem; align-items: center; padding: 0.6rem 0.8rem; border: 1px solid var(--line); background: white; border-radius: 3px; margin-bottom: 0.4rem; }
  .send-row.sent-today { background: #dde7d3; border-color: var(--green); }
  .send-row.sent-week { background: #f4e4c5; border-color: var(--amber); }
  .info-box { background: #fdf6e3; border-left: 3px solid var(--gold); padding: 0.8rem 1rem; border-radius: 3px; font-size: 0.85rem; margin: 1rem 0; color: var(--ink); }

const buildReverseDict = (dict) => {
  const rev = {};
  Object.entries(dict).forEach(([nl, fr]) => { rev[fr.toLowerCase()] = nl; });
  return rev;
};

const matchCase = (original, translated) => {
  if (!original) return translated;
  if (original[0] === original[0].toUpperCase()) {
    return translated.charAt(0).toUpperCase() + translated.slice(1);
  }
  return translated;
};

// Forceer lowercase voor opslag (gebruikt voor materiaal-, taak-, woordenboek-namen)
const normalizeName = (s) => (s || "").toString().trim().toLowerCase();

// Aanspreeknaam voor sjablonen: roepnaam indien ingevuld, anders voornaam
const aanspreeknaam = (v) => ((v && v.roepnaam && v.roepnaam.trim()) ? v.roepnaam.trim() : ((v && v.voornaam) || ""));

// Eerste letter hoofdletter voor weergave
const capitalize = (s) => {
  if (!s) return "";
  const str = s.toString();
  return str.charAt(0).toUpperCase() + str.slice(1);
};

const translateText = (text, from, to, dict) => {
  if (!text) return "";
  const lower = text.trim().toLowerCase();
  const lookup = from === "nl" ? dict : buildReverseDict(dict);
  if (lookup[lower]) return matchCase(text, lookup[lower]);
  const tokens = text.split(/(\s+|[,;.])/);
  let foundAny = false;
  const translated = tokens.map((tok) => {
    if (!tok.trim() || /^[\s,;.]+$/.test(tok)) return tok;
    const lt = tok.toLowerCase();
    if (lookup[lt]) { foundAny = true; return matchCase(tok, lookup[lt]); }
    return tok;
  }).join("");
  return foundAny ? translated : "";
};

// Parse een bedrag-string (komma of punt) naar getal
const parseBedragNum = (v) => {
  const n = parseFloat(String(v == null ? "" : v).replace(",", "."));
  return isNaN(n) ? 0 : n;
};
// Bedrag formatteren als "€ 12,34"
const fmtEuro = (n) => `€ ${(Number(n) || 0).toFixed(2).replace(".", ",")}`;

// Bereken de kostensamenvatting van het huidige evenement
function berekenKosten(data) {
  const kb = data.kostenbeheer || { budget: "", zaalhuur: "", manueleKosten: [], kasStart: "", kasBewegingen: [] };
  const budget = parseBedragNum(kb.budget);
  const zaalhuur = parseBedragNum(kb.zaalhuur);

  // Winkeltotalen: som van kasticketbedragen per winkel.
  // Kastickets die "uit de kas" zijn betaald, gaan NIET in het budget —
  // die verschijnen apart in het kasoverzicht.
  const winkelPerNaam = {};
  const kastickets = data.kastickets || {};
  let winkelUitKasTotaal = 0;
  const winkelUitKas = []; // {winkel, bedrag} voor het kasoverzicht
  Object.keys(kastickets).forEach((key) => {
    const kt = kastickets[key];
    const bedrag = parseBedragNum(kt.bedrag);
    if (bedrag === 0) return;
    const winkelId = key.split("|")[0];
    const w = (data.winkels || []).find((x) => x.id === winkelId);
    const naam = w ? w.naam : "—";
    if (kt.uitKas) {
      winkelUitKasTotaal += bedrag;
      winkelUitKas.push({ winkel: naam, bedrag });
    } else {
      winkelPerNaam[naam] = (winkelPerNaam[naam] || 0) + bedrag;
    }
  });
  const winkelTotaal = Object.values(winkelPerNaam).reduce((a, b) => a + b, 0);

  // Manuele kosten
  const manueelTotaal = (kb.manueleKosten || [])
    .reduce((a, k) => a + parseBedragNum(k.bedrag), 0);

  // Budget: zaalhuur + winkelkosten (niet uit kas) + manuele kosten
  const totaalUitgegeven = zaalhuur + winkelTotaal + manueelTotaal;
  const saldo = budget - totaalUitgegeven;

  // --- Kasberekening (apart van het budget) ---
  const kasStart = parseBedragNum(kb.kasStart);
  let kasIn = 0, kasUit = 0;
  (kb.kasBewegingen || []).forEach((b) => {
    const bed = parseBedragNum(b.bedrag);
    if (b.type === "uit") kasUit += bed;
    else kasIn += bed;
  });
  // Uit-kas-betaalde winkelaankopen tellen ook als kasuitgave
  const kasUitTotaal = kasUit + winkelUitKasTotaal;
  const kasEind = kasStart + kasIn - kasUitTotaal;

  return {
    budget, zaalhuur, winkelPerNaam, winkelTotaal, manueelTotaal, totaalUitgegeven, saldo,
    kasStart, kasIn, kasUitBewegingen: kasUit, winkelUitKas, winkelUitKasTotaal, kasUitTotaal, kasEind,
  };
}

const formatDate = (iso, lang = "nl") => {
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleDateString(lang === "fr" ? "fr-BE" : "nl-BE", {
    weekday: "long", day: "numeric", month: "long", year: "numeric",
  });
};

const buildAddressString = (e) =>
  [e.locatieNaam, `${e.straat || ""} ${e.nummer || ""}`.trim(), `${e.postcode || ""} ${e.gemeente || ""}`.trim()]
    .filter(Boolean).join(", ");

const buildVrijwilligerAdres = (v) => {
  return [v.straat || "", `${v.postcode || ""} ${v.gemeente || ""}`.trim()].filter((x) => x.trim()).join(", ");
};

const buildMapsLink = (e, mode = "driving") => {
  const addr = buildAddressString(e);
  if (!addr) return "";
  return `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(addr)}&travelmode=${mode}`;
};

const buildMapsSearchLink = (addr) => {
  if (!addr) return "";
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(addr)}`;
};

const buildNmbsLink = (e) => {
  const addr = `${e.gemeente || ""}`.trim();
  if (!addr) return "";
  return `https://www.belgiantrain.be/nl/travel-info/routeplanner?to=${encodeURIComponent(addr)}`;
};

const daysUntil = (iso) => {
  if (!iso) return null;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const target = new Date(iso);
  target.setHours(0, 0, 0, 0);
  return Math.round((target - today) / (1000 * 60 * 60 * 24));
};

const isAvailable = (v, item) => {
  if (!v || !item) return true;
  const av = v.beschikbaarheid;
  if (!av || av === "hele_dag") return true;
  if (!item.start || !item.eind) return true;
  const startH = parseInt(item.start.split(":")[0], 10);
  const eindH = parseInt(item.eind.split(":")[0], 10);
  if (av === "voormiddag") return eindH <= 12;
  if (av === "namiddag") return startH >= 12 && eindH <= 18;
  if (av === "avond") return startH >= 17;
  if (av === "aangepast") {
    if (!v.beschikbaarVan || !v.beschikbaarTot) return true;
    return item.start >= v.beschikbaarVan && item.eind <= v.beschikbaarTot;
  }
  return true;
};

const cleanPhone = (raw) => {
  if (!raw) return "";
  let tel = String(raw).replace(/[\s\-().]/g, "");
  if (tel.startsWith("+")) tel = tel.slice(1);
  if (tel.startsWith("00")) tel = tel.slice(2);
  if (tel.startsWith("0")) tel = "32" + tel.slice(1);
  return tel.replace(/[^\d]/g, "");
};

const isToday = (iso) => {
  if (!iso) return false;
  const d = new Date(iso);
  const t = new Date();
  return d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth() && d.getDate() === t.getDate();
};

const isThisWeek = (iso) => {
  if (!iso) return false;
  const d = new Date(iso);
  const t = new Date();
  const diff = (t - d) / (1000 * 60 * 60 * 24);
  return diff >= 0 && diff < 7;
};

const formatTimeShort = (iso) => {
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleTimeString("nl-BE", { hour: "2-digit", minute: "2-digit" });
};

const formatDateShort = (iso, lang = "nl") => {
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleDateString(lang === "fr" ? "fr-BE" : "nl-BE", { day: "numeric", month: "short" });
};

// Veilige normalisatie van geladen data
const normalizeData = (raw) => {
  if (!raw || typeof raw !== "object") return defaultData;
  const safe = { ...defaultData };
  safe.taal = (raw.taal === "fr" ? "fr" : "nl");

  if (raw.event && typeof raw.event === "object") safe.event = { ...defaultData.event, ...raw.event };

  if (Array.isArray(raw.vrijwilligers)) {
    safe.vrijwilligers = raw.vrijwilligers.map((v) => ({
      id: v.id || uid(),
      voornaam: v.voornaam || "", naam: v.naam || "",
      roepnaam: v.roepnaam || "",
      geslacht: v.geslacht || "", taal: (v.taal || "nl").toString().toLowerCase(),
      // Migratie: oud 'telefoon' wordt gsm1
      gsm1: v.gsm1 || v.telefoon || "",
      gsm2: v.gsm2 || "",
      email: v.email || "",
      straat: v.straat || "", postcode: String(v.postcode || ""), gemeente: v.gemeente || "",
      beschikbaarheid: v.beschikbaarheid || "hele_dag",
      beschikbaarVan: v.beschikbaarVan || "", beschikbaarTot: v.beschikbaarTot || "",
      opmerking: v.opmerking || "",
    }));
  }

  if (Array.isArray(raw.taken)) {
    safe.taken = raw.taken.map((t) => ({
      id: t.id || uid(),
      naamNl: normalizeName(t.naamNl), naamFr: normalizeName(t.naamFr), categorie: t.categorie || "",
      heeftSubtaken: !!t.heeftSubtaken,
      start: t.start || "", eind: t.eind || "", dagdeel: t.dagdeel || "voormiddag",
      toegewezen: Array.isArray(t.toegewezen) ? t.toegewezen : [],
      status: t.status || "open", opmerking: t.opmerking || "",
      verantwoordelijkeId: t.verantwoordelijkeId || "",
      verantwoordelijkeVrij: t.verantwoordelijkeVrij || "",
      subtaken: Array.isArray(t.subtaken) ? t.subtaken.map((s) => ({
        id: s.id || uid(),
        naamNl: normalizeName(s.naamNl), naamFr: normalizeName(s.naamFr),
        start: s.start || "", eind: s.eind || "", dagdeel: s.dagdeel || "voormiddag",
        toegewezen: Array.isArray(s.toegewezen) ? s.toegewezen : [],
        status: s.status || "open", opmerking: s.opmerking || "",
      })) : [],
    }));
  }

  if (raw.woordenboek && typeof raw.woordenboek === "object" && !Array.isArray(raw.woordenboek)) {
    const normalized = {};
    Object.entries(raw.woordenboek).forEach(([k, v]) => {
      if (typeof k === "string" && typeof v === "string") {
        normalized[normalizeName(k)] = normalizeName(v);
      }
    });
    safe.woordenboek = { ...defaultDictionary, ...normalized };
  }

  if (Array.isArray(raw.sjablonen)) {
    const cleaned = raw.sjablonen
      .filter((s) => s && typeof s === "object")
      .map((s) => ({
        id: s.id || uid(),
        titel: s.titel || "Sjabloon",
        nl: typeof s.nl === "string" ? s.nl : "",
        fr: typeof s.fr === "string" ? s.fr : "",
      }));
    safe.sjablonen = cleaned.length > 0 ? cleaned : defaultSjablonen;
  } else if (raw.sjablonen && typeof raw.sjablonen === "object") {
    const titels = { welkomst: "Welkomstbericht", week: "Herinnering 1 week vooraf", dag: "Herinnering 1 dag vooraf" };
    const ids = new Set();
    Object.keys(raw.sjablonen).forEach((k) => {
      const m = k.match(/^(.+)_(nl|fr)$/);
      if (m) ids.add(m[1]);
    });
    if (ids.size > 0) {
      safe.sjablonen = Array.from(ids).map((id) => ({
        id, titel: titels[id] || id,
        nl: raw.sjablonen[`${id}_nl`] || "",
        fr: raw.sjablonen[`${id}_fr`] || "",
      }));
    }
  }

  // Zorg dat het materiaalbeheer-sjabloon altijd aanwezig is.
  // Verdwenen uit oude opgeslagen data? Dan vullen we de standaardversie aan.
  if (Array.isArray(safe.sjablonen)) {
    const heeftMateriaal = safe.sjablonen.some((s) => {
      const titel = (s.titel || "").trim().toLowerCase();
      return s.id === "materiaalbeheer" ||
        titel === "materiaalbeheer" || titel === "materiaal beheer" || titel === "gestion de matériel" ||
        ((s.nl || "") + (s.fr || "")).includes("{materiaallijst}");
    });
    if (!heeftMateriaal) {
      const standaard = defaultSjablonen.find((s) => s.id === "materiaalbeheer");
      if (standaard) safe.sjablonen = [standaard, ...safe.sjablonen];
    }
  }

  if (Array.isArray(raw.externeContacten)) {
    safe.externeContacten = raw.externeContacten.map((c) => ({
      id: c.id || uid(),
      naam: c.naam || "",
      gsm1: c.gsm1 || c.telefoon || "",
      taal: (c.taal || "nl").toString().toLowerCase(),
    }));
  }

  if (raw.bulkGeschiedenis && typeof raw.bulkGeschiedenis === "object") {
    safe.bulkGeschiedenis = raw.bulkGeschiedenis;
  }

  // Oude oorsprong-waarde "Winkel_Magazin" corrigeren naar "Winkel_Magasin"
  const fixOorsprong = (o) => (o === "Winkel_Magazin" ? WINKEL_OORSPRONG : (o || ""));

  if (Array.isArray(raw.materiaal)) {
    safe.materiaal = raw.materiaal.map((m) => ({
      id: m.id || uid(),
      naamNl: normalizeName(m.naamNl),
      naamFr: normalizeName(m.naamFr),
      aantal: m.aantal || "",
      oorsprong: fixOorsprong(m.oorsprong),
      verantwoordelijkeId: m.verantwoordelijkeId || "",
      verantwoordelijkeVrij: m.verantwoordelijkeVrij || "",
      winkelId: m.winkelId || "",
    }));
  }

  if (Array.isArray(raw.oorsprongLijst) && raw.oorsprongLijst.length > 0) {
    safe.oorsprongLijst = raw.oorsprongLijst
      .filter((x) => typeof x === "string" && x.trim())
      .map((x) => (x === "Winkel_Magazin" ? WINKEL_OORSPRONG : x));
    // Zorg dat de winkel-oorsprong altijd kiesbaar is
    if (!safe.oorsprongLijst.includes(WINKEL_OORSPRONG)) {
      safe.oorsprongLijst.push(WINKEL_OORSPRONG);
    }
  }

  // Winkels (stamlijst). Ontbreekt de lijst, dan blijven de defaults uit defaultData staan.
  if (Array.isArray(raw.winkels) && raw.winkels.length > 0) {
    safe.winkels = raw.winkels
      .filter((w) => w && typeof w === "object")
      .map((w) => ({
        id: w.id || uid(),
        naam: (w.naam || "").toString().trim(),
        btw: (w.btw || "").toString().trim(),
      }))
      .filter((w) => w.naam);
  }

  // Winkelbestellingen (evenementspecifiek): {materiaalId: {datum, aankoperId, aankoperVrij}}
  if (raw.winkelbestellingen && typeof raw.winkelbestellingen === "object") {
    safe.winkelbestellingen = raw.winkelbestellingen;
  }

  // Kasticket-bedragen + foto (evenementspecifiek): {kasticketKey: {bedrag, foto}}
  if (raw.kastickets && typeof raw.kastickets === "object") {
    safe.kastickets = raw.kastickets;
  }

  // Kostenbeheer (evenementspecifiek)
  if (raw.kostenbeheer && typeof raw.kostenbeheer === "object") {
    safe.kostenbeheer = {
      budget: raw.kostenbeheer.budget || "",
      zaalhuur: raw.kostenbeheer.zaalhuur || "",
      manueleKosten: Array.isArray(raw.kostenbeheer.manueleKosten)
        ? raw.kostenbeheer.manueleKosten.map((k) => ({
            id: k.id || uid(),
            naam: (k.naam || "").toString(),
            bedrag: k.bedrag || "",
          }))
        : [],
      // Kas: startbedrag + bewegingen (type "in" = ontvangst, "uit" = uitgave)
      kasStart: raw.kostenbeheer.kasStart || "",
      kasBewegingen: Array.isArray(raw.kostenbeheer.kasBewegingen)
        ? raw.kostenbeheer.kasBewegingen.map((k) => ({
            id: k.id || uid(),
            naam: (k.naam || "").toString(),
            bedrag: k.bedrag || "",
            type: k.type === "uit" ? "uit" : "in",
          }))
        : [],
    };
  }

  // Event History (afgesloten evenementen, behouden over evenementen heen)
  if (Array.isArray(raw.eventHistory)) {
    safe.eventHistory = raw.eventHistory
      .filter((e) => e && typeof e === "object")
      .map((e) => ({
        id: e.id || uid(),
        naam: e.naam || "", datum: e.datum || "", gemeente: e.gemeente || "",
        afgesloten: e.afgesloten || "",
        budget: e.budget || 0, zaalhuur: e.zaalhuur || 0,
        winkelTotaal: e.winkelTotaal || 0, manueelTotaal: e.manueelTotaal || 0,
        totaalUitgegeven: e.totaalUitgegeven || 0, saldo: e.saldo || 0,
      }));
  }

  // Datum van de laatste algemene backup
  if (typeof raw.laatsteBackup === "string") {
    safe.laatsteBackup = raw.laatsteBackup;
  }

  // Overgeslagen aandachtspunt-categorieën
  if (Array.isArray(raw.overgeslagenAandachtspunten)) {
    safe.overgeslagenAandachtspunten = raw.overgeslagenAandachtspunten.filter((x) => typeof x === "string");
  }

  return safe;
};

// Slimme merge: bestaande data + nieuwe data (matchen op id)
const mergeData = (oldData, newData) => {
  const result = { ...oldData };

  // Event: alleen overschrijven als de nieuwe een naam heeft
  if (newData.event && newData.event.naam) {
    result.event = newData.event;
  }

  // Vrijwilligers: matchen op id, anders toevoegen
  if (Array.isArray(newData.vrijwilligers) && newData.vrijwilligers.length > 0) {
    const existingById = new Map(oldData.vrijwilligers.map((v) => [v.id, v]));
    newData.vrijwilligers.forEach((v) => {
      if (v.id && existingById.has(v.id)) {
        existingById.set(v.id, { ...existingById.get(v.id), ...v });
      } else {
        existingById.set(v.id || uid(), v);
      }
    });
    result.vrijwilligers = Array.from(existingById.values());
  }

  // Taken: matchen op id
  if (Array.isArray(newData.taken) && newData.taken.length > 0) {
    const existingById = new Map(oldData.taken.map((t) => [t.id, t]));
    newData.taken.forEach((t) => {
      if (t.id && existingById.has(t.id)) {
        const old = existingById.get(t.id);
        // Behoud subtaken merge
        const oldSubsById = new Map(old.subtaken.map((s) => [s.id, s]));
        (t.subtaken || []).forEach((s) => {
          if (s.id && oldSubsById.has(s.id)) {
            oldSubsById.set(s.id, { ...oldSubsById.get(s.id), ...s });
          } else {
            oldSubsById.set(s.id || uid(), s);
          }
        });
        existingById.set(t.id, { ...old, ...t, subtaken: Array.from(oldSubsById.values()) });
      } else {
        existingById.set(t.id || uid(), t);
      }
    });
    result.taken = Array.from(existingById.values());
  }

  // Woordenboek: samenvoegen, nieuwe waarden winnen
  if (newData.woordenboek && Object.keys(newData.woordenboek).length > 0) {
    result.woordenboek = { ...oldData.woordenboek, ...newData.woordenboek };
  }

  // Sjablonen: matchen op id
  if (Array.isArray(newData.sjablonen) && newData.sjablonen.length > 0) {
    const existingById = new Map(oldData.sjablonen.map((s) => [s.id, s]));
    newData.sjablonen.forEach((s) => {
      if (s.id && existingById.has(s.id)) {
        existingById.set(s.id, { ...existingById.get(s.id), ...s });
      } else {
        existingById.set(s.id || uid(), s);
      }
    });
    result.sjablonen = Array.from(existingById.values());
  }

  // Materiaal: matchen op id, anders toevoegen
  if (Array.isArray(newData.materiaal) && newData.materiaal.length > 0) {
    const existingById = new Map((oldData.materiaal || []).map((m) => [m.id, m]));
    newData.materiaal.forEach((m) => {
      if (m.id && existingById.has(m.id)) {
        existingById.set(m.id, { ...existingById.get(m.id), ...m });
      } else {
        existingById.set(m.id || uid(), m);
      }
    });
    result.materiaal = Array.from(existingById.values());
  }

  // OorsprongLijst: samenvoegen (uniek)
  if (Array.isArray(newData.oorsprongLijst) && newData.oorsprongLijst.length > 0) {
    const merged = [...(oldData.oorsprongLijst || [])];
    newData.oorsprongLijst.forEach((loc) => {
      if (!merged.includes(loc)) merged.push(loc);
    });
    result.oorsprongLijst = merged;
  }

  return result;
};

function App() {
  const [data, setData] = useState(defaultData);
  const [tab, setTab] = useState("dashboard");
  const [toonTerugKnop, setToonTerugKnop] = useState(false);
  // Sprong vanuit een Dashboard-aandachtspunt: onthoud dat we terug kunnen
  const springNaarTab = (doelTab) => { setToonTerugKnop(true); setTab(doelTab); };
  // Gewone tabwissel wist de terugknop
  const wisselTab = (doelTab) => { setToonTerugKnop(false); setTab(doelTab); };
  const [loaded, setLoaded] = useState(false);
  const [toast, setToast] = useState("");
  const [helpOpen, setHelpOpen] = useState(false);

  const t = T[data.taal] || T.nl;

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(""), 2200);
  };

  // Initial load: probeer v4, daarna oudere keys voor migratie
  useEffect(() => {
    try {
      let raw = localStorage.getItem(STORAGE_KEY);
      let migrated = false;
      if (!raw) {
        // Probeer migratie van oudere versies
        for (const oldKey of OLD_KEYS) {
          const oldRaw = localStorage.getItem(oldKey);
          if (oldRaw) { raw = oldRaw; migrated = true; break; }
        }
      }
      if (raw) {
        const parsed = JSON.parse(raw);
        const normalized = normalizeData(parsed);
        setData(normalized);
        if (migrated) console.log("Data gemigreerd van oudere versie naar v4");
      }
    } catch (e) {
      console.error("Laden mislukt:", e);
    }
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
    catch (e) { console.error(e); }
  }, [data, loaded]);

  const setTaal = (taal) => setData((d) => ({ ...d, taal }));

  const updateEvent = (patch) => setData((d) => ({ ...d, event: { ...d.event, ...patch } }));

  const addVrijwilliger = () => setData((d) => ({
    ...d,
    vrijwilligers: [...d.vrijwilligers, {
      id: uid(), voornaam: "", naam: "", roepnaam: "", geslacht: "", taal: "nl",
      gsm1: "", gsm2: "", email: "",
      straat: "", postcode: "", gemeente: "",
      beschikbaarheid: "hele_dag", beschikbaarVan: "", beschikbaarTot: "", opmerking: "",
    }],
  }));

  const updateVrijwilliger = (id, patch) => setData((d) => ({
    ...d, vrijwilligers: d.vrijwilligers.map((v) => v.id === id ? { ...v, ...patch } : v),
  }));

  const removeVrijwilliger = (id) => setData((d) => ({
    ...d,
    vrijwilligers: d.vrijwilligers.filter((v) => v.id !== id),
    taken: d.taken.map((t) => ({
      ...t,
      toegewezen: (t.toegewezen || []).filter((vid) => vid !== id),
      subtaken: t.subtaken.map((s) => ({ ...s, toegewezen: s.toegewezen.filter((vid) => vid !== id) })),
    })),
  }));

  const dedupVrijwilligers = () => {
    const seen = new Set();
    const ids_te_houden = new Set();
    const dedupped = [];
    data.vrijwilligers.forEach((v) => {
      const key = `${(v.voornaam || "").toLowerCase().trim()}|${(v.naam || "").toLowerCase().trim()}|${cleanPhone(v.gsm1)}`;
      if (seen.has(key)) return;
      seen.add(key);
      ids_te_houden.add(v.id);
      dedupped.push(v);
    });
    const verwijderd = data.vrijwilligers.length - dedupped.length;
    if (verwijderd === 0) { showToast(t.no_dups_found); return; }
    if (!confirm(t.confirm_dedup(verwijderd))) return;
    setData((d) => ({
      ...d,
      vrijwilligers: dedupped,
      taken: d.taken.map((tt) => ({
        ...tt,
        toegewezen: (tt.toegewezen || []).filter((vid) => ids_te_houden.has(vid)),
        subtaken: tt.subtaken.map((s) => ({ ...s, toegewezen: s.toegewezen.filter((vid) => ids_te_houden.has(vid)) })),
      })),
    }));
    showToast(t.dups_removed(verwijderd));
  };

  const addTaak = () => setData((d) => ({
    ...d,
    taken: [...d.taken, {
      id: uid(), naamNl: "", naamFr: "", categorie: "",

      start: "", eind: "", dagdeel: "voormiddag",

      verantwoordelijkeId: "", verantwoordelijkeVrij: "",
      subtaken: [],

  }));

  const updateTaak = (id, patch) => setData((d) => ({
    ...d, taken: d.taken.map((tt) => tt.id === id ? { ...tt, ...patch } : tt),

        id: uid(), naamNl: "", naamFr: "", start: "", eind: "",

    taken: d.taken.map((tt) => tt.id === taakId ? {

  const parseImportedExcel = async (file) => {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf);
    const eventRows = XLSX.utils.sheet_to_json(wb.Sheets["Event"] || {});
    const vRows = XLSX.utils.sheet_to_json(wb.Sheets["Vrijwilligers"] || {});
    const tRows = XLSX.utils.sheet_to_json(wb.Sheets["Taken"] || {});
    const dRows = XLSX.utils.sheet_to_json(wb.Sheets["Woordenboek"] || {});
    const sRows = XLSX.utils.sheet_to_json(wb.Sheets["Sjablonen"] || {});
    const eRows = XLSX.utils.sheet_to_json(wb.Sheets["ExterneContacten"] || {});
    const mRows = XLSX.utils.sheet_to_json(wb.Sheets["Materiaal"] || {});
    const oRows = XLSX.utils.sheet_to_json(wb.Sheets["OorsprongLijst"] || {});

    const newEvent = eventRows[0] ? { ...defaultData.event, ...eventRows[0] } : defaultData.event;

    const vSeen = new Set();
    let vSkipped = 0;
    const newVrijwilligers = [];
    vRows.forEach((r) => {
      const voornaam = (r.voornaam || "").toString().trim();
      const naam = (r.naam || "").toString().trim();
      const gsm1 = (r.gsm1 || r.telefoon || "").toString().trim();
      if (!voornaam && !naam && !gsm1 && !r.email) return;
      const key = `${voornaam.toLowerCase()}|${naam.toLowerCase()}|${cleanPhone(gsm1)}`;
      if (vSeen.has(key)) { vSkipped++; return; }
      vSeen.add(key);
      newVrijwilligers.push({
        id: r.id || uid(), voornaam, naam,
        geslacht: r.geslacht || "", taal: (r.taal || "nl").toString().toLowerCase(),
        gsm1, gsm2: r.gsm2 || "", email: r.email || "",
        straat: r.straat || "", postcode: String(r.postcode || ""), gemeente: r.gemeente || "",
        beschikbaarheid: r.beschikbaarheid || "hele_dag",
        beschikbaarVan: r.beschikbaarVan || "", beschikbaarTot: r.beschikbaarTot || "",
        opmerking: r.opmerking || "",
      });
    });

    const tSeen = new Set();
    let tSkipped = 0;
    const hoofd = [];
    const sub = [];
    tRows.forEach((r) => {
      const naamNl = (r.naam_nl || "").toString().trim();
      const naamFr = (r.naam_fr || "").toString().trim();
      if (!naamNl && !naamFr) return;
      if (!r.hoofdtaak_id) {
        const key = `H|${naamNl.toLowerCase()}|${(r.categorie || "").toString().toLowerCase()}`;
        if (tSeen.has(key)) { tSkipped++; return; }
        tSeen.add(key); hoofd.push(r);
      } else {
        const key = `S|${r.hoofdtaak_id}|${naamNl.toLowerCase()}|${r.start || ""}|${r.eind || ""}`;
        if (tSeen.has(key)) { tSkipped++; return; }
        tSeen.add(key); sub.push(r);
      }
    });

    const newTaken = hoofd.map((h) => ({
      id: h.id || uid(),
      naamNl: h.naam_nl || "", naamFr: h.naam_fr || "", categorie: h.categorie || "",
      heeftSubtaken: (h.heeft_subtaken || "").toString().toLowerCase() === "ja",
      start: h.start || "", eind: h.eind || "", dagdeel: h.dagdeel || "voormiddag",
      toegewezen: (h.toegewezen || "").toString().split(",").map((x) => x.trim()).filter(Boolean),
      status: h.status || "open", opmerking: h.opmerking || "",
      verantwoordelijkeId: h.verantwoordelijke_id || "",
      verantwoordelijkeVrij: h.verantwoordelijke_vrij || "",
      subtaken: sub.filter((s) => s.hoofdtaak_id === h.id).map((s) => ({
        id: s.id || uid(),
        naamNl: s.naam_nl || "", naamFr: s.naam_fr || "",
        start: s.start || "", eind: s.eind || "",
        dagdeel: s.dagdeel || "voormiddag",
        toegewezen: (s.toegewezen || "").toString().split(",").map((x) => x.trim()).filter(Boolean),
        status: s.status || "open", opmerking: s.opmerking || "",
      })),
    }));

    const newDict = dRows.reduce((acc, r) => {
      if (r.nl && r.fr) acc[String(r.nl).toLowerCase().trim()] = String(r.fr).trim();
      return acc;
    }, {});

    const newSjablonen = sRows.filter((r) => r.titel || r.nl || r.fr).map((r) => ({
      id: r.id || uid(),
      titel: r.titel || "Sjabloon",
      nl: r.nl || "", fr: r.fr || "",
    }));

    const newExtern = eRows.filter((r) => r.naam || r.gsm1).map((r) => ({
      id: r.id || uid(),
      naam: r.naam || "",
      gsm1: r.gsm1 || "",
      taal: (r.taal || "nl").toString().toLowerCase(),
    }));

    const newMateriaal = mRows.filter((r) => r.naam_nl || r.naam_fr || r.aantal).map((r) => ({
      id: r.id || uid(),
      naamNl: normalizeName(r.naam_nl),
      naamFr: normalizeName(r.naam_fr),
      aantal: r.aantal !== undefined ? String(r.aantal) : "",
      oorsprong: r.oorsprong || "",
      verantwoordelijkeId: r.verantwoordelijke_id || "",
      verantwoordelijkeVrij: r.verantwoordelijke_vrij || "",
    }));

    const newOorsprongLijst = oRows
      .map((r) => (r.locatie || "").toString().trim())
      .filter(Boolean);

    return {
      event: newEvent,
      vrijwilligers: newVrijwilligers,
      taken: newTaken,
      woordenboek: newDict,
      sjablonen: newSjablonen,
      externeContacten: newExtern,
      materiaal: newMateriaal,
      oorsprongLijst: newOorsprongLijst,
      vSkipped, tSkipped,
    };
  };

  const importExcelReplace = async (file) => {

      const parsed = await parseImportedExcel(file);
      setData((d) => ({
        ...d,
        event: parsed.event,
        vrijwilligers: parsed.vrijwilligers,
        taken: parsed.taken,
        woordenboek: Object.keys(parsed.woordenboek).length > 0 ? parsed.woordenboek : d.woordenboek,
        sjablonen: parsed.sjablonen.length > 0 ? parsed.sjablonen : d.sjablonen,
        externeContacten: parsed.externeContacten,
        materiaal: parsed.materiaal || [],
        oorsprongLijst: (parsed.oorsprongLijst && parsed.oorsprongLijst.length > 0)
          ? parsed.oorsprongLijst : d.oorsprongLijst,
      }));
      const parts = [`${parsed.vrijwilligers.length} ${t.volunteers.toLowerCase()}, ${parsed.taken.length} ${t.tab_taken.toLowerCase()}`];
      if (parsed.vSkipped + parsed.tSkipped > 0) parts.push(`${parsed.vSkipped + parsed.tSkipped} doublons`);
      showToast(t.import_ok(parts.join(" · ")));
    } catch (e) {
      console.error(e);
      alert(t.import_failed + ": " + e.message);
    }
  };

  const importExcelMerge = async (file) => {
    try {
      const parsed = await parseImportedExcel(file);
      setData((d) => mergeData(d, {
        event: parsed.event,
        vrijwilligers: parsed.vrijwilligers,
        taken: parsed.taken,
        woordenboek: parsed.woordenboek,
        sjablonen: parsed.sjablonen,
        materiaal: parsed.materiaal,
        oorsprongLijst: parsed.oorsprongLijst,
      }));
      showToast(t.import_ok(`${parsed.vrijwilligers.length} ${t.volunteers.toLowerCase()} · ${parsed.taken.length} ${t.tab_taken.toLowerCase()}`));
    } catch (e) {
      console.error(e);
      alert(t.import_failed + ": " + e.message);
    }
  };

  const resetAll = () => {
    if (confirm(t.confirm_reset)) setData(defaultData);
  };

  // Algemene backup: volledige app-data als .json (verliesvrij)
  const algemeneBackup = () => {
    try {
      const nu = new Date();
      const stempel = nu.toISOString().slice(0, 10) + "_" +
        String(nu.getHours()).padStart(2, "0") + String(nu.getMinutes()).padStart(2, "0");
      // De backup-datum mee opslaan in de geëxporteerde data
      const teExporteren = { ...data, laatsteBackup: nu.toISOString() };
      const blob = new Blob([JSON.stringify(teExporteren, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `backup_volledig_${data.event.naam ? data.event.naam.replace(/[^a-z0-9]/gi, "_") + "_" : ""}${stempel}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      // Datum onthouden zodat de herinnering reset
      setData((d) => ({ ...d, laatsteBackup: nu.toISOString() }));
      showToast(t.backup_gemaakt);
    } catch (e) {
      console.error(e);
      alert(t.backup_fout);
    }
  };

  // Backup herstellen: .json inlezen en de volledige data vervangen
  const herstelBackup = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const ingelezen = JSON.parse(ev.target.result);
        if (!ingelezen || typeof ingelezen !== "object" || !Array.isArray(ingelezen.vrijwilligers)) {
          alert(t.herstel_ongeldig);
          return;
        }
        if (!confirm(t.herstel_bevestig)) return;
        setData(normalizeData(ingelezen));
        showToast(t.herstel_ok);
      } catch (e) {
        console.error(e);
        alert(t.herstel_ongeldig);
      }
    };
    reader.onerror = () => alert(t.herstel_ongeldig);
    reader.readAsText(file);
  };

  // Aandachtspunt-categorie overslaan / alles herstellen
  const slaAandachtspuntOver = (categorieKey) => setData((d) => ({
    ...d,
    overgeslagenAandachtspunten: [...new Set([...(d.overgeslagenAandachtspunten || []), categorieKey])],
  }));
  const herstelAandachtspunten = () => setData((d) => ({
    ...d,
    overgeslagenAandachtspunten: [],
  }));

  const nieuwEvenement = () => {
    if (!confirm(t.confirm_nieuw_evenement)) return;
    // Stap 1: automatische Excel-backup van het huidige evenement
    try {
      exportExcel(true);
    } catch (e) {
      if (!confirm(t.backup_mislukt)) return;
    }
    setData((d) => {
      // Stap 2: het oude evenement met kostenresultaat naar Event History
      const k = berekenKosten(d);
      const heeftInhoud = (d.event.naam || "").trim() || (d.event.datum || "").trim();
      const historyEntry = heeftInhoud ? [{
        id: uid(),
        naam: d.event.naam || "(naamloos)",
        datum: d.event.datum || "",
        gemeente: d.event.gemeente || "",
        afgesloten: new Date().toISOString().slice(0, 10),
        budget: k.budget, zaalhuur: k.zaalhuur,
        winkelTotaal: k.winkelTotaal, manueelTotaal: k.manueelTotaal,
        totaalUitgegeven: k.totaalUitgegeven, saldo: k.saldo,
      }] : [];

      return {
        ...d,
        // Oud evenement bewaren in de geschiedenis
        eventHistory: [...historyEntry, ...(d.eventHistory || [])],
        // Wissen
        event: { naam: "", datum: "", locatieNaam: "", straat: "", nummer: "", postcode: "", gemeente: "", beschrijving: "", verantwId: "", verantwNaam: "", verantwGsm: "" },
        bulkGeschiedenis: {},
        winkelbestellingen: {},
        kastickets: {},
        // Overgeslagen aandachtspunten resetten — nieuw evenement, schone lei
        overgeslagenAandachtspunten: [],
        // Kostenbeheer leegmaken
        kostenbeheer: { budget: "", zaalhuur: "", manueleKosten: [], kasStart: "", kasBewegingen: [] },
        // Taken: behouden, maar toewijzingen + status + verantwoordelijke wissen
        taken: d.taken.map((tt) => ({
          ...tt,
          toegewezen: [], status: "open",
          verantwoordelijkeId: "", verantwoordelijkeVrij: "",
          subtaken: tt.subtaken.map((s) => ({ ...s, toegewezen: [], status: "open" })),
        })),
        // Materiaal: behouden, maar aantallen leegmaken
        materiaal: (d.materiaal || []).map((m) => ({ ...m, aantal: "" })),
        // Behouden: vrijwilligers, winkels, sjablonen, woordenboek, externeContacten, oorsprongLijst, eventHistory
      };
    });
    showToast(t.nieuw_evenement_klaar);
  };

  const dagen = daysUntil(data.event.datum);

  return (
    <div style={{ minHeight: "100vh" }}>
      {toast && <div className="toast">{toast}</div>}
      {helpOpen && <HelpModal onClose={() => setHelpOpen(false)} t={t} />}

      <header style={{ borderBottom: "1px solid var(--line)", background: "var(--bg-card)" }}>
        <div style={{ maxWidth: 1200, margin: "0 auto", padding: "1.5rem 2rem" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: "1rem", flexWrap: "wrap" }}>
            <div>
              <div className="font-body" style={{ fontSize: "0.7rem", textTransform: "uppercase", letterSpacing: "0.15em", color: "var(--accent)", fontWeight: 600 }}>
                {t.app_subtitle}
              </div>
              <h1 className="font-display" style={{ margin: "0.2rem 0 0 0", fontSize: "2rem" }}>
                {data.event.naam || t.no_event}
              </h1>
              {data.event.datum && (
                <div className="font-body" style={{ fontSize: "0.9rem", color: "var(--ink-soft)", marginTop: "0.3rem" }}>
                  {formatDate(data.event.datum, data.taal)} · {data.event.gemeente || "—"}
                </div>
              )}
            </div>
            <div style={{ display: "flex", gap: "0.5rem", flexWrap: "wrap", alignItems: "center" }}>
              <div className="lang-toggle">
                <button className={data.taal === "nl" ? "active" : ""} onClick={() => setTaal("nl")}>🇳🇱 NL</button>
                <button className={data.taal === "fr" ? "active" : ""} onClick={() => setTaal("fr")}>🇫🇷 FR</button>
              </div>
              <button className="btn btn-ghost btn-sm" onClick={() => setHelpOpen(true)}>❓ {t.help_button}</button>
              <button className="btn btn-ghost btn-sm" onClick={downloadTemplate}>{t.template}</button>
              <label className="btn btn-ghost btn-sm" style={{ cursor: "pointer" }}>
                {t.import_merge}
                <input type="file" accept=".xlsx,.xls" style={{ display: "none" }}
                  onChange={(e) => e.target.files[0] && importExcelMerge(e.target.files[0])} />
              </label>
              <label className="btn btn-ghost btn-sm" style={{ cursor: "pointer" }}>
                {t.import_replace}
                <input type="file" accept=".xlsx,.xls" style={{ display: "none" }}
                  onChange={(e) => e.target.files[0] && importExcelReplace(e.target.files[0])} />
              </label>
              <button className="btn btn-primary btn-sm" onClick={() => exportExcel(false)}>{t.export}</button>
              <button className="btn btn-primary btn-sm" onClick={algemeneBackup} title={t.backup_titel}>
                💾 {t.backup_knop}
              </button>
              <label className="btn btn-ghost btn-sm" style={{ cursor: "pointer" }} title={t.herstel_titel}>
                {t.herstel_knop}
                <input type="file" accept=".json" style={{ display: "none" }}
                  onChange={(e) => { herstelBackup(e.target.files[0]); e.target.value = ""; }} />
              </label>
              <button className="btn btn-ghost btn-sm" onClick={nieuwEvenement} title={t.nieuw_evenement}>
                🆕 {t.nieuw_evenement}
              </button>
              <button className="btn btn-danger btn-sm" onClick={resetAll} title={t.reset}>
                <span style={{ color: "#c8442a", marginRight: "0.3rem" }}>⚠️</span>{t.reset}
              </button>
            </div>
          </div>

          <nav style={{ marginTop: "1.5rem", display: "flex", gap: "0.2rem", flexWrap: "wrap" }}>
            {[
              ["dashboard", t.tab_dashboard], ["event", t.tab_event],
              ["vrijwilligers", t.tab_vrijwilligers], ["taken", t.tab_taken],
              ["materiaal", t.tab_materiaal],
              ["winkelgegevens", t.tab_winkelgegevens],
              ...((data.materiaal || []).some((m) => m.oorsprong === WINKEL_OORSPRONG) ? [["winkelbestellingen", t.tab_winkelbestellingen]] : []),
              ["kostenbeheer", t.tab_kostenbeheer],
              ["berichten", t.tab_berichten], ["bulk", t.tab_bulk],
              ["sjablonen", t.tab_sjablonen], ["woordenboek", t.tab_woordenboek],
              ...((data.eventHistory || []).length > 0 ? [["history", t.tab_history]] : []),
            ].map(([k, label]) => (
              <button key={k} className={`tab-btn ${tab === k ? "active" : ""}`} onClick={() => wisselTab(k)}>{label}</button>
            ))}
          </nav>
        </div>
      </header>

      <main style={{ maxWidth: 1200, margin: "0 auto", padding: "2rem" }} className="font-body">
        {toonTerugKnop && tab !== "dashboard" && (
          <button className="btn btn-ghost btn-sm" style={{ marginBottom: "1rem" }}
            onClick={() => wisselTab("dashboard")}>
            ← {t.terug_dashboard}
          </button>
        )}
        {tab === "dashboard" && <Dashboard data={data} dagen={dagen} setTab={springNaarTab}
          slaAandachtspuntOver={slaAandachtspuntOver} herstelAandachtspunten={herstelAandachtspunten} t={t} />}
        {tab === "event" && <EventTab event={data.event} update={updateEvent} vrijwilligers={data.vrijwilligers} t={t} />}
        {tab === "vrijwilligers" && <VrijwilligersTab vrijwilligers={data.vrijwilligers}
          add={addVrijwilliger} update={updateVrijwilliger} remove={removeVrijwilliger} dedup={dedupVrijwilligers} t={t} />}
        {tab === "taken" && <TakenTab taken={data.taken} vrijwilligers={data.vrijwilligers}
          externeContacten={data.externeContacten || []} dict={data.woordenboek} t={t}
          addTaak={addTaak} updateTaak={updateTaak} removeTaak={removeTaak}
          addSubtaak={addSubtaak} updateSubtaak={updateSubtaak} removeSubtaak={removeSubtaak}
          toggleAssignmentTaak={toggleAssignmentTaak} toggleAssignmentSub={toggleAssignmentSub}
          updateAllTaken={updateAllTaken} showToast={showToast} />}
        {tab === "berichten" && <BerichtenTab data={data} showToast={showToast} t={t} />}
        {tab === "bulk" && <BulkSendTab data={data} showToast={showToast} t={t}
          addExternContact={addExternContact} updateExternContact={updateExternContact} removeExternContact={removeExternContact}
          markBulkSent={markBulkSent} markBulkUnsent={markBulkUnsent} resetBulkHistory={resetBulkHistory} />}
        {tab === "sjablonen" && <SjablonenTab sjablonen={data.sjablonen}
          updateVeld={updateSjabloonVeld} add={addSjabloon} remove={removeSjabloon} t={t} />}
        {tab === "woordenboek" && <WoordenboekTab dict={data.woordenboek} update={updateWoordenboek} showToast={showToast} t={t} />}
        {tab === "materiaal" && <MateriaalTab
          materiaal={data.materiaal || []}
          oorsprongLijst={data.oorsprongLijst || []}
          vrijwilligers={data.vrijwilligers}
          externeContacten={data.externeContacten || []}
          winkels={data.winkels || []}
          dict={data.woordenboek}
          taal={data.taal}
          add={addMateriaal} update={updateMateriaal} remove={removeMateriaal}
          addLocatie={addOorsprongLocatie} removeLocatie={removeOorsprongLocatie}
          exportMateriaal={exportMateriaalAlleen}
          t={t} />}
        {tab === "winkelgegevens" && <WinkelGegevensTab
          winkels={data.winkels || []}
          materiaal={data.materiaal || []}
          add={addWinkel} update={updateWinkel} remove={removeWinkel}
          t={t} />}
        {tab === "winkelbestellingen" && (data.materiaal || []).some((m) => m.oorsprong === WINKEL_OORSPRONG) && <WinkelbestellingenTab
          data={data}
          updateWinkelbestelling={updateWinkelbestelling}
          updateKasticket={updateKasticket}
          showToast={showToast}
          t={t} />}
        {tab === "kostenbeheer" && <KostenbeheerTab
          data={data}
          updateKostenbeheer={updateKostenbeheer}
          addManueleKost={addManueleKost}
          updateManueleKost={updateManueleKost}
          removeManueleKost={removeManueleKost}
          addKasBeweging={addKasBeweging}
          updateKasBeweging={updateKasBeweging}
          removeKasBeweging={removeKasBeweging}
          updateKasticket={updateKasticket}
          showToast={showToast}
          t={t} />}
        {tab === "history" && <EventHistoryTab
          eventHistory={data.eventHistory || []}
          t={t} />}
      </main>

      <footer style={{ borderTop: "1px solid var(--line)", padding: "1.5rem 2rem", textAlign: "center",
        fontSize: "0.78rem", color: "var(--ink-soft)", marginTop: "3rem" }}>
        {t.storage_note} · {data.vrijwilligers.length} {t.volunteers.toLowerCase()} · {data.taken.length} {t.tab_taken.toLowerCase()}
      </footer>
    </div>
  );
}

// WEER — toont het weer voor het evenementadres (Open-Meteo, geen sleutel nodig)
// ============================================================
const WEER_ICOON = (code) => {
  // WMO weather codes → emoji
  if (code === 0) return "☀️";
  if (code === 1 || code === 2) return "🌤️";
  if (code === 3) return "☁️";
  if (code === 45 || code === 48) return "🌫️";
  if (code >= 51 && code <= 57) return "🌦️";
  if (code >= 61 && code <= 67) return "🌧️";
  if (code >= 71 && code <= 77) return "🌨️";
  if (code >= 80 && code <= 82) return "🌧️";
  if (code >= 85 && code <= 86) return "🌨️";
  if (code >= 95) return "⛈️";
  return "🌡️";
};

function WeerKaart({ event, lang, t }) {
  const [staat, setStaat] = React.useState("laden"); // laden | ok | geenadres | fout
  const [weer, setWeer] = React.useState(null);

  // Adres opbouwen voor geocoding
  const plaats = (event.gemeente || "").trim();
  const land = "BE";

  React.useEffect(() => {
    if (!plaats) { setStaat("geenadres"); return; }
    let afgebroken = false;
    setStaat("laden");

    const haal = async () => {
      try {
        // 1. Geocoding: plaatsnaam → coördinaten
        const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(plaats)}&count=1&language=${lang}&country=${land}`;
        const geoRes = await fetch(geoUrl);
        const geo = await geoRes.json();
        if (afgebroken) return;
        if (!geo.results || geo.results.length === 0) { setStaat("fout"); return; }
        const { latitude, longitude, name } = geo.results[0];

        // 2. Forecast voor die coördinaten
        const fcUrl = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}` +
          `&current=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min` +
          `&timezone=auto&forecast_days=7`;
        const fcRes = await fetch(fcUrl);
        const fc = await fcRes.json();
        if (afgebroken) return;
        if (!fc.current) { setStaat("fout"); return; }

        // Is de evenementdatum binnen de 7-daagse voorspelling?
        let eventDag = null;
        if (event.datum && fc.daily && fc.daily.time) {
          const idx = fc.daily.time.indexOf(event.datum);
          if (idx >= 0) {
            eventDag = {
              code: fc.daily.weather_code[idx],
              max: Math.round(fc.daily.temperature_2m_max[idx]),
              min: Math.round(fc.daily.temperature_2m_min[idx]),
            };
          }
        }
        setWeer({
          plaats: name,
          nuTemp: Math.round(fc.current.temperature_2m),
          nuCode: fc.current.weather_code,
          eventDag,
        });
        setStaat("ok");
      } catch (e) {
        if (!afgebroken) setStaat("fout");
      }
    };
    haal();
    return () => { afgebroken = true; };
  }, [plaats, event.datum, lang]);

  if (staat === "geenadres") return null; // geen gemeente ingevuld → niets tonen

  return (
    <div className="card" style={{ marginBottom: "1.5rem",
      background: "linear-gradient(135deg, #eaf4fb 0%, #f5f1e8 100%)" }}>
      {staat === "laden" && (
        <div style={{ color: "var(--ink-soft)", fontSize: "0.9rem" }}>⏳ {t.weer_laden}</div>
      )}
      {staat === "fout" && (
        <div style={{ color: "var(--ink-soft)", fontSize: "0.9rem" }}>🌐 {t.weer_fout}</div>
      )}
      {staat === "ok" && weer && (
        <div style={{ display: "flex", alignItems: "center", gap: "1.5rem", flexWrap: "wrap" }}>
          <div style={{ display: "flex", alignItems: "center", gap: "0.8rem" }}>
            <span style={{ fontSize: "2.8rem", lineHeight: 1 }}>{WEER_ICOON(weer.nuCode)}</span>
            <div>
              <div className="font-display" style={{ fontSize: "1.6rem", fontWeight: 700 }}>{weer.nuTemp}°C</div>
              <div style={{ fontSize: "0.8rem", color: "var(--ink-soft)" }}>{t.weer_nu} · {weer.plaats}</div>
            </div>
          </div>
          {weer.eventDag && (
            <div style={{ borderLeft: "1px solid var(--line)", paddingLeft: "1.5rem",
              display: "flex", alignItems: "center", gap: "0.8rem" }}>
              <span style={{ fontSize: "2.2rem", lineHeight: 1 }}>{WEER_ICOON(weer.eventDag.code)}</span>
              <div>
                <div className="font-display" style={{ fontSize: "1.15rem", fontWeight: 700 }}>
                  {weer.eventDag.max}° / {weer.eventDag.min}°
                </div>
                <div style={{ fontSize: "0.8rem", color: "var(--ink-soft)" }}>{t.weer_op_evenement}</div>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// DAGOVERZICHT — wie doet welke taak/shift (per vrijwilliger of per taak)
// ============================================================
function DagoverzichtBlok({ data, t }) {
  const lang = data.taal === "fr" ? "fr" : "nl";
  const [modus, setModus] = React.useState("vrijwilliger"); // vrijwilliger | taak
  const [open, setOpen] = React.useState(false);

  const taakNaam = (tt) => capitalize(lang === "fr" ? (tt.naamFr || tt.naamNl) : (tt.naamNl || tt.naamFr)) || "?";
  const subNaam = (s) => capitalize(lang === "fr" ? (s.naamFr || s.naamNl) : (s.naamNl || s.naamFr)) || "?";
  const vrijNaam = (v) => `${v.voornaam || ""} ${v.naam || ""}`.trim() || "?";

  // Tijdslot leesbaar maken
  const slotTekst = (unit) => {
    if (unit.start && unit.eind) return `${unit.start}–${unit.eind}`;
    return lang === "fr" ? "horaire non précisé" : "geen tijdslot";
  };

  // ----- Groepering per vrijwilliger -----
  const perVrijwilliger = data.vrijwilligers
    .map((v) => ({
      naam: vrijNaam(v),
      gsm: v.gsm1 || "",
      units: getAllUnitsForVolunteer(v.id, data.taken, lang),
    }))
    .filter((x) => x.units.length > 0)
    .sort((a, b) => a.naam.toLowerCase().localeCompare(b.naam.toLowerCase()));

  // ----- Groepering per taak -----
  const perTaak = [];
  data.taken.forEach((tt) => {
    if (tt.heeftSubtaken && tt.subtaken.length > 0) {
      tt.subtaken.forEach((s) => {
        const mensen = (s.toegewezen || [])
          .map((id) => data.vrijwilligers.find((v) => v.id === id))
          .filter(Boolean);
        if (mensen.length > 0) {
          perTaak.push({
            label: `${taakNaam(tt)} — ${subNaam(s)}`,
            slot: slotTekst(s),
            mensen: mensen.map((v) => ({ naam: vrijNaam(v), gsm: v.gsm1 || "" })),
          });
        }
      });
    } else {
      const mensen = (tt.toegewezen || [])
        .map((id) => data.vrijwilligers.find((v) => v.id === id))
        .filter(Boolean);
      if (mensen.length > 0) {
        perTaak.push({
          label: taakNaam(tt),
          slot: slotTekst(tt),
          mensen: mensen.map((v) => ({ naam: vrijNaam(v), gsm: v.gsm1 || "" })),
        });
      }
    }
  });
  perTaak.sort((a, b) => a.label.toLowerCase().localeCompare(b.label.toLowerCase()));

  const heeftToewijzingen = perVrijwilliger.length > 0 || perTaak.length > 0;

  // ----- PDF -----
  const genereerPDF = () => {
    const jsPDFns = window.jspdf;
    if (!jsPDFns || !jsPDFns.jsPDF) { alert(t.dag_pdf_fout); return; }
    const doc = new jsPDFns.jsPDF({ unit: "mm", format: "a4" });
    const pageW = 210, pageH = 297, marge = 16;
    let y = marge;
    const nieuwePagina = (nodig) => { if (y + nodig > pageH - marge) { doc.addPage(); y = marge; } };

    // Kop
    doc.setFillColor(200, 68, 42);
    doc.rect(0, 0, pageW, 26, "F");
    doc.setTextColor(255, 255, 255);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(16);
    doc.text(t.dag_titel, marge, 13);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.text(`${data.event.naam || t.no_event}${data.event.datum ? " · " + formatDate(data.event.datum, lang) : ""}`, marge, 20);
    y = 36;
    doc.setTextColor(26, 22, 18);

    const kolX = [marge, marge + 70, marge + 140];

    if (modus === "vrijwilliger") {
      perVrijwilliger.forEach((p) => {
        nieuwePagina(14);
        doc.setFillColor(232, 213, 205);
        doc.rect(marge, y, pageW - 2 * marge, 8, "F");
        doc.setFont("helvetica", "bold");
        doc.setFontSize(10.5);
        doc.text(p.naam, marge + 2, y + 5.5);
        if (p.gsm) {
          doc.setFont("helvetica", "normal");
          doc.setFontSize(8.5);
          doc.text(p.gsm, pageW - marge - 2, y + 5.5, { align: "right" });
        }
        y += 11;
        doc.setFont("helvetica", "normal");
        doc.setFontSize(9);
        p.units.forEach((u) => {
          nieuwePagina(6);
          doc.text(`• ${u.label}`, marge + 3, y);
          doc.text(slotTekst(u.unit), pageW - marge - 2, y, { align: "right" });
          y += 5.5;
        });
        y += 3;
      });
    } else {
      perTaak.forEach((tk) => {
        nieuwePagina(14);
        doc.setFillColor(232, 213, 205);
        doc.rect(marge, y, pageW - 2 * marge, 8, "F");
        doc.setFont("helvetica", "bold");
        doc.setFontSize(10.5);
        doc.text(tk.label, marge + 2, y + 5.5);
        doc.setFont("helvetica", "normal");
        doc.setFontSize(8.5);
        doc.text(tk.slot, pageW - marge - 2, y + 5.5, { align: "right" });
        y += 11;
        doc.setFont("helvetica", "normal");
        doc.setFontSize(9);
        tk.mensen.forEach((m) => {
          nieuwePagina(6);
          doc.text(`• ${m.naam}`, marge + 3, y);
          if (m.gsm) doc.text(m.gsm, pageW - marge - 2, y, { align: "right" });
          y += 5.5;
        });
        y += 3;
      });
    }

    const naam = `dagoverzicht_${(data.event.naam || "evenement").replace(/[^a-z0-9]/gi, "_")}.pdf`;
    doc.save(naam);
  };

  return (
    <div className="card" style={{ marginBottom: "1.5rem" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: "0.5rem" }}>
        <h3 className="font-display" style={{ margin: 0, fontSize: "1.15rem" }}>📋 {t.dag_titel}</h3>
        <button className="btn btn-ghost btn-sm" onClick={() => setOpen(!open)}>
          {open ? t.dag_verberg : t.dag_toon}
        </button>
      </div>

      {open && (
        <div style={{ marginTop: "1rem" }}>
          {!heeftToewijzingen ? (
            <p style={{ color: "var(--ink-soft)", fontSize: "0.88rem" }}>{t.dag_geen}</p>
          ) : (
            <div>
              <div style={{ display: "flex", gap: "0.4rem", flexWrap: "wrap", marginBottom: "1rem" }}>
                <button className={modus === "vrijwilliger" ? "btn btn-primary btn-sm" : "btn btn-ghost btn-sm"}
                  onClick={() => setModus("vrijwilliger")}>{t.dag_per_vrij}</button>
                <button className={modus === "taak" ? "btn btn-primary btn-sm" : "btn btn-ghost btn-sm"}
                  onClick={() => setModus("taak")}>{t.dag_per_taak}</button>
                <button className="btn btn-whatsapp btn-sm" onClick={genereerPDF}
                  style={{ marginLeft: "auto" }}>{t.dag_pdf}</button>
              </div>

              {modus === "vrijwilliger" ? (
                <div style={{ display: "grid", gap: "0.8rem" }}>
                  {perVrijwilliger.map((p, i) => (
                    <div key={i} style={{ borderLeft: "3px solid var(--accent)", paddingLeft: "0.8rem" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", flexWrap: "wrap" }}>
                        <strong style={{ fontSize: "0.92rem" }}>{p.naam}</strong>
                        {p.gsm && <span style={{ fontSize: "0.82rem", color: "var(--ink-soft)" }}>{p.gsm}</span>}
                      </div>
                      <div style={{ marginTop: "0.3rem", display: "grid", gap: "0.2rem" }}>
                        {p.units.map((u, j) => (
                          <div key={j} style={{ display: "flex", justifyContent: "space-between",
                            fontSize: "0.85rem", color: "var(--ink-soft)" }}>
                            <span>• {u.label}</span>
                            <span>{slotTekst(u.unit)}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              ) : (
                <div style={{ display: "grid", gap: "0.8rem" }}>
                  {perTaak.map((tk, i) => (
                    <div key={i} style={{ borderLeft: "3px solid var(--gold)", paddingLeft: "0.8rem" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", flexWrap: "wrap" }}>
                        <strong style={{ fontSize: "0.92rem" }}>{tk.label}</strong>
                        <span style={{ fontSize: "0.82rem", color: "var(--ink-soft)" }}>{tk.slot}</span>
                      </div>
                      <div style={{ marginTop: "0.3rem", display: "grid", gap: "0.2rem" }}>
                        {tk.mensen.map((m, j) => (
                          <div key={j} style={{ display: "flex", justifyContent: "space-between",
                            fontSize: "0.85rem", color: "var(--ink-soft)" }}>
                            <span>• {m.naam}</span>
                            {m.gsm && <span>{m.gsm}</span>}
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}
function Dashboard({ data, dagen, setTab, slaAandachtspuntOver, herstelAandachtspunten, t }) {
  const allUnits = [];
  data.taken.forEach((tt) => {
    if (tt.heeftSubtaken && tt.subtaken.length > 0) {
      tt.subtaken.forEach((s) => allUnits.push(s));
    } else {
      allUnits.push(tt);
    }
  });

  const stats = {
    open: allUnits.filter((s) => s.status === "open").length,
    bezig: allUnits.filter((s) => s.status === "bezig").length,
    ok: allUnits.filter((s) => s.status === "ok").length,
    pasok: allUnits.filter((s) => s.status === "pas_ok").length,
  };
  const niettoegewezen = allUnits.filter((s) => !(s.toegewezen || []).length).length;

  let alert = null;
  if (dagen !== null && data.event.datum) {
    if (dagen < 0) alert = { type: "green", text: t.event_past(Math.abs(dagen)) };
    else if (dagen === 0) alert = { type: "red", text: t.event_today };
    else if (dagen <= 1) alert = { type: "red", text: `${t.event_in_days(dagen)} ${t.day_reminder_time}`, cta: t.to_messages };
    else if (dagen <= 7) alert = { type: "amber", text: `${t.event_in_days(dagen)} ${t.week_reminder_time}`, cta: t.to_messages };
  }

  // Backup-herinnering: ouder dan 7 dagen of nog nooit
  let backupHerinnering = null;
  const heeftData = data.vrijwilligers.length > 0 || data.taken.length > 0 || (data.materiaal || []).length > 0;
  if (heeftData) {
    if (!data.laatsteBackup) {
      backupHerinnering = t.backup_nooit;
    } else {
      const dagenGeleden = Math.floor((Date.now() - new Date(data.laatsteBackup).getTime()) / 86400000);
      if (dagenGeleden >= 7) backupHerinnering = t.backup_herinnering(dagenGeleden);
    }
  }

  // ---- Aandachtspunten: enkel "half afgewerkte" zaken (lege items overslaan) ----
  const lang = data.taal === "fr" ? "fr" : "nl";
  const taakNaam = (tt) => (lang === "fr" ? (tt.naamFr || tt.naamNl) : (tt.naamNl || tt.naamFr)) || "?";
  const heeftTaakNaam = (tt) => !!(tt.naamNl || tt.naamFr);

  // Taken met een naam maar zonder verantwoordelijke
  const taakGeenVerantw = data.taken
    .filter((tt) => heeftTaakNaam(tt) && !tt.verantwoordelijkeId)
    .map((tt) => taakNaam(tt));

  // Taken/subtaken met een naam maar zonder toegewezen vrijwilliger
  const taakGeenToewijzing = [];
  data.taken.forEach((tt) => {
    if (!heeftTaakNaam(tt)) return;
    if (tt.heeftSubtaken && tt.subtaken.length > 0) {
      tt.subtaken.forEach((s) => {
        if ((s.naamNl || s.naamFr) && !(s.toegewezen || []).length) {
          taakGeenToewijzing.push(`${taakNaam(tt)} → ${(lang === "fr" ? (s.naamFr || s.naamNl) : (s.naamNl || s.naamFr)) || "?"}`);
        }
      });
    } else if (!(tt.toegewezen || []).length) {
      taakGeenToewijzing.push(taakNaam(tt));
    }
  });

  // Vrijwilligers met een naam maar zonder GSM 1
  const vrijGeenGsm = data.vrijwilligers
    .filter((v) => (v.voornaam || v.naam) && !(v.gsm1 || "").trim())
    .map((v) => `${v.voornaam || ""} ${v.naam || ""}`.trim() || "?");

  // Materiaal met een naam + oorsprong Winkel_Magasin maar zonder gekozen winkel
  // Helper: materiaal telt enkel mee als het voor dít evenement nodig is (aantal > 0)
  const matNodig = (m) => {
    const n = parseFloat(m.aantal);
    return !isNaN(n) && n > 0;
  };

  const matGeenWinkel = (data.materiaal || [])
    .filter((m) => (m.naamNl || m.naamFr) && matNodig(m) && m.oorsprong === WINKEL_OORSPRONG && !m.winkelId)
    .map((m) => capitalize(lang === "fr" ? (m.naamFr || m.naamNl) : (m.naamNl || m.naamFr)) || "?");

  // Materiaal met een naam + aantal maar zonder oorsprong
  const matGeenOorsprong = (data.materiaal || [])
    .filter((m) => (m.naamNl || m.naamFr) && matNodig(m) && !m.oorsprong)
    .map((m) => capitalize(lang === "fr" ? (m.naamFr || m.naamNl) : (m.naamNl || m.naamFr)) || "?");

  // Winkelbestellingen met ingevuld kasticket/aankoop maar zonder datum of aankoper
  const winkelMat = (data.materiaal || []).filter((m) => m.oorsprong === WINKEL_OORSPRONG);
  const bestGeenInfo = [];
  winkelMat.forEach((m) => {
    const best = (data.winkelbestellingen || {})[m.id] || {};
    // Alleen melden als er al iéts ingevuld is (datum of aankoper deels)
    const ietsIngevuld = best.datum || best.aankoperId;
    if (ietsIngevuld && (!best.datum || !best.aankoperId)) {
      bestGeenInfo.push(capitalize(lang === "fr" ? (m.naamFr || m.naamNl) : (m.naamNl || m.naamFr)) || "?");
    }
  });

  // Kastickets (winkel + aankoper + datum) die volledig zijn maar zonder bedrag
  const kasticketGeenBedrag = [];
  {
    const gezien = {};
    winkelMat.forEach((m) => {
      const best = (data.winkelbestellingen || {})[m.id] || {};
      // Enkel volledige bestellingen (winkel + aankoper + datum) tellen mee
      if (!best.datum || !best.aankoperId || !m.winkelId) return;
      const ak = best.aankoperId === "__extern__"
        ? `ext:${(best.aankoperVrij || "").trim().toLowerCase()}`
        : best.aankoperId;
      const key = `${m.winkelId}|${ak}|${best.datum}`;
      if (gezien[key]) return;
      gezien[key] = true;
      const kt = (data.kastickets || {})[key] || {};
      if (parseBedragNum(kt.bedrag) === 0) {
        const w = (data.winkels || []).find((x) => x.id === m.winkelId);
        const winkelNaam = w ? w.naam : "?";
        let aankoper = "?";
        if (best.aankoperId === "__extern__") aankoper = best.aankoperVrij || t.winkel_extern_koper;
        else {
          const v = data.vrijwilligers.find((x) => x.id === best.aankoperId);
          aankoper = v ? `${v.voornaam} ${v.naam}`.trim() : "?";
        }
        kasticketGeenBedrag.push(`${winkelNaam} · ${aankoper} · ${formatDate(best.datum, lang)}`);
      }
    });
  }

  // Shiftoverlappingen: dezelfde vrijwilliger tegelijk voor twee taken ingepland
  const shiftOverlap = detectOverlaps(data.vrijwilligers, data.taken, lang)
    .map((c) => `${c.naam}: ${c.taak1} ↔ ${c.taak2}`);

  const overgeslagen = data.overgeslagenAandachtspunten || [];
  const alleAandachtspunten = [
    { key: "taakGeenVerantw", items: taakGeenVerantw, tekst: t.ap_taak_geen_verantw, tab: "taken" },
    { key: "taakGeenToewijzing", items: taakGeenToewijzing, tekst: t.ap_taak_geen_toewijzing, tab: "taken" },
    { key: "shiftOverlap", items: shiftOverlap, tekst: t.ap_shift_overlap, tab: "taken" },
    { key: "vrijGeenGsm", items: vrijGeenGsm, tekst: t.ap_vrij_geen_gsm, tab: "vrijwilligers" },
    { key: "matGeenOorsprong", items: matGeenOorsprong, tekst: t.ap_mat_geen_oorsprong, tab: "materiaal" },
    { key: "matGeenWinkel", items: matGeenWinkel, tekst: t.ap_mat_geen_winkel, tab: "materiaal" },
    { key: "bestGeenInfo", items: bestGeenInfo, tekst: t.ap_best_geen_info, tab: "winkelbestellingen" },
    { key: "kasticketGeenBedrag", items: kasticketGeenBedrag, tekst: t.ap_kasticket_geen_bedrag, tab: "winkelbestellingen" },
  ].filter((a) => a.items.length > 0);

  // Zichtbaar = niet overgeslagen; overgeslagen-met-inhoud apart bijgehouden
  const aandachtspunten = alleAandachtspunten.filter((a) => !overgeslagen.includes(a.key));
  const overgeslagenMetInhoud = alleAandachtspunten.filter((a) => overgeslagen.includes(a.key));

  // Event Verantwoordelijke + WhatsApp-link voor overgeslagen punten
  const ev = data.event;
  const evVerantwVrij = ev.verantwId ? data.vrijwilligers.find((v) => v.id === ev.verantwId) : null;
  const evNaam = (ev.verantwNaam || "").trim() || (evVerantwVrij ? `${evVerantwVrij.voornaam} ${evVerantwVrij.naam}`.trim() : "");
  const evGsm = (ev.verantwGsm || "").trim() || (evVerantwVrij ? (evVerantwVrij.gsm1 || "") : "");
  const evTel = cleanPhone(evGsm);

  const buildOverslaanBericht = () => {
    const r = [];
    r.push(`${t.ap_wa_titel}${ev.naam ? " — " + ev.naam : ""}`);
    r.push("");
    overgeslagenMetInhoud.forEach((a) => {
      r.push(`*${a.tekst}* (${a.items.length})`);
      a.items.forEach((it) => r.push(`• ${it}`));
      r.push("");
    });
    return r.join("\n").trim();
  };
  const overslaanWaLink = (evTel && overgeslagenMetInhoud.length > 0)
    ? `https://wa.me/${evTel}?text=${encodeURIComponent(buildOverslaanBericht())}`
    : "";

  return (
    <div>
      {alert && (
        <div className={`alert-bar alert-${alert.type}`}>
          <span style={{ fontWeight: 500 }}>{alert.text}</span>
          {alert.cta && <button className="btn btn-primary btn-sm" onClick={() => setTab("berichten")}>{alert.cta}</button>}
        </div>
      )}

      {backupHerinnering && (
        <div className="alert-bar alert-amber">
          <span style={{ fontWeight: 500 }}>💾 {backupHerinnering}</span>
        </div>
      )}

      <WeerKaart event={data.event} lang={data.taal === "fr" ? "fr" : "nl"} t={t} />

      {heeftData && (
        <div className="card" style={{ marginBottom: "1.5rem" }}>
          <h3 className="font-display" style={{ marginTop: 0, marginBottom: "0.8rem", fontSize: "1.15rem" }}>
            {aandachtspunten.length === 0 ? "✅" : "📋"} {t.ap_titel}
          </h3>
          {aandachtspunten.length === 0 ? (
            <p style={{ color: "#3a7d44", fontSize: "0.9rem", margin: 0, fontWeight: 500 }}>{t.ap_alles_ok}</p>
          ) : (
            <div style={{ display: "grid", gap: "0.7rem" }}>
              {aandachtspunten.map((a) => (
                <div key={a.key} style={{ borderLeft: "3px solid var(--gold)", paddingLeft: "0.8rem" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
                    gap: "0.5rem", flexWrap: "wrap" }}>
                    <strong style={{ fontSize: "0.9rem" }}>{a.tekst} ({a.items.length})</strong>
                    <div style={{ display: "flex", gap: "0.3rem", flexWrap: "wrap" }}>
                      <button className="btn btn-ghost btn-sm" onClick={() => setTab(a.tab)}>{t.ap_oplossen}</button>
                      <button className="btn btn-ghost btn-sm" onClick={() => slaAandachtspuntOver(a.key)}>{t.ap_overslaan}</button>
                    </div>
                  </div>
                  <div style={{ fontSize: "0.82rem", color: "var(--ink-soft)", marginTop: "0.2rem" }}>
                    {a.items.slice(0, 8).join(" · ")}{a.items.length > 8 ? ` … (+${a.items.length - 8})` : ""}
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Overgeslagen categorieën */}
          {overgeslagenMetInhoud.length > 0 && (
            <div style={{ marginTop: "1rem", paddingTop: "0.8rem", borderTop: "1px dashed var(--line)" }}>
              <div style={{ fontSize: "0.83rem", color: "var(--ink-soft)", marginBottom: "0.5rem" }}>
                {t.ap_overgeslagen}: {overgeslagenMetInhoud.map((a) => a.tekst).join(" · ")}
              </div>
              <div style={{ display: "flex", gap: "0.4rem", flexWrap: "wrap" }}>
                <button className="btn btn-ghost btn-sm" onClick={herstelAandachtspunten}>{t.ap_herstel}</button>
                {overslaanWaLink ? (
                  <a className="btn btn-whatsapp btn-sm" href={overslaanWaLink} target="_blank" rel="noopener"
                    style={{ textDecoration: "none" }}>
                    {t.ap_wa_knop}{evNaam ? ` (${evNaam})` : ""}
                  </a>
                ) : (
                  <span style={{ fontSize: "0.78rem", color: "var(--accent)" }}>{t.ap_wa_geen_verantw}</span>
                )}
              </div>
            </div>
          )}
        </div>
      )}

      {heeftData && <DagoverzichtBlok data={data} t={t} />}

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: "1rem", marginBottom: "2rem" }}>
        <div className="card">
          <div className="stat-num">{dagen === null ? "—" : dagen < 0 ? "✓" : dagen}</div>
          <div className="stat-label">{dagen === null ? t.no_date : dagen < 0 ? t.past : dagen === 1 ? t.day_left : t.days_left}</div>
        </div>
        <div className="card"><div className="stat-num">{data.vrijwilligers.length}</div><div className="stat-label">{t.volunteers}</div></div>
        <div className="card"><div className="stat-num">{allUnits.length}</div><div className="stat-label">{t.workunits}</div></div>
        <div className="card">
          <div className="stat-num" style={{ color: niettoegewezen > 0 ? "var(--accent)" : "var(--green)" }}>{niettoegewezen}</div>
          <div className="stat-label">{t.unassigned}</div>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: "1rem", marginBottom: "2rem" }}>
        <StatusCard label={t.status_open} count={stats.open} cls="badge-open" />
        <StatusCard label={t.status_bezig} count={stats.bezig} cls="badge-bezig" />
        <StatusCard label={t.status_ok} count={stats.ok} cls="badge-ok" />
        <StatusCard label={t.status_pasok} count={stats.pasok} cls="badge-pasok" />
      </div>

      <div className="card">
        <h2 className="font-display" style={{ marginTop: 0, fontSize: "1.4rem" }}>{t.quick_nav}</h2>
        <div style={{ display: "flex", gap: "0.5rem", flexWrap: "wrap" }}>
          <button className="btn btn-ghost" onClick={() => setTab("event")}>{t.edit_event}</button>
          <button className="btn btn-ghost" onClick={() => setTab("vrijwilligers")}>{t.manage_volunteers}</button>
          <button className="btn btn-ghost" onClick={() => setTab("taken")}>{t.manage_tasks}</button>
          <button className="btn btn-primary" onClick={() => setTab("berichten")}>{t.wa_messages}</button>
        </div>
      </div>
    </div>
  );
}

function StatusCard({ label, count, cls }) {
  return (
    <div className="card" style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
      <div>
        <div className="stat-num" style={{ fontSize: "1.8rem" }}>{count}</div>
        <div className="stat-label">{label}</div>
      </div>
      <span className={`badge ${cls}`}>{label}</span>
    </div>
  );
}

// EVENT TAB

function EventTab({ event, update, vrijwilligers, t }) {
  const mapsAuto = buildMapsLink(event, "driving");
  const mapsOv = buildMapsLink(event, "transit");
  const nmbs = buildNmbsLink(event);

  const sortedVrij = [...(vrijwilligers || [])].sort((a, b) => {
    const an = (a.naam || "").toLowerCase(), bn = (b.naam || "").toLowerCase();
    if (an !== bn) return an.localeCompare(bn);
    return (a.voornaam || "").toLowerCase().localeCompare((b.voornaam || "").toLowerCase());
  });

  // Bij keuze van een vrijwilliger: naam + GSM automatisch invullen
  const kiesVerantw = (vId) => {
    if (!vId) { update({ verantwId: "" }); return; }
    const v = (vrijwilligers || []).find((x) => x.id === vId);
    if (v) {
      update({ verantwId: vId, verantwNaam: `${v.voornaam} ${v.naam}`.trim(), verantwGsm: v.gsm1 || "" });
    } else {
      update({ verantwId: vId });
    }
  };

  return (
    <div className="grid-2">
      <div className="card">
        <h2 className="font-display" style={{ marginTop: 0, fontSize: "1.4rem" }}>{t.basic_info}</h2>
        <div style={{ display: "grid", gap: "1rem" }}>
          <Field label={t.event_name}><input className="input" value={event.naam} onChange={(e) => update({ naam: e.target.value })} /></Field>
          <Field label={t.date}><input type="date" className="input" value={event.datum} onChange={(e) => update({ datum: e.target.value })} /></Field>
          <Field label={t.description}><textarea className="textarea" rows={3} value={event.beschrijving} onChange={(e) => update({ beschrijving: e.target.value })} /></Field>
        </div>
      </div>

      <div className="card">
        <h2 className="font-display" style={{ marginTop: 0, fontSize: "1.4rem" }}>{t.ev_verantw_titel}</h2>
        <p style={{ color: "var(--ink-soft)", fontSize: "0.85rem", marginTop: 0 }}>{t.ev_verantw_intro}</p>
        <div style={{ display: "grid", gap: "1rem" }}>
          <Field label={t.ev_verantw_kies}>
            <select className="select" value={event.verantwId || ""} onChange={(e) => kiesVerantw(e.target.value)}>
              <option value="">{t.ev_verantw_manueel}</option>
              {sortedVrij.map((v) => <option key={v.id} value={v.id}>{v.naam} {v.voornaam}</option>)}
            </select>
