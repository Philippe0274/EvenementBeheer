// HELPERS: OVERLAP & SLIMME PLANNER
// ============================================================

// Converteert tijdstring "HH:MM" naar minuten
const toMinutes = (s) => {
  if (!s) return null;
  const [h, m] = s.split(":").map(Number);
  return h * 60 + m;
};

// Geeft het tijdslot van een taak/subtaak als [start, eind] in minuten
const getSlot = (unit) => {
  const s = toMinutes(unit.start);
  const e = toMinutes(unit.eind);
  if (s === null || e === null || s >= e) return null;
  return [s, e];
};

// Controleert of twee slots overlappen
const slotsOverlap = (a, b) => a[0] < b[1] && b[0] < a[1];

// Geeft alle (unit, taaknaam) paren terug voor een vrijwilliger
const getAllUnitsForVolunteer = (vrijwilligerId, taken, taal) => {
  const units = [];
  taken.forEach((tt) => {
    const naam = taal === "fr" ? (tt.naamFr || tt.naamNl) : (tt.naamNl || tt.naamFr);
    if (tt.heeftSubtaken && tt.subtaken.length > 0) {
      tt.subtaken.forEach((s) => {
        if ((s.toegewezen || []).includes(vrijwilligerId)) {
          const subNaam = taal === "fr" ? (s.naamFr || s.naamNl) : (s.naamNl || s.naamFr);
          units.push({ unit: s, label: `${capitalize(naam)} — ${capitalize(subNaam)}` });
        }
      });
    } else {
      if ((tt.toegewezen || []).includes(vrijwilligerId)) {
        units.push({ unit: tt, label: capitalize(naam) });
      }
    }
  });
  return units;
};

// Berekent alle shiftoverlaps: geeft array van { vrijwilliger, taak1, taak2 }
const detectOverlaps = (vrijwilligers, taken, taal) => {
  const conflicts = [];
  vrijwilligers.forEach((v) => {
    const units = getAllUnitsForVolunteer(v.id, taken, taal);
    for (let i = 0; i < units.length; i++) {
      for (let j = i + 1; j < units.length; j++) {
        const slotA = getSlot(units[i].unit);
        const slotB = getSlot(units[j].unit);
        if (slotA && slotB && slotsOverlap(slotA, slotB)) {
          conflicts.push({
            vrijwilligerId: v.id,
            naam: `${v.voornaam} ${v.naam}`.trim(),
            taak1: units[i].label,
            taak2: units[j].label,
          });
        }
      }
    }
  });
  return conflicts;
};

// Slimme planner: wijst vrijwilligers toe op basis van beschikbaarheid, taal en categorie
const buildSlimmePlanning = (taken, vrijwilligers) => {
  // Bijhouden hoeveel taken elke vrijwilliger al heeft (voor spreiding)
  const taakCount = {};
  vrijwilligers.forEach((v) => { taakCount[v.id] = 0; });

  // Hulp: geeft beschikbare vrijwilligers voor een unit
  const getKandidaten = (unit) => {
    return vrijwilligers.filter((v) => isAvailable(v, unit));
  };

  // Sorteer kandidaten: voorkeur voor minder ingedeelden
  const sortKandidaten = (kandidaten) => {
    return [...kandidaten].sort((a, b) => (taakCount[a.id] || 0) - (taakCount[b.id] || 0));
  };

  const newTaken = taken.map((tt) => {
    if (tt.heeftSubtaken && tt.subtaken.length > 0) {
      const newSubs = tt.subtaken.map((s) => {
        const kandidaten = sortKandidaten(getKandidaten(s));
        // Wijs maximaal 2 vrijwilligers toe per subtaak als er niemand was
        const selected = kandidaten.slice(0, Math.max(1, Math.min(2, kandidaten.length)));
        selected.forEach((v) => { taakCount[v.id] = (taakCount[v.id] || 0) + 1; });
        return { ...s, toegewezen: selected.map((v) => v.id) };
      });
      return { ...tt, subtaken: newSubs };
    } else {
      const kandidaten = sortKandidaten(getKandidaten(tt));
      const selected = kandidaten.slice(0, Math.max(1, Math.min(2, kandidaten.length)));
      selected.forEach((v) => { taakCount[v.id] = (taakCount[v.id] || 0) + 1; });
      return { ...tt, toegewezen: selected.map((v) => v.id) };
    }
  });

  return newTaken;
};

const useAutoTranslate = (item, updateFn, dict) => {
  const handleNlBlur = () => {
    if (item.naamNl) updateFn({ naamNl: normalizeName(item.naamNl) });
    if (item.naamNl && !item.naamFr) {
      const tr = translateText(item.naamNl, "nl", "fr", dict);
      if (tr) updateFn({ naamFr: normalizeName(tr) });
    }
  };
  const handleFrBlur = () => {
    if (item.naamFr) updateFn({ naamFr: normalizeName(item.naamFr) });
    if (item.naamFr && !item.naamNl) {
      const tr = translateText(item.naamFr, "fr", "nl", dict);
      if (tr) updateFn({ naamNl: normalizeName(tr) });
    }
  };
  return { handleNlBlur, handleFrBlur };
};

function TaakKaart({ taak, alleTaken, vrijwilligers, externeContacten, dict, updateTaak, removeTaak,
  addSubtaak, updateSubtaak, removeSubtaak, toggleAssignmentTaak, toggleAssignmentSub, t }) {

  const { handleNlBlur, handleFrBlur } = useAutoTranslate(taak, (patch) => updateTaak(taak.id, patch), dict);

  // Dubbeldetectie: zelfde taaknaam (NL of FR) bij een andere taak
  const isDubbel = (() => {
    const nl = normalizeName(taak.naamNl), fr = normalizeName(taak.naamFr);
    if (!nl && !fr) return false;
    return (alleTaken || []).some((x) => {
      if (x.id === taak.id) return false;
      const xnl = normalizeName(x.naamNl), xfr = normalizeName(x.naamFr);
      return (nl && (nl === xnl || nl === xfr)) || (fr && (fr === xnl || fr === xfr));
    });
  })();

  const sortedVrij = [...(vrijwilligers || [])].sort((a, b) => {
    const an = (a.naam || "").toLowerCase();
    const bn = (b.naam || "").toLowerCase();
    if (an !== bn) return an.localeCompare(bn);
    return (a.voornaam || "").toLowerCase().localeCompare((b.voornaam || "").toLowerCase());
  });
  const sortedExtern = [...(externeContacten || [])].sort((a, b) =>
    (a.naam || "").toLowerCase().localeCompare((b.naam || "").toLowerCase())
  );
  const verantwIsAnder = taak.verantwoordelijkeId === "__ander__";

  return (
    <div className="card" style={{ borderLeft: `3px solid ${isDubbel ? "var(--gold)" : "var(--accent)"}` }}>
      {isDubbel && (
        <div style={{ background: "#fdf6e3", border: "1px solid var(--gold)", borderRadius: 3,
          padding: "0.5rem 0.7rem", marginBottom: "0.6rem", fontSize: "0.82rem", color: "var(--ink)" }}>
          ⚠ {t.taak_dubbel}
        </div>
      )}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr auto", gap: "0.8rem", alignItems: "end" }}>
        <Field label={t.name_nl}>
          <input className="input" value={capitalize(taak.naamNl)}
            onChange={(e) => updateTaak(taak.id, { naamNl: e.target.value })} onBlur={handleNlBlur} />
        </Field>
        <Field label={t.name_fr}>
          <input className="input" value={capitalize(taak.naamFr)}
            onChange={(e) => updateTaak(taak.id, { naamFr: e.target.value })} onBlur={handleFrBlur} />
        </Field>
        <Field label={t.category}>
          <input className="input" value={taak.categorie}
            onChange={(e) => updateTaak(taak.id, { categorie: e.target.value })} placeholder={t.category_ph} />
        </Field>
        <button className="btn btn-danger btn-sm" onClick={() => removeTaak(taak.id)}>{t.remove}</button>
      </div>

      <div style={{ marginTop: "0.8rem", display: "grid", gridTemplateColumns: "1fr 2fr", gap: "0.5rem", alignItems: "end" }}>
        <Field label={t.taak_verant}>
          <select className="select" value={taak.verantwoordelijkeId || ""}
            onChange={(e) => updateTaak(taak.id, { verantwoordelijkeId: e.target.value, verantwoordelijkeVrij: e.target.value === "__ander__" ? (taak.verantwoordelijkeVrij || "") : "" })}>
            <option value="">{t.taak_verant_none}</option>
            {sortedVrij.length > 0 && (
              <optgroup label={t.tab_vrijwilligers}>
                {sortedVrij.map((v) => <option key={v.id} value={v.id}>{v.naam} {v.voornaam}</option>)}
              </optgroup>
            )}
            {sortedExtern.length > 0 && (
              <optgroup label={t.external_contacts}>
                {sortedExtern.map((c) => <option key={c.id} value={c.id}>{c.naam}</option>)}
              </optgroup>
            )}
            <option value="__ander__">{t.mat_other}</option>
          </select>
        </Field>
        {verantwIsAnder && (
          <Field label={t.mat_other_ph}>
            <input className="input" value={taak.verantwoordelijkeVrij || ""}
              onChange={(e) => updateTaak(taak.id, { verantwoordelijkeVrij: e.target.value })} />
          </Field>
        )}
      </div>

      <div style={{ marginTop: "1rem", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: "0.5rem" }}>
        <div className={`switch ${taak.heeftSubtaken ? "on" : ""}`}
          onClick={() => updateTaak(taak.id, { heeftSubtaken: !taak.heeftSubtaken })}>
          <span className="switch-track"></span>
          <span style={{ fontSize: "0.85rem", fontWeight: 500 }}>
            {t.has_subtasks} {taak.heeftSubtaken ? t.on_off_direct.on : t.on_off_direct.off}
          </span>
        </div>
      </div>

      {!taak.heeftSubtaken ? (
        <DirectToewijzing taak={taak} vrijwilligers={vrijwilligers} updateTaak={updateTaak} toggleAssignmentTaak={toggleAssignmentTaak} t={t} />
      ) : (
        <div style={{ marginTop: "1rem", paddingTop: "1rem", borderTop: "1px dashed var(--line)" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.7rem" }}>
            <span className="label" style={{ margin: 0 }}>{t.subtasks} ({taak.subtaken.length})</span>
            <button className="btn btn-ghost btn-sm" onClick={() => addSubtaak(taak.id)}>{t.add_subtask}</button>
          </div>
          {taak.subtaken.length === 0 ? (
            <p style={{ color: "var(--ink-soft)", fontSize: "0.85rem", margin: 0 }}>{t.no_subtasks}</p>
          ) : (
            <div style={{ display: "grid", gap: "0.7rem" }}>
              {taak.subtaken.map((s) => (
                <SubtaakRij key={s.id} taakId={taak.id} sub={s} vrijwilligers={vrijwilligers} dict={dict} t={t}
                  updateSubtaak={updateSubtaak} removeSubtaak={removeSubtaak} toggleAssignmentSub={toggleAssignmentSub} />
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function DirectToewijzing({ taak, vrijwilligers, updateTaak, toggleAssignmentTaak, t }) {
  const statusOpts = [
    ["open", "badge-open", t.status_open], ["bezig", "badge-bezig", t.status_bezig],
    ["ok", "badge-ok", t.status_ok], ["pas_ok", "badge-pasok", t.status_pasok],
  ];

  return (
    <div style={{ marginTop: "1rem", paddingTop: "1rem", borderTop: "1px dashed var(--line)" }}>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1.5fr", gap: "0.5rem", alignItems: "end" }}>
        <Field label={t.from}>
          <input type="time" className="input" value={taak.start || ""} onChange={(e) => updateTaak(taak.id, { start: e.target.value })} />
        </Field>
        <Field label={t.to}>
          <input type="time" className="input" value={taak.eind || ""} onChange={(e) => updateTaak(taak.id, { eind: e.target.value })} />
        </Field>
        <Field label={t.daypart}>
          <select className="select" value={taak.dagdeel || "voormiddag"} onChange={(e) => {
            const val = e.target.value;
            const patch = { dagdeel: val };
            if (val === "hele_dag") { patch.start = "08:00"; patch.eind = "22:00"; }
            updateTaak(taak.id, patch);
          }}>
            <option value="voormiddag">{t.daypart_morning}</option>
            <option value="namiddag">{t.daypart_afternoon}</option>
            <option value="avond">{t.daypart_evening}</option>
            <option value="hele_dag">{t.daypart_full}</option>
          </select>
        </Field>
      </div>

      <div style={{ marginTop: "0.7rem", display: "flex", gap: "1rem", alignItems: "center", flexWrap: "wrap" }}>
        <span className="label" style={{ margin: 0 }}>{t.status}</span>
        {statusOpts.map(([val, cls, lbl]) => (
          <button key={val} className={`badge ${cls}`}
            style={{ cursor: "pointer", opacity: (taak.status || "open") === val ? 1 : 0.4,
              border: (taak.status || "open") === val ? "1px solid currentColor" : "1px solid transparent" }}
            onClick={() => updateTaak(taak.id, { status: val })}>{lbl}</button>
        ))}
      </div>

      <div style={{ marginTop: "0.7rem" }}>
        <span className="label">{t.assigned_to}</span>
        <div style={{ display: "flex", flexWrap: "wrap" }}>
          {vrijwilligers.length === 0 ? (
            <em style={{ color: "var(--ink-soft)", fontSize: "0.85rem" }}>{t.add_volunteers_first}</em>
          ) : (
            vrijwilligers.map((v) => {
              const active = (taak.toegewezen || []).includes(v.id);
              const beschikbaar = isAvailable(v, taak);
              const cls = `pill ${active ? "active" : ""} ${active && !beschikbaar ? "warn" : ""}`;
              return (
                <span key={v.id} className={cls}
                  onClick={() => toggleAssignmentTaak(taak.id, v.id)}
                  title={!beschikbaar ? t.outside_avail : ""}>
                  {!beschikbaar && active && "⚠ "}{v.voornaam} {v.naam}
                </span>
              );
            })
          )}
        </div>
      </div>

      <div style={{ marginTop: "0.5rem" }}>
        <input className="input" placeholder={t.note_optional} value={taak.opmerking || ""} onChange={(e) => updateTaak(taak.id, { opmerking: e.target.value })} />
      </div>
    </div>
  );
}

function SubtaakRij({ taakId, sub, vrijwilligers, dict, updateSubtaak, removeSubtaak, toggleAssignmentSub, t }) {
  const statusOpts = [
    ["open", "badge-open", t.status_open], ["bezig", "badge-bezig", t.status_bezig],
    ["ok", "badge-ok", t.status_ok], ["pas_ok", "badge-pasok", t.status_pasok],
  ];

  const { handleNlBlur, handleFrBlur } = useAutoTranslate(sub, (patch) => updateSubtaak(taakId, sub.id, patch), dict);

  return (
    <div style={{ background: "white", border: "1px solid var(--line)", borderRadius: 3, padding: "0.8rem" }}>
      <div style={{ display: "grid", gridTemplateColumns: "1.5fr 1.5fr 0.8fr 0.8fr 0.8fr auto", gap: "0.5rem", alignItems: "end" }}>
        <Field label={t.name_nl}>
          <input className="input" value={capitalize(sub.naamNl)} onChange={(e) => updateSubtaak(taakId, sub.id, { naamNl: e.target.value })} onBlur={handleNlBlur} />
        </Field>
        <Field label={t.name_fr}>
          <input className="input" value={capitalize(sub.naamFr)} onChange={(e) => updateSubtaak(taakId, sub.id, { naamFr: e.target.value })} onBlur={handleFrBlur} />
        </Field>
        <Field label={t.from}><input type="time" className="input" value={sub.start} onChange={(e) => updateSubtaak(taakId, sub.id, { start: e.target.value })} /></Field>
        <Field label={t.to}><input type="time" className="input" value={sub.eind} onChange={(e) => updateSubtaak(taakId, sub.id, { eind: e.target.value })} /></Field>
        <Field label={t.daypart}>
          <select className="select" value={sub.dagdeel} onChange={(e) => {
            const val = e.target.value;
            const patch = { dagdeel: val };
            if (val === "hele_dag") { patch.start = "08:00"; patch.eind = "22:00"; }
            updateSubtaak(taakId, sub.id, patch);
          }}>
            <option value="voormiddag">{t.daypart_morning}</option>
            <option value="namiddag">{t.daypart_afternoon}</option>
            <option value="avond">{t.daypart_evening}</option>
            <option value="hele_dag">{t.daypart_full}</option>
          </select>
        </Field>
        <button className="btn btn-danger btn-sm" onClick={() => removeSubtaak(taakId, sub.id)}>✕</button>
      </div>

      <div style={{ marginTop: "0.7rem", display: "flex", gap: "1rem", alignItems: "center", flexWrap: "wrap" }}>
        <span className="label" style={{ margin: 0 }}>{t.status}</span>
        {statusOpts.map(([val, cls, lbl]) => (
          <button key={val} className={`badge ${cls}`}
            style={{ cursor: "pointer", opacity: sub.status === val ? 1 : 0.4,
              border: sub.status === val ? "1px solid currentColor" : "1px solid transparent" }}
            onClick={() => updateSubtaak(taakId, sub.id, { status: val })}>{lbl}</button>
        ))}
      </div>

      <div style={{ marginTop: "0.7rem" }}>
        <span className="label">{t.assigned_to}</span>
        <div style={{ display: "flex", flexWrap: "wrap" }}>
          {vrijwilligers.length === 0 ? (
            <em style={{ color: "var(--ink-soft)", fontSize: "0.85rem" }}>{t.add_volunteers_first}</em>
          ) : (
            vrijwilligers.map((v) => {
              const active = sub.toegewezen.includes(v.id);
              const beschikbaar = isAvailable(v, sub);
              const cls = `pill ${active ? "active" : ""} ${active && !beschikbaar ? "warn" : ""}`;
              return (
                <span key={v.id} className={cls}
                  onClick={() => toggleAssignmentSub(taakId, sub.id, v.id)}
                  title={!beschikbaar ? t.outside_avail : ""}>
                  {!beschikbaar && active && "⚠ "}{v.voornaam} {v.naam}
                </span>
              );
            })
          )}
        </div>
      </div>

      <div style={{ marginTop: "0.5rem" }}>
        <input className="input" placeholder={t.note_optional} value={sub.opmerking}
          onChange={(e) => updateSubtaak(taakId, sub.id, { opmerking: e.target.value })} />
      </div>
    </div>
  );
}

function BerichtenTab({ data, showToast, t }) {
  // ----------------------------------------------------------------
  // MATERIAALBEHEER
  // Het oranje kader bovenaan toont steeds de verantwoordelijke van de
  // taak "Materiaal beheer" / "Gestion de matériel", los van welk
  // sjabloon geselecteerd is. De verzendknoppen gebruiken altijd het
  // vaste materiaalbeheer-sjabloon (met {materiaallijst}).
  // ----------------------------------------------------------------

  // Zoek het materiaalbeheer-sjabloon: op id, anders op titel,
  // anders elk sjabloon dat de {materiaallijst}-placeholder bevat.
  const materiaalSjabloon =
    data.sjablonen.find((s) => s.id === "materiaalbeheer") ||
    data.sjablonen.find((s) => {
      const titel = (s.titel || "").trim().toLowerCase();
      return titel === "materiaalbeheer" || titel === "materiaal beheer" || titel === "gestion de matériel";
    }) ||
    data.sjablonen.find((s) => ((s.nl || "") + (s.fr || "")).includes("{materiaallijst}")) ||
    null;

  // De "gewone" sjablonen: alles behalve het materiaalbeheer-sjabloon.
  // Die verschijnen als keuzeknoppen en bepalen het bericht in de onderste lijst.
  // Het materiaalsjabloon hoort enkel bij het oranje kader, niet bij de gewone lijst.
  const gewoneSjablonen = data.sjablonen.filter((s) => !materiaalSjabloon || s.id !== materiaalSjabloon.id);

  const eersteId = gewoneSjablonen.length > 0 ? gewoneSjablonen[0].id : "";
  const [sjabloonId, setSjabloonId] = useState(eersteId);
  const huidigSjabloon = gewoneSjablonen.find((s) => s.id === sjabloonId) || gewoneSjablonen[0] || null;


  // Zoek de taak "Materiaal beheer" (NL of FR), case-insensitief
  const materiaalTaak = data.taken.find((tt) => {
    const nl = (tt.naamNl || "").trim().toLowerCase();
    const fr = (tt.naamFr || "").trim().toLowerCase();
    return nl === "materiaal beheer" || fr === "gestion de matériel" || fr === "gestion de materiel";
  });

  // De vrijwilliger-id van de verantwoordelijke van die taak (alleen echte vrijwilligers)
  const materiaalVerantwId =
    materiaalTaak &&
    materiaalTaak.verantwoordelijkeId &&
    materiaalTaak.verantwoordelijkeId !== "__ander__"
      ? materiaalTaak.verantwoordelijkeId
      : "";

  // Bouw de materiaallijst-tekst op voor in het bericht.
  // Enkel materiaal met een ingevuld aantal (> 0) komt in de lijst —
  // de volledige materiaal-stamlijst blijft bewaard voor andere evenementen.
  // Formaat: "4× BBQ uit Leuven" / "4× BBQ de Leuven"
  const buildMateriaallijst = (lang) => {
    const items = (data.materiaal || []).filter((m) => {
      const n = parseFloat(m.aantal);
      return !isNaN(n) && n > 0;
    });
    if (items.length === 0) {
      return lang === "fr" ? "(aucun matériel)" : "(geen materiaal)";
    }
    const uitWoord = lang === "fr" ? "de" : "uit";
    const winkelNaamVan = (id) => {
      const w = (data.winkels || []).find((x) => x.id === id);
      return w ? w.naam : (lang === "fr" ? "magasin non précisé" : "winkel niet gekozen");
    };
    return [...items]
      .map((m) => {
        const naam = capitalize(lang === "fr" ? (m.naamFr || m.naamNl) : (m.naamNl || m.naamFr)) || "?";
        // Herkomst: bij Winkel_Magasin de winkelnaam, anders de oorsprong
        const herkomst = m.oorsprong === WINKEL_OORSPRONG
          ? winkelNaamVan(m.winkelId)
          : (m.oorsprong || (lang === "fr" ? "origine non précisée" : "oorsprong niet gekozen"));
        return { tekst: `• ${m.aantal}× ${naam} ${uitWoord} ${herkomst}`, sorteer: naam.toLowerCase() };
      })
      .sort((a, b) => a.sorteer.localeCompare(b.sorteer))
      .map((x) => x.tekst)
      .join("\n");
  };

  const buildBerichtVoor = (v, sjabloonObj) => {
    const lang = v.taal === "fr" ? "fr" : "nl";
    const bron = sjabloonObj || huidigSjabloon;
    const sjabloon = bron ? (lang === "fr" ? (bron.fr || "") : (bron.nl || "")) : "";

    // Hulpfunctie: krijg leesbare naam van verantwoordelijke
    const getVerantwNaam = (tt) => {
      if (!tt.verantwoordelijkeId) return "";
      if (tt.verantwoordelijkeId === "__ander__") return tt.verantwoordelijkeVrij || "";
      const vr = data.vrijwilligers.find((x) => x.id === tt.verantwoordelijkeId);
      if (vr) return `${vr.voornaam} ${vr.naam}`.trim();
      const ec = (data.externeContacten || []).find((c) => c.id === tt.verantwoordelijkeId);
      if (ec) return ec.naam;
      return "";
    };

    const eigenTaken = [];
    data.taken.forEach((tt) => {
      const hoofdNaam = capitalize(lang === "fr" ? (tt.naamFr || tt.naamNl) : (tt.naamNl || tt.naamFr));
      const verantwNaam = getVerantwNaam(tt);
      // Vermelding alleen als er een verantwoordelijke is EN het is iemand anders dan de ontvanger zelf
      const isOntvangerVerantw = tt.verantwoordelijkeId && tt.verantwoordelijkeId === v.id;
      const verantwSuffix = (verantwNaam && !isOntvangerVerantw)
        ? ` [${lang === "fr" ? "Responsable" : "Verantwoordelijke"}: ${verantwNaam}]`
        : "";
      const eigenStar = isOntvangerVerantw
        ? (lang === "fr" ? " ⭐⭐⭐ Responsable" : " ⭐⭐⭐ Verantwoordelijke")
        : "";

      if (tt.heeftSubtaken && tt.subtaken.length > 0) {
        tt.subtaken.forEach((s) => {
          if (s.toegewezen.includes(v.id)) {
            const subNaam = capitalize(lang === "fr" ? (s.naamFr || s.naamNl) : (s.naamNl || s.naamFr));
            const tijd = s.start && s.eind ? ` (${s.start}–${s.eind})` : "";
            eigenTaken.push(`• ${hoofdNaam} — ${subNaam}${tijd}${eigenStar}${verantwSuffix}`);
          }
        });
      } else {
        if ((tt.toegewezen || []).includes(v.id)) {
          const tijd = tt.start && tt.eind ? ` (${tt.start}–${tt.eind})` : "";
          eigenTaken.push(`• ${hoofdNaam}${tijd}${eigenStar}${verantwSuffix}`);
        }
      }
    });

    const takenlijst = eigenTaken.length > 0 ? eigenTaken.join("\n") : (lang === "fr" ? "(aucune tâche assignée)" : "(geen taken toegewezen)");
    const mapslink = buildMapsLink(data.event, "driving");
    const locatie = buildAddressString(data.event);

    return sjabloon
      .replace(/{voornaam}/g, aanspreeknaam(v))
      .replace(/{eventnaam}/g, data.event.naam || "")
      .replace(/{eventdatum}/g, formatDate(data.event.datum, lang))
      .replace(/{locatie}/g, locatie)
      .replace(/{takenlijst}/g, takenlijst)
      .replace(/{materiaallijst}/g, buildMateriaallijst(lang))
      .replace(/{mapslink}/g, mapslink);
  };

  const buildWaLink = (v, bericht) => {
    const tel = cleanPhone(v.gsm1);
    if (!tel) return "";
    return `https://wa.me/${tel}?text=${encodeURIComponent(bericht)}`;
  };

  const copyToClipboard = async (text, naam) => {
    try {
      await navigator.clipboard.writeText(text);
      showToast(t.msg_copied(naam));
    } catch (e) {
      const ta = document.createElement("textarea");
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand("copy"); showToast(t.msg_copied(naam)); }
      catch (e2) { alert(t.cant_copy); }
      document.body.removeChild(ta);
    }
  };

  const aantalVoor = (vId) => {
    let n = 0;
    data.taken.forEach((tt) => {
      if (tt.heeftSubtaken && tt.subtaken.length > 0) {
        n += tt.subtaken.filter((s) => s.toegewezen.includes(vId)).length;
      } else if ((tt.toegewezen || []).includes(vId)) {
        n += 1;
      }
    });
    return n;
  };

  return (
    <div>
      <div className="card" style={{ marginBottom: "1.5rem" }}>
        <h2 className="font-display" style={{ marginTop: 0, fontSize: "1.4rem" }}>{t.tab_berichten}</h2>
        <p style={{ color: "var(--ink-soft)", fontSize: "0.9rem" }}>
          {t.msg_intro} <strong>"{t.copy_msg}"</strong> {t.msg_intro2}
        </p>
        {gewoneSjablonen.length === 0 ? (
          <p style={{ color: "var(--accent)", fontSize: "0.85rem", marginTop: "1rem", marginBottom: 0 }}>
            {t.no_templates} <strong>{t.tab_sjablonen}</strong>.
          </p>
        ) : (
          <div style={{ display: "flex", gap: "0.5rem", flexWrap: "wrap", marginTop: "1rem" }}>
            {gewoneSjablonen.map((s) => (
              <button key={s.id}
                className={(huidigSjabloon && s.id === huidigSjabloon.id) ? "btn btn-primary" : "btn btn-ghost"}
                onClick={() => setSjabloonId(s.id)}>
                {s.titel || "(?)"}
              </button>
            ))}
          </div>
        )}
      </div>

      {data.vrijwilligers.length === 0 ? (
        <div className="card" style={{ textAlign: "center", color: "var(--ink-soft)" }}>{t.no_volunteers}</div>
      ) : (() => {
        const sorteer = (a, b) => {
          const an = (a.naam || "").toLowerCase();
          const bn = (b.naam || "").toLowerCase();
          if (an !== bn) return an.localeCompare(bn);
          return (a.voornaam || "").toLowerCase().localeCompare((b.voornaam || "").toLowerCase());
        };

        // Vrijwilliger-object van de materiaalverantwoordelijke (voor het oranje kader)
        const materiaalVerantw = materiaalVerantwId
          ? data.vrijwilligers.find((v) => v.id === materiaalVerantwId)
          : null;

        // Onderste lijst: alle vrijwilligers met minstens één toegewezen taak/subtaak
        const metTaken = data.vrijwilligers
          .filter((v) => aantalVoor(v.id) > 0)
          .sort(sorteer);

        // Oranje kader bovenaan — materiaalverantwoordelijke
        const materiaalKader = (() => {
          if (!materiaalVerantw) return null;
          const naamVol = `${materiaalVerantw.voornaam} ${materiaalVerantw.naam}`.trim() || "vrijwilliger";
          if (!materiaalSjabloon) {
            return (
              <div className="alert-bar alert-amber" style={{ marginBottom: "1.5rem", display: "block" }}>
                <strong className="font-display" style={{ fontSize: "1.05rem" }}>{naamVol}</strong>
                <div style={{ fontSize: "0.85rem", marginTop: "0.3rem", color: "var(--ink)" }}>
                  {t.materiaalverantw_label} · {t.materiaal_geen_sjabloon}
                </div>
              </div>
            );
          }
          const bericht = buildBerichtVoor(materiaalVerantw, materiaalSjabloon);
          const link = buildWaLink(materiaalVerantw, bericht);
          return (
            <div className="alert-bar alert-amber" style={{ marginBottom: "1.5rem", display: "block" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: "1rem", flexWrap: "wrap" }}>
                <div>
                  <div style={{ fontSize: "0.7rem", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.08em", color: "var(--amber)" }}>
                    {t.materiaalverantw_label}
                  </div>
                  <strong className="font-display" style={{ fontSize: "1.1rem" }}>{naamVol}</strong>
                  <div style={{ color: "var(--ink-soft)", fontSize: "0.85rem", marginTop: "0.2rem" }}>
                    {materiaalVerantw.taal === "fr" ? "🇫🇷" : "🇳🇱"} · {materiaalVerantw.gsm1 || t.no_phone}
                  </div>
                </div>
                <div style={{ display: "flex", gap: "0.4rem", flexWrap: "wrap" }}>
                  <button className="btn btn-ghost btn-sm" onClick={() => copyToClipboard(bericht, materiaalVerantw.voornaam || naamVol)}>
                    {t.copy_msg}
                  </button>
                  {link && (
                    <a className="btn btn-whatsapp btn-sm" href={link} target="_blank" rel="noopener" style={{ textDecoration: "none" }}>
                      {t.open_wa}
                    </a>
                  )}
                </div>
              </div>
              <details style={{ marginTop: "0.7rem" }}>
                <summary style={{ fontSize: "0.85rem", color: "var(--ink-soft)" }}>
                  <span className="chevron">▶</span> {t.show_msg}
                </summary>
                <pre style={{ marginTop: "0.5rem", padding: "0.8rem", background: "var(--bg-card)",
                  border: "1px solid var(--line)", borderRadius: 3, whiteSpace: "pre-wrap",
                  fontFamily: "inherit", fontSize: "0.85rem" }}>{bericht}</pre>
              </details>
            </div>
          );
        })();

        if (metTaken.length === 0) {
          return (
            <div>
              {materiaalKader}
              <div className="card" style={{ textAlign: "center", color: "var(--ink-soft)" }}>
                {t.no_volunteers_w_tasks} <strong>{t.tab_taken}</strong>.
              </div>
            </div>
          );
        }

        return (
          <div>
            {materiaalKader}
            <div style={{ display: "grid", gap: "1rem" }}>
            {metTaken.map((v) => {
              const bericht = buildBerichtVoor(v);
              const link = buildWaLink(v, bericht);
              const aantal = aantalVoor(v.id);
              const naamVol = `${v.voornaam} ${v.naam}`.trim() || "vrijwilliger";
              return (
                <div key={v.id} className="card">
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: "1rem", flexWrap: "wrap" }}>
                    <div>
                      <strong className="font-display" style={{ fontSize: "1.1rem" }}>{naamVol}</strong>
                      <div style={{ color: "var(--ink-soft)", fontSize: "0.85rem", marginTop: "0.2rem" }}>
                        {v.taal === "fr" ? "🇫🇷" : "🇳🇱"} · {v.gsm1 || t.no_phone} · {t.taken_assigned(aantal)}
                      </div>
                    </div>
                    <div style={{ display: "flex", gap: "0.4rem", flexWrap: "wrap" }}>
                      <button className="btn btn-ghost btn-sm" onClick={() => copyToClipboard(bericht, v.voornaam || naamVol)}>
                        {t.copy_msg}
                      </button>
                      {link && (
                        <a className="btn btn-whatsapp btn-sm" href={link} target="_blank" rel="noopener" style={{ textDecoration: "none" }}>
                          {t.open_wa}
                        </a>
                      )}
                    </div>
                  </div>
                  <details style={{ marginTop: "0.7rem" }}>
                    <summary style={{ fontSize: "0.85rem", color: "var(--ink-soft)" }}>
                      <span className="chevron">▶</span> {t.show_msg}
                    </summary>
                    <pre style={{ marginTop: "0.5rem", padding: "0.8rem", background: "var(--bg)",
                      border: "1px solid var(--line)", borderRadius: 3, whiteSpace: "pre-wrap",
                      fontFamily: "inherit", fontSize: "0.85rem" }}>{bericht}</pre>
                  </details>
                </div>
              );
            })}
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// ============================================================
// BULK SEND
// ============================================================
function BulkSendTab({ data, showToast, t, addExternContact, updateExternContact, removeExternContact,
                      markBulkSent, markBulkUnsent, resetBulkHistory }) {
  const [selectedIds, setSelectedIds] = useState(new Set());
  const [taalFilter, setTaalFilter] = useState("all");
  const [berichtNl, setBerichtNl] = useState("");
  const [berichtFr, setBerichtFr] = useState("");
  const [imageMode, setImageMode] = useState("none"); // none | attach | url
  const [imageDataUrl, setImageDataUrl] = useState("");
  const [imageUrl, setImageUrl] = useState("");
  const [showHelp, setShowHelp] = useState(false);
  const [previewId, setPreviewId] = useState("");
  const [useTemplateId, setUseTemplateId] = useState("");

  // Combineer vrijwilligers (met gsm1) en externe contacten
  const alleOntvangers = [
    ...data.vrijwilligers.filter((v) => v.gsm1).map((v) => ({
      id: v.id, type: "vrijwilliger",
      voornaam: v.voornaam, naam: v.naam, roepnaam: v.roepnaam || "", gsm1: v.gsm1, taal: v.taal || "nl",
    })),
    ...data.externeContacten.filter((c) => c.gsm1).map((c) => ({
      id: c.id, type: "extern",
      voornaam: c.naam, naam: "(extern)", roepnaam: "", gsm1: c.gsm1, taal: c.taal || "nl",
    })),
  ].filter((p) => taalFilter === "all" || p.taal === taalFilter)
   .sort((a, b) => {
     const an = (a.naam || "").toLowerCase();
     const bn = (b.naam || "").toLowerCase();
     if (an !== bn) return an.localeCompare(bn);
     return (a.voornaam || "").toLowerCase().localeCompare((b.voornaam || "").toLowerCase());
   });

  const selectAll = () => setSelectedIds(new Set(alleOntvangers.map((p) => p.id)));
  const deselectAll = () => setSelectedIds(new Set());
  const toggleSelect = (id) => setSelectedIds((s) => {
    const next = new Set(s);
    if (next.has(id)) next.delete(id); else next.add(id);
    return next;
  });

  const applyTemplate = (templateId) => {
    setUseTemplateId(templateId);
    if (!templateId) { setBerichtNl(""); setBerichtFr(""); return; }
    const sj = data.sjablonen.find((s) => s.id === templateId);
    if (sj) { setBerichtNl(sj.nl || ""); setBerichtFr(sj.fr || ""); }
  };

  const buildBericht = (persoon) => {
    const lang = persoon.taal === "fr" ? "fr" : "nl";
    let txt = (lang === "fr" ? berichtFr : berichtNl) || "";
    txt = txt
      .replace(/{voornaam}/g, aanspreeknaam(persoon))
      .replace(/{eventnaam}/g, data.event.naam || "")
      .replace(/{eventdatum}/g, formatDate(data.event.datum, lang))
      .replace(/{locatie}/g, buildAddressString(data.event))
      .replace(/{mapslink}/g, buildMapsLink(data.event, "driving"))
      .replace(/{takenlijst}/g, "");
    if (imageMode === "url" && imageUrl) {
      txt = txt + (txt.endsWith("\n") ? "" : "\n\n") + imageUrl;
    }
    return txt;
  };

  const buildWaLink = (persoon) => {
    const tel = cleanPhone(persoon.gsm1);
    if (!tel) return "";
    return `https://wa.me/${tel}?text=${encodeURIComponent(buildBericht(persoon))}`;
  };

  const handleSend = (persoon, link) => {
    const lastSent = (data.bulkGeschiedenis[persoon.id] || []).slice(-1)[0];
    if (lastSent && isToday(lastSent.datum)) {
      const naam = `${persoon.voornaam} ${persoon.naam}`.trim();
      if (!confirm(t.confirm_resend(naam, formatTimeShort(lastSent.datum)))) return;
    }
    markBulkSent(persoon.id, buildBericht(persoon));
    window.open(link, "_blank");
  };

  const handleImageUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setImageDataUrl(ev.target.result);
    reader.readAsDataURL(file);
  };

  const copyImage = async () => {
    if (!imageDataUrl) return;
    try {
      const blob = await (await fetch(imageDataUrl)).blob();
      await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
      showToast(t.img_copied);
    } catch (e) {
      showToast(t.img_copy_failed);
    }
  };

  const dupsToday = Array.from(selectedIds).filter((id) => {
    const last = (data.bulkGeschiedenis[id] || []).slice(-1)[0];
    return last && isToday(last.datum);
  });

  const deselectDups = () => {
    setSelectedIds((s) => {
      const next = new Set(s);
      dupsToday.forEach((id) => next.delete(id));
      return next;
    });
  };

  const totaalSelected = selectedIds.size;
  const sentCount = Array.from(selectedIds).filter((id) => {
    const last = (data.bulkGeschiedenis[id] || []).slice(-1)[0];
    return last && isToday(last.datum);
  }).length;

  const previewPerson = previewId ? alleOntvangers.find((p) => p.id === previewId) : null;

  return (
    <div>
      <div className="card" style={{ marginBottom: "1.5rem" }}>
        <h2 className="font-display" style={{ marginTop: 0, fontSize: "1.4rem" }}>{t.bulk_title}</h2>
        <p style={{ color: "var(--ink-soft)", fontSize: "0.9rem", margin: 0 }}>{t.bulk_intro}</p>
      </div>

      {/* Compose */}
      <div className="card" style={{ marginBottom: "1.5rem" }}>
        <h3 className="font-display" style={{ marginTop: 0, fontSize: "1.1rem" }}>{t.compose}</h3>
        <div style={{ marginBottom: "1rem" }}>
          <Field label={t.use_template}>
            <select className="select" value={useTemplateId} onChange={(e) => applyTemplate(e.target.value)}>
              <option value="">{t.none}</option>
              {data.sjablonen.map((s) => <option key={s.id} value={s.id}>{s.titel}</option>)}
            </select>
          </Field>
        </div>
        <div className="grid-2">
          <Field label={t.msg_nl}>
            <textarea className="textarea" rows={6} value={berichtNl} onChange={(e) => setBerichtNl(e.target.value)} />
          </Field>
          <Field label={t.msg_fr}>
            <textarea className="textarea" rows={6} value={berichtFr} onChange={(e) => setBerichtFr(e.target.value)} />
          </Field>
        </div>
        <p style={{ fontSize: "0.78rem", color: "var(--ink-soft)", marginTop: "0.5rem" }}>
          <strong>{t.placeholders_avail}</strong> <code>{t.placeholder_help_bulk}</code>
        </p>

        {/* Afbeelding */}
        <div style={{ marginTop: "1rem", paddingTop: "1rem", borderTop: "1px dashed var(--line)" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: "0.5rem" }}>
            <Field label={t.image}>
              <div style={{ display: "flex", gap: "0.4rem", flexWrap: "wrap" }}>
                <button className={imageMode === "none" ? "btn btn-primary btn-sm" : "btn btn-ghost btn-sm"} onClick={() => setImageMode("none")}>{t.image_none}</button>
                <button className={imageMode === "attach" ? "btn btn-primary btn-sm" : "btn btn-ghost btn-sm"} onClick={() => setImageMode("attach")}>{t.image_attach}</button>
                <button className={imageMode === "url" ? "btn btn-primary btn-sm" : "btn btn-ghost btn-sm"} onClick={() => setImageMode("url")}>{t.image_url}</button>
              </div>
            </Field>
            {imageMode !== "none" && (
              <button className="btn btn-ghost btn-sm" onClick={() => setShowHelp(!showHelp)}>{t.image_help}</button>
            )}
          </div>

          {showHelp && imageMode === "url" && (
            <div className="info-box">
              <strong>{t.image_help_title}</strong>
              <pre style={{ whiteSpace: "pre-wrap", fontFamily: "inherit", margin: "0.5rem 0 0 0", fontSize: "0.85rem" }}>{t.image_help_body}</pre>
            </div>
          )}
          {showHelp && imageMode === "attach" && (
            <div className="info-box">{t.image_attach_help}</div>
          )}

          {imageMode === "attach" && (
            <div style={{ marginTop: "0.7rem", display: "flex", alignItems: "center", gap: "0.7rem", flexWrap: "wrap" }}>
              <label className="btn btn-ghost btn-sm" style={{ cursor: "pointer" }}>
                {t.upload_image}
                <input type="file" accept="image/*" style={{ display: "none" }} onChange={handleImageUpload} />
              </label>
              {imageDataUrl && (
                <>
                  <img src={imageDataUrl} alt="" style={{ maxHeight: 60, borderRadius: 3, border: "1px solid var(--line)" }} />
                  <span style={{ fontSize: "0.85rem", color: "var(--green)" }}>✓ {t.image_loaded}</span>
                </>
              )}
            </div>
          )}

          {imageMode === "url" && (
            <div style={{ marginTop: "0.7rem" }}>
              <Field label={t.image_url_label}>
                <input className="input" value={imageUrl} onChange={(e) => setImageUrl(e.target.value)} placeholder={t.image_url_ph} />
              </Field>
            </div>
          )}
        </div>
      </div>

      {/* Externe contacten */}
      <div className="card" style={{ marginBottom: "1.5rem" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: "0.5rem", marginBottom: "0.7rem" }}>
          <h3 className="font-display" style={{ margin: 0, fontSize: "1.1rem" }}>{t.external_contacts}</h3>
          <button className="btn btn-ghost btn-sm" onClick={addExternContact}>{t.add_external}</button>
        </div>
        {data.externeContacten.length === 0 ? (
          <p style={{ color: "var(--ink-soft)", fontSize: "0.85rem", margin: 0 }}>{t.no_external}</p>
        ) : (
          <div style={{ display: "grid", gap: "0.4rem" }}>
            {data.externeContacten.map((c) => (
              <div key={c.id} style={{ display: "grid", gridTemplateColumns: "2fr 2fr 1fr auto", gap: "0.5rem" }}>
                <input className="input" placeholder={t.name_ph} value={c.naam} onChange={(e) => updateExternContact(c.id, { naam: e.target.value })} />
                <input className="input" placeholder="+32475123456" value={c.gsm1} onChange={(e) => updateExternContact(c.id, { gsm1: e.target.value })} />
                <select className="select" value={c.taal} onChange={(e) => updateExternContact(c.id, { taal: e.target.value })}>
                  <option value="nl">NL</option><option value="fr">FR</option>
                </select>
                <button className="btn btn-danger btn-sm" onClick={() => removeExternContact(c.id)}>✕</button>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Selectie + verzending */}
      <div className="card" style={{ marginBottom: "1.5rem" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: "0.5rem", marginBottom: "0.7rem" }}>
          <h3 className="font-display" style={{ margin: 0, fontSize: "1.1rem" }}>{t.select_recipients}</h3>
          <div style={{ display: "flex", gap: "0.4rem", flexWrap: "wrap" }}>
            <select className="select" value={taalFilter} onChange={(e) => setTaalFilter(e.target.value)} style={{ width: "auto" }}>
              <option value="all">{t.all_langs}</option>
              <option value="nl">🇳🇱 NL</option>
              <option value="fr">🇫🇷 FR</option>
            </select>
            <button className="btn btn-ghost btn-sm" onClick={selectAll}>{t.select_all}</button>
            <button className="btn btn-ghost btn-sm" onClick={deselectAll}>{t.deselect_all}</button>
            <button className="btn btn-ghost btn-sm" onClick={() => { if (confirm(t.confirm_new_campaign)) resetBulkHistory(); }}>{t.new_campaign}</button>
          </div>
        </div>

        {dupsToday.length > 0 && (
          <div className="alert-bar alert-amber" style={{ marginBottom: "0.7rem" }}>
            <span style={{ fontWeight: 500 }}>{t.dup_warning(dupsToday.length)}</span>
            <button className="btn btn-ghost btn-sm" onClick={deselectDups}>{t.deselect_dups}</button>
          </div>
        )}

        {totaalSelected > 0 && (
          <p style={{ color: "var(--ink-soft)", fontSize: "0.85rem", marginTop: 0, marginBottom: "0.7rem" }}>
            <strong>{t.progress}</strong> {t.sent_count(sentCount, totaalSelected)}
          </p>
        )}

        {alleOntvangers.length === 0 ? (
          <p style={{ color: "var(--ink-soft)", textAlign: "center", margin: "1rem 0" }}>{t.no_recipients}</p>
        ) : (
          <div>
            {alleOntvangers.map((p) => {
              const lastSent = (data.bulkGeschiedenis[p.id] || []).slice(-1)[0];
              const sentToday = lastSent && isToday(lastSent.datum);
              const sentRecent = lastSent && !sentToday && isThisWeek(lastSent.datum);
              const cls = `send-row ${sentToday ? "sent-today" : sentRecent ? "sent-week" : ""}`;
              const naamVol = `${p.voornaam} ${p.naam}`.trim();

              return (
                <div key={p.id} className={cls}>
                  <input type="checkbox" checked={selectedIds.has(p.id)} onChange={() => toggleSelect(p.id)} />
                  <div>
                    <strong>{naamVol}</strong>
                    <div style={{ fontSize: "0.78rem", color: "var(--ink-soft)" }}>
                      {p.taal === "fr" ? "🇫🇷" : "🇳🇱"} · {p.gsm1}
                      {sentToday && ` · ${t.sent_today} ${formatTimeShort(lastSent.datum)}`}
                      {sentRecent && ` · ${t.sent_week_ago} ${formatDateShort(lastSent.datum, data.taal || "nl")}`}
                      {!lastSent && ` · ${t.not_sent}`}
                    </div>
                  </div>
                  <button className="btn btn-ghost btn-sm" onClick={() => setPreviewId(p.id === previewId ? "" : p.id)}>
                    👁
                  </button>
                  <div style={{ display: "flex", gap: "0.3rem", flexWrap: "wrap" }}>
                    {imageMode === "attach" && imageDataUrl && (
                      <button className="btn btn-ghost btn-sm" onClick={copyImage}>{t.copy_image}</button>
                    )}
                    {(() => {
                      const link = buildWaLink(p);
                      return link ? (
                        <button className="btn btn-whatsapp btn-sm" onClick={() => handleSend(p, link)}>
                          {t.open_wa}
                        </button>
                      ) : <span style={{ fontSize: "0.78rem", color: "var(--accent)" }}>{t.no_wa_number}</span>;
                    })()}
                    {sentToday && (
                      <button className="btn btn-ghost btn-sm" onClick={() => markBulkUnsent(p.id)}>{t.mark_unsent}</button>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {previewPerson && (
          <div style={{ marginTop: "1rem", padding: "1rem", background: "var(--bg)", border: "1px solid var(--line)", borderRadius: 3 }}>
            <strong style={{ fontSize: "0.85rem" }}>{t.preview} {previewPerson.voornaam} {previewPerson.naam}:</strong>
            <pre style={{ whiteSpace: "pre-wrap", fontFamily: "inherit", margin: "0.5rem 0 0 0", fontSize: "0.85rem" }}>
              {buildBericht(previewPerson)}
            </pre>
          </div>
        )}
      </div>
    </div>
  );
}

// ============================================================
// SJABLONEN
// ============================================================
function SjablonenTab({ sjablonen, updateVeld, add, remove, t }) {
  const handleRemove = (id, titel) => {
    if (!confirm(t.confirm_remove_template(titel))) return;
    remove(id);
  };

  return (
    <div>
      <div className="card" style={{ marginBottom: "1.5rem" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: "1rem", flexWrap: "wrap" }}>
          <div style={{ flex: 1, minWidth: 250 }}>
            <h2 className="font-display" style={{ marginTop: 0, fontSize: "1.4rem" }}>{t.sjab_title}</h2>
            <p style={{ color: "var(--ink-soft)", fontSize: "0.9rem", margin: 0 }}>
              {t.sjab_intro} <strong>{t.tab_berichten}</strong>. {t.sjab_intro2} <code>{t.placeholder_help}</code>
            </p>
          </div>
          <button className="btn btn-primary" onClick={add}>{t.new_sjabloon}</button>
        </div>
      </div>

      {sjablonen.length === 0 ? (
        <div className="card" style={{ textAlign: "center", color: "var(--ink-soft)" }}>{t.no_sjablonen}</div>
      ) : (
        <div style={{ display: "grid", gap: "1rem" }}>
          {sjablonen.map((s) => (
            <div key={s.id} className="card" style={{ borderLeft: "3px solid var(--accent)" }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr auto", gap: "0.8rem", alignItems: "end", marginBottom: "1rem" }}>
                <Field label={t.sjabloon_title}>
                  <input className="input" value={s.titel}
                    onChange={(e) => updateVeld(s.id, "titel", e.target.value)} placeholder={t.sjabloon_title_ph} />
                </Field>
                <button className="btn btn-danger btn-sm" onClick={() => handleRemove(s.id, s.titel)}>{t.remove}</button>
              </div>
              <div className="grid-2">
                <Field label="🇳🇱 Nederlands">
                  <textarea className="textarea" rows={8} value={s.nl}
                    onChange={(e) => updateVeld(s.id, "nl", e.target.value)} style={{ fontFamily: "inherit" }} />
                </Field>
                <Field label="🇫🇷 Français">
                  <textarea className="textarea" rows={8} value={s.fr}
                    onChange={(e) => updateVeld(s.id, "fr", e.target.value)} style={{ fontFamily: "inherit" }} />
                </Field>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ============================================================
// MATERIAAL
// ============================================================
function MateriaalTab({ materiaal, oorsprongLijst, vrijwilligers, externeContacten, winkels, dict, taal, add, update, remove, addLocatie, removeLocatie, exportMateriaal, t }) {
  const [zoek, setZoek] = useState("");
  const sortedVrij = [...vrijwilligers].sort((a, b) => {
    const an = (a.naam || "").toLowerCase();
    const bn = (b.naam || "").toLowerCase();
    if (an !== bn) return an.localeCompare(bn);
    return (a.voornaam || "").toLowerCase().localeCompare((b.voornaam || "").toLowerCase());
  });
  const sortedExtern = [...(externeContacten || [])].sort((a, b) =>
    (a.naam || "").toLowerCase().localeCompare((b.naam || "").toLowerCase())
  );

  // Dynamisch alfabetisch sorteren op de schermtaal
  const naamVoorTaal = (m) => (taal === "fr" ? (m.naamFr || m.naamNl) : (m.naamNl || m.naamFr)) || "";
  const gesorteerd = [...materiaal].sort((a, b) =>
    naamVoorTaal(a).toLowerCase().localeCompare(naamVoorTaal(b).toLowerCase())
  );
  // Zoekfilter (taalgebonden, maar zoekt voor de zekerheid in beide namen)
  const zoekTerm = zoek.trim().toLowerCase();
  const zichtbaar = zoekTerm
    ? gesorteerd.filter((m) =>
        (m.naamNl || "").toLowerCase().includes(zoekTerm) ||
        (m.naamFr || "").toLowerCase().includes(zoekTerm))
    : gesorteerd;

  return (
    <div>
      <div className="card" style={{ marginBottom: "1.5rem" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: "1rem", flexWrap: "wrap" }}>
          <div style={{ flex: 1, minWidth: 250 }}>
            <h2 className="font-display" style={{ marginTop: 0, fontSize: "1.4rem" }}>{t.mat_title}</h2>
            <p style={{ color: "var(--ink-soft)", fontSize: "0.9rem", margin: 0 }}>{t.mat_intro}</p>
          </div>
          <div style={{ display: "flex", gap: "0.5rem", flexWrap: "wrap" }}>
            {materiaal.length > 0 && exportMateriaal && (
              <button className="btn btn-ghost" onClick={exportMateriaal}>{t.mat_export}</button>
            )}
            <button className="btn btn-primary" onClick={add}>{t.mat_add}</button>
          </div>
        </div>

        <details style={{ marginTop: "1rem", paddingTop: "1rem", borderTop: "1px dashed var(--line)" }}>
          <summary style={{ fontSize: "0.85rem", color: "var(--ink-soft)", cursor: "pointer" }}>
            <span className="chevron">▶</span> {t.mat_manage_loc} ({(oorsprongLijst || []).length})
          </summary>
          <div style={{ marginTop: "0.8rem", display: "flex", flexWrap: "wrap", gap: "0.4rem" }}>
            {(oorsprongLijst || []).length === 0 ? (
              <em style={{ color: "var(--ink-soft)", fontSize: "0.85rem" }}>—</em>
            ) : (
              oorsprongLijst.map((loc) => (
                <span key={loc} style={{
                  display: "inline-flex", alignItems: "center", gap: "0.4rem",
                  padding: "0.3rem 0.7rem", background: "var(--bg)", border: "1px solid var(--line)",
                  borderRadius: 999, fontSize: "0.85rem",
                }}>
                  {loc}
                  <button onClick={() => removeLocatie(loc)} title={t.remove}
                    style={{ background: "none", border: "none", color: "var(--accent)",
                      cursor: "pointer", padding: 0, fontSize: "0.85rem", lineHeight: 1 }}>✕</button>
                </span>
              ))
            )}
          </div>
        </details>
      </div>

      {materiaal.length === 0 ? (
        <div className="card" style={{ textAlign: "center", color: "var(--ink-soft)" }}>{t.mat_no_items}</div>
      ) : (
        <div>
          <div style={{ marginBottom: "1rem" }}>
            <input className="input" type="search" value={zoek}
              onChange={(e) => setZoek(e.target.value)}
              placeholder={t.mat_zoek_ph} style={{ maxWidth: 360 }} />
            {zoekTerm && (
              <span style={{ marginLeft: "0.7rem", fontSize: "0.83rem", color: "var(--ink-soft)" }}>
                {t.mat_zoek_resultaat(zichtbaar.length, materiaal.length)}
              </span>
            )}
          </div>
          {zichtbaar.length === 0 ? (
            <div className="card" style={{ textAlign: "center", color: "var(--ink-soft)" }}>{t.mat_zoek_geen}</div>
          ) : (
            <div style={{ display: "grid", gap: "0.7rem" }}>
              {zichtbaar.map((m) => (
                <MateriaalRij key={m.id} m={m} alleMateriaal={materiaal} sortedVrij={sortedVrij} sortedExtern={sortedExtern} oorsprongLijst={oorsprongLijst}
                  winkels={winkels} dict={dict} update={update} remove={remove} addLocatie={addLocatie} removeLocatie={removeLocatie} t={t} />
              ))}
            </div>
          )}
          {materiaal.length > 3 && (
            <div style={{ marginTop: "1rem", display: "flex", justifyContent: "center" }}>
              <button className="btn btn-primary" onClick={add}>{t.mat_add}</button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function MateriaalRij({ m, alleMateriaal, sortedVrij, sortedExtern, oorsprongLijst, winkels, dict, update, remove, addLocatie, removeLocatie, t }) {
  // Dubbeldetectie: zelfde naam (NL of FR) bij een ander materiaal-item
  const isDubbel = (() => {
    const nl = normalizeName(m.naamNl), fr = normalizeName(m.naamFr);
    if (!nl && !fr) return false;
    return (alleMateriaal || []).some((x) => {
      if (x.id === m.id) return false;
      const xnl = normalizeName(x.naamNl), xfr = normalizeName(x.naamFr);
      return (nl && (nl === xnl || nl === xfr)) || (fr && (fr === xnl || fr === xfr));
    });
  })();

  const handleNlBlur = () => {
    // Normaliseer naar lowercase bij verlaten van veld
    if (m.naamNl) update(m.id, { naamNl: normalizeName(m.naamNl) });
    if (m.naamNl && !m.naamFr) {
      const tr = translateText(m.naamNl, "nl", "fr", dict);
      if (tr) update(m.id, { naamFr: normalizeName(tr) });
    }
  };
  const handleFrBlur = () => {
    if (m.naamFr) update(m.id, { naamFr: normalizeName(m.naamFr) });
    if (m.naamFr && !m.naamNl) {
      const tr = translateText(m.naamFr, "fr", "nl", dict);
      if (tr) update(m.id, { naamNl: normalizeName(tr) });
    }
  };

  const verantwIsAnder = m.verantwoordelijkeId === "__ander__";

  return (
    <div className="card" style={{ borderLeft: `3px solid ${isDubbel ? "var(--gold)" : "var(--accent)"}` }}>
      {isDubbel && (
        <div style={{ background: "#fdf6e3", border: "1px solid var(--gold)", borderRadius: 3,
          padding: "0.5rem 0.7rem", marginBottom: "0.6rem", fontSize: "0.82rem", color: "var(--ink)" }}>
          ⚠ {t.mat_dubbel}
        </div>
      )}
      <div style={{ display: "grid", gridTemplateColumns: "1.4fr 1.4fr 0.6fr 1fr 1.2fr auto", gap: "0.5rem", alignItems: "end" }}>
        <Field label={`${t.mat_naam} (NL)`}>
          <input className="input" value={capitalize(m.naamNl)}
            onChange={(e) => update(m.id, { naamNl: e.target.value })} onBlur={handleNlBlur} />
        </Field>
        <Field label={`${t.mat_naam} (FR)`}>
          <input className="input" value={capitalize(m.naamFr)}
            onChange={(e) => update(m.id, { naamFr: e.target.value })} onBlur={handleFrBlur} />
        </Field>
        <Field label={t.mat_aantal}>
          <input type="number" className="input" value={m.aantal}
            onChange={(e) => update(m.id, { aantal: e.target.value })} min="0" />
        </Field>
        <Field label={t.mat_oorsprong}>
          <select className="select" value={m.oorsprong}
            onChange={(e) => {
              if (e.target.value === "__add__") { addLocatie(); return; }
              const nieuwe = e.target.value;
              const patch = { oorsprong: nieuwe };
              if (nieuwe !== WINKEL_OORSPRONG) patch.winkelId = "";
              update(m.id, patch);
            }}>
            <option value="">{t.mat_choose}</option>
            {oorsprongLijst.map((loc) => <option key={loc} value={loc}>{loc}</option>)}
            <option value="__add__">{t.mat_new_loc}</option>
          </select>
        </Field>
        <Field label={t.mat_verant}>
          <select className="select" value={m.verantwoordelijkeId}
            onChange={(e) => update(m.id, { verantwoordelijkeId: e.target.value, verantwoordelijkeVrij: e.target.value === "__ander__" ? m.verantwoordelijkeVrij : "" })}>
            <option value="">{t.mat_choose}</option>
            {sortedVrij.length > 0 && (
              <optgroup label={t.tab_vrijwilligers}>
                {sortedVrij.map((v) => <option key={v.id} value={v.id}>{v.naam} {v.voornaam}</option>)}
              </optgroup>
            )}
            {sortedExtern && sortedExtern.length > 0 && (
              <optgroup label={t.external_contacts}>
                {sortedExtern.map((c) => <option key={c.id} value={c.id}>{c.naam}</option>)}
              </optgroup>
            )}
            <option value="__ander__">{t.mat_other}</option>
          </select>
        </Field>
        <button className="btn btn-danger btn-sm" onClick={() => remove(m.id)} title={t.remove}>🗑</button>
      </div>
      {verantwIsAnder && (
        <div style={{ marginTop: "0.5rem" }}>
          <input className="input" placeholder={t.mat_other_ph} value={m.verantwoordelijkeVrij || ""}
            onChange={(e) => update(m.id, { verantwoordelijkeVrij: e.target.value })} />
        </div>
      )}
      {m.oorsprong === WINKEL_OORSPRONG && (
        <div style={{ marginTop: "0.6rem", paddingTop: "0.6rem", borderTop: "1px dashed var(--line)" }}>
          <Field label={t.winkel_kies}>
            <select className="select" value={m.winkelId || ""}
              onChange={(e) => update(m.id, { winkelId: e.target.value })}
              style={{ maxWidth: 320 }}>
              <option value="">{t.mat_choose}</option>
              {[...(winkels || [])]
                .sort((a, b) => a.naam.toLowerCase().localeCompare(b.naam.toLowerCase()))
                .map((w) => <option key={w.id} value={w.id}>{w.naam}</option>)}
            </select>
          </Field>
          <p style={{ fontSize: "0.75rem", color: "var(--ink-soft)", margin: "0.3rem 0 0" }}>
            {t.winkel_kies_hint}
          </p>
        </div>
      )}
    </div>
  );
}
